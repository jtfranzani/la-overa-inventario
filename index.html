        <tbody>
          ${hist.map(m=>{
            const p = state.preparations.find(x=>x.id===m.prepId);
            const prod = p ? state.products.find(x=>x.id===p.productId) : null;
            const name = p ? `${prod?prod.name+' — ':''}${p.name}` : '— (eliminada)';
            return `<tr>
              <td>${escapeHtml(fmtDateShort(m.when))}</td>
              <td>${escapeHtml(name)}</td>
              <td style="text-align:right"><strong>${fmtUds(m.units)}</strong></td>
              <td><span class="badge danger" style="font-size:10px">${escapeHtml(mermaReasonLabel(m.reason))}</span></td>
              <td class="soft">${escapeHtml(m.notes||'—')}</td>
              <td class="soft tiny">${escapeHtml(m.userId||'—')}</td>
              <td><button class="small danger" onclick="deleteMerma('${m.id}')">Eliminar</button></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`}
  </div>
  `;
}

function addMerma(){
  const prepId = document.getElementById('mermaPrep').value;
  if(!prepId){ toast('Selecciona una preparación','warn'); return; }
  const units = parseInt(document.getElementById('mermaUnits').value)||0;
  if(units<=0){ toast('Las unidades deben ser mayores a 0','warn'); return; }
  const when = document.getElementById('mermaDate').value || todayISO();
  const reason = document.getElementById('mermaReason').value || 'otro';
  const notes = document.getElementById('mermaNotes').value.trim();

  // Aviso si excede stock actual (no bloquea pero advierte)
  const stk = computeStock();
  const avail = Math.round(stk.cocinaUds[prepId]||0);
  if(units > avail){
    const p = state.preparations.find(x=>x.id===prepId);
    const ok = confirm(`Atención: estás registrando ${units} uds de merma pero Bodega Cocina solo tiene ${avail} uds de "${p?p.name:'—'}".\n\nSi confirmas, el stock quedará negativo. ¿Continuar?`);
    if(!ok) return;
  }

  if(!state.mermas) state.mermas = [];
  const m = {id:uid(), when, prepId, units, reason, notes, userId:session.name};
  state.mermas.push(m);

  const p = state.preparations.find(x=>x.id===prepId);
  logMovement('merma', `Merma: ${p?p.name:'—'} ×${units}`, `Motivo: ${mermaReasonLabel(reason)}${notes?' · '+notes:''}`);
  saveState(); renderView();
  toast(`Merma registrada: ${units} uds de ${p?p.name:'—'}`);
}

function deleteMerma(id){
  const snap = (state.mermas||[]).find(m=>m.id===id);
  if(!snap) return;
  if(!confirm('¿Eliminar este registro de merma? El stock se devolverá a Bodega Cocina.\n(Tendrás 8 segundos para deshacer)')) return;
  const idx = (state.mermas||[]).indexOf(snap);
  state.mermas = (state.mermas||[]).filter(m=>m.id!==id);
  saveState(); renderView();
  toastUndo('Merma eliminada', ()=>{
    if((state.mermas||[]).some(m=>m.id===snap.id)) return;
    if(!state.mermas) state.mermas = [];
    const pos = Math.max(0, Math.min(idx, state.mermas.length));
    state.mermas.splice(pos, 0, snap);
    saveState(); renderView();
    toast('Merma restaurada');
  });
}

/* ---------- IMPORTAR VENTAS DESDE TOTEAT ----------
   Toteat exporta un .xls que en realidad es HTML con una <table>.
   Columnas: ID | Producto | Cantidad | Valor Venta | Descuentos | Costo
   Nombre de la hoja: YYYYMMDD<sufijo> -> usamos los primeros 8 chars como fecha. */

// Normaliza nombre para fuzzy match (sin acentos, lowercase, sin caracteres especiales)
function _toteatNorm(s){
  return (s||'').toString()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')   // quita acentos
    .toLowerCase()
    .replace(/[^a-z0-9 ]+/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}

// Score similitud entre dos nombres normalizados (0..1) por overlap de tokens.
function _toteatScore(a, b){
  if(!a || !b) return 0;
  if(a===b) return 1;
  const ta = a.split(' ').filter(x=>x.length>2);
  const tb = b.split(' ').filter(x=>x.length>2);
  if(ta.length===0 || tb.length===0) return 0;
  const set = new Set(tb);
  const inter = ta.filter(t=>set.has(t)).length;
  const union = new Set([...ta,...tb]).size;
  return inter / union;  // Jaccard
}

// Parse el archivo Toteat (HTML disfrazado de .xls). Devuelve {date, rows:[{toteatId, name, qty, value}]}
function parseToteatXls(htmlText){
  if(!htmlText || typeof htmlText !== 'string') return {date:null, rows:[]};
  // Fecha: en <x:Name>YYYYMMDD...</x:Name>
  let date = null;
  const mDate = htmlText.match(/<x:Name>(\d{8})/);
  if(mDate){
    const s = mDate[1];
    date = `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
  }
  const rows = [];
  const trMatches = htmlText.match(/<tr[^>]*>[\s\S]*?<\/tr>/gi) || [];
  trMatches.forEach((tr, idx)=>{
    if(idx===0) return; // header
    const tdMatches = tr.match(/<td[^>]*>([\s\S]*?)<\/td>/gi) || [];
    if(tdMatches.length < 3) return;
    const cells = tdMatches.map(td => td.replace(/<[^>]*>/g,'').trim());
    const toteatId = cells[0];
    const name = cells[1];
    const qty = parseInt((cells[2]||'').replace(/[.,]/g,'')) || 0;
    // Valor viene con punto como separador de miles: "188.100" -> 188100
    const valueRaw = (cells[3]||'').replace(/[.,]/g,'');
    const value = parseInt(valueRaw) || 0;
    if(toteatId && name && qty>0) rows.push({toteatId, name, qty, value});
  });
  return {date, rows};
}

// Parse el archivo Toteat cuando viene como .xls/.xlsx binario real (OLE Compound o ZIP).
// Usa SheetJS (XLSX global, ya cargado en <head>). Devuelve {date, rows:[{toteatId,name,qty,value}]}
function parseToteatXlsBinary(arrayBuffer){
  if(typeof XLSX === 'undefined') return {date:null, rows:[], _err:'SheetJS no disponible'};
  let wb;
  try { wb = XLSX.read(arrayBuffer, {type:'array'}); }
  catch(e){ return {date:null, rows:[], _err:'No se pudo abrir como Excel: '+e.message}; }
  if(!wb || !wb.SheetNames || !wb.SheetNames.length) return {date:null, rows:[], _err:'Sin hojas'};
  // Fecha desde el nombre de la primera hoja: "20260526TB.001" → 2026-05-26
  let date = null;
  const sheetName = wb.SheetNames[0];
  const mDate = String(sheetName).match(/^(\d{8})/);
  if(mDate){
    const s = mDate[1];
    date = `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
  }
  const sheet = wb.Sheets[sheetName];
  const aoa = XLSX.utils.sheet_to_json(sheet, {header:1, defval:'', raw:true});
  // Detectar fila de header: primera fila donde las dos primeras celdas sean strings no numéricos
  let headerIdx = -1;
  for(let i=0; i<Math.min(aoa.length, 10); i++){
    const r = aoa[i] || [];
    const c0 = String(r[0]||'').trim().toLowerCase();
    const c1 = String(r[1]||'').trim().toLowerCase();
    if(c0 && c1 && (c0==='id'||c0.includes('id')) && (c1.includes('prod')||c1.includes('nom'))){
      headerIdx = i; break;
    }
  }
  // Si no detectamos header, asumimos índice 0
  const startIdx = headerIdx >= 0 ? headerIdx + 1 : 1;
  const rows = [];
  for(let i=startIdx; i<aoa.length; i++){
    const r = aoa[i] || [];
    const toteatId = String(r[0]||'').trim();
    const name = String(r[1]||'').trim();
    const qtyRaw = r[2];
    let qty = 0;
    if(typeof qtyRaw === 'number') qty = Math.round(qtyRaw);
    else qty = parseInt(String(qtyRaw||'').replace(/[.,\s]/g,'')) || 0;
    const valRaw = r[3];
    let value = 0;
    if(typeof valRaw === 'number') value = Math.round(valRaw);
    else value = parseInt(String(valRaw||'').replace(/[.,\s]/g,'')) || 0;
    if(toteatId && name && qty>0) rows.push({toteatId, name, qty, value});
  }
  return {date, rows};
}

// Para cada fila Toteat, construye una propuesta con su receta (qué prep(s) descontar).
// Devuelve [{toteatId, name, qty, recipe:[{prepId, units}], matchType, score}]
//   matchType: 'id' (mapeo previo guardado), 'name' (fuzzy auto), 'none' (sin match)
//   recipe vacío = la fila se ignora al confirmar (producto sin asociación)
function buildToteatProposal(toteatRows){
  const preps = state.preparations || [];
  const tmap = state.toteatMap || {};
  const proposal = [];
  toteatRows.forEach(row=>{
    let recipe = [], matchType = 'none', score = 0;
    // 1) Match por mapeo guardado
    if(tmap[row.toteatId] && Array.isArray(tmap[row.toteatId].recipe) && tmap[row.toteatId].recipe.length){
      // copia profunda para que el usuario pueda editar en la propuesta sin tocar el mapeo guardado
      recipe = tmap[row.toteatId].recipe.map(r=>({prepId:r.prepId, units:Number(r.units)||1}));
      matchType = 'id'; score = 1;
    } else {
      // 2) Fuzzy match por nombre — siempre default 1 unidad de la prep matcheada
      const normRow = _toteatNorm(row.name);
      let best = null, bestScore = 0;
      preps.forEach(p=>{
        const prod = state.products.find(x=>x.id===p.productId);
        const candidates = [
          _toteatNorm(p.name),
          _toteatNorm(prod?prod.name:''),
          _toteatNorm((prod?prod.name:'')+' '+p.name),
        ].filter(Boolean);
        candidates.forEach(c=>{
          const s = _toteatScore(normRow, c);
          if(s > bestScore){ bestScore = s; best = p; }
        });
      });
      if(best && bestScore >= 0.5){
        recipe = [{prepId: best.id, units: 1}];
        matchType = 'name'; score = bestScore;
      }
    }
    proposal.push({...row, recipe, matchType, score});
  });
  return proposal;
}

// Estado temporal de la importación
let _toteatImport = null;  // {date, rows, proposal, fileName}

function handleToteatFile(input){
  const file = input.files && input.files[0];
  if(!file){ return; }
  const r = new FileReader();
  r.onload = (e)=>{
    try {
      const buf = e.target.result; // ArrayBuffer
      if(!buf || !(buf instanceof ArrayBuffer)){
        toast('No se pudo leer el archivo','warn'); return;
      }
      // Detectar tipo por firma binaria
      //  OLE Compound (xls clásico): D0 CF 11 E0 A1 B1 1A E1
      //  ZIP (xlsx moderno):        50 4B 03 04
      const head = new Uint8Array(buf.slice(0, 8));
      const isOLE = head[0]===0xD0 && head[1]===0xCF && head[2]===0x11 && head[3]===0xE0;
      const isZIP = head[0]===0x50 && head[1]===0x4B && head[2]===0x03 && head[3]===0x04;
      const isBinaryXls = isOLE || isZIP;
      let parsed;
      if(isBinaryXls){
        parsed = parseToteatXlsBinary(buf);
        if(parsed._err){
          toast('Error leyendo Excel binario: '+parsed._err,'warn'); return;
        }
      } else {
        // Convertir ArrayBuffer a texto y usar el parser HTML
        const text = new TextDecoder('utf-8').decode(buf);
        parsed = parseToteatXls(text);
      }
      if(!parsed.rows.length){
        toast('No se reconocieron productos en el archivo','warn');
        return;
      }
      const proposal = buildToteatProposal(parsed.rows);
      _toteatImport = {
        date: parsed.date || todayISO(),
        rows: parsed.rows,
        proposal,
        fileName: file.name,
        // Scope por defecto: día con la fecha detectada
        scope: {
          mode: 'dia',
          dia: parsed.date || todayISO(),
          semana: currentISOWeek(),
          mes: currentMonth(),
          rangoFrom: parsed.date || todayISO(),
          rangoTo: parsed.date || todayISO()
        },
        format: isBinaryXls ? (isOLE?'xls-binario':'xlsx') : 'html-disfrazado'
      };
      renderView();
      // Scroll a la sección de propuesta
      setTimeout(()=>{
        const el = document.getElementById('toteatProposal');
        if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
      }, 100);
    } catch(err){
      console.error(err);
      toast('Error al leer archivo: '+err.message,'warn');
    }
  };
  r.onerror = ()=> toast('No se pudo leer el archivo','warn');
  // Leer como ArrayBuffer para que sirva tanto para binario como para texto
  r.readAsArrayBuffer(file);
}

// Cambiar el scope (día/semana/mes/rango) de la importación Toteat actual
function _toteatSetScope(mode){
  if(!_toteatImport) return;
  if(!_toteatImport.scope) _toteatImport.scope = {mode:'dia'};
  _toteatImport.scope.mode = mode;
  renderView();
  setTimeout(()=>{
    const el = document.getElementById('toteatProposal');
    if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
  }, 50);
}
function _toteatUpdateScopeField(field, value){
  if(!_toteatImport || !_toteatImport.scope) return;
  _toteatImport.scope[field] = value;
}
// Resuelve el scope a {periodStart, periodEnd, periodType}
function _toteatResolveScope(){
  if(!_toteatImport || !_toteatImport.scope) return null;
  const s = _toteatImport.scope;
  if(s.mode==='dia'){
    const d = s.dia || todayISO();
    return {periodStart:d, periodEnd:d, periodType:'dia'};
  }
  if(s.mode==='semana'){
    const r = isoWeekToRange(s.semana || currentISOWeek());
    if(!r) return null;
    return {periodStart:r.start, periodEnd:r.end, periodType:'semana'};
  }
  if(s.mode==='mes'){
    const r = monthToRange(s.mes || currentMonth());
    if(!r) return null;
    return {periodStart:r.start, periodEnd:r.end, periodType:'mes'};
  }
  if(s.mode==='rango'){
    const a = s.rangoFrom, b = s.rangoTo;
    if(!a || !b) return null;
    if(a>b) return null;
    return {periodStart:a, periodEnd:b, periodType:'rango'};
  }
  return null;
}

function cancelToteatImport(){
  _toteatImport = null;
  renderView();
}

// Helpers para manipular la receta de una fila de la propuesta
function _toteatFindRow(toteatId){
  if(!_toteatImport) return null;
  return _toteatImport.proposal.find(x=>x.toteatId===toteatId) || null;
}

function _toteatChangeMatch(toteatId, idx, newPrepId){
  const item = _toteatFindRow(toteatId); if(!item) return;
  if(!newPrepId){
    item.recipe.splice(idx,1);
  } else {
    if(!item.recipe[idx]) item.recipe[idx] = {prepId:newPrepId, units:1};
    else item.recipe[idx].prepId = newPrepId;
  }
  item.matchType = 'manual';
  renderView();
}

function _toteatChangeRecipeUnits(toteatId, idx, newUnits){
  const item = _toteatFindRow(toteatId); if(!item) return;
  if(!item.recipe[idx]) return;
  const n = parseFloat(newUnits);
  item.recipe[idx].units = isNaN(n) ? 1 : Math.max(0, n);
  item.matchType = 'manual';
  _updateToteatSummary();
}

function _toteatAddIngredient(toteatId){
  const item = _toteatFindRow(toteatId); if(!item) return;
  const preps = state.preparations || [];
  if(!preps.length){ toast('No hay preparaciones creadas','warn'); return; }
  // Sugerir una prep que aún no esté en la receta
  const used = new Set(item.recipe.map(r=>r.prepId));
  const next = preps.find(p=>!used.has(p.id)) || preps[0];
  item.recipe.push({prepId: next.id, units: 1});
  item.matchType = 'manual';
  renderView();
}

function _toteatAssignFromIgnored(toteatId, prepId){
  const item = _toteatFindRow(toteatId); if(!item) return;
  if(!prepId){ item.recipe = []; }
  else { item.recipe = [{prepId, units:1}]; }
  item.matchType = prepId ? 'manual' : 'none';
  renderView();
}

function _toteatChangeQty(toteatId, newQty){
  const item = _toteatFindRow(toteatId); if(!item) return;
  const n = parseInt(newQty)||0;
  item.qty = n < 0 ? 0 : n;
  _updateToteatSummary();
}

function _updateToteatSummary(){
  if(!_toteatImport) return;
  const sum = document.getElementById('toteatSummary');
  if(!sum) return;
  const matched = _toteatImport.proposal.filter(p=>p.recipe && p.recipe.length);
  const ignored = _toteatImport.proposal.filter(p=>!p.recipe || p.recipe.length===0);
  const totalSold = matched.reduce((a,b)=>a+Number(b.qty||0),0);
  const ignoredUds = ignored.reduce((a,b)=>a+Number(b.qty||0),0);
  // Total real de unidades de inventario que se descontarán (qty * units sumados)
  const totalDeduct = matched.reduce((a,b)=> a + Number(b.qty||0)*b.recipe.reduce((x,y)=>x+Number(y.units||0),0), 0);
  sum.innerHTML = `<strong>${matched.length}</strong> productos cruzados, <strong>${totalSold} ventas</strong> → descontará <strong>${fmtUds(totalDeduct)} uds</strong> de inventario. <span class="soft">${ignored.length} ignorados (${ignoredUds} uds, sin receta).</span>`;
  const btn = document.getElementById('btnConfirmToteat');
  if(btn) btn.disabled = (matched.length===0 || totalDeduct===0);
}

function renderToteatProposal(){
  if(!_toteatImport) return '';
  const {date, proposal, fileName, format} = _toteatImport;
  const preps = state.preparations || [];
  // Asegurar que el scope existe (importaciones antiguas no lo traen)
  if(!_toteatImport.scope){
    _toteatImport.scope = {
      mode:'dia',
      dia: date || todayISO(),
      semana: currentISOWeek(),
      mes: currentMonth(),
      rangoFrom: date || todayISO(),
      rangoTo: date || todayISO()
    };
  }
  const scope = _toteatImport.scope;
  const resolved = _toteatResolveScope();
  const resolvedTxt = resolved
    ? (resolved.periodType==='dia'
        ? `Día ${fmtDateShort(resolved.periodStart)}`
        : `${periodLabel(resolved.periodType)}: ${fmtDateShort(resolved.periodStart)} → ${fmtDateShort(resolved.periodEnd)}`)
    : '⚠️ scope inválido';

  // Verificar si ya hay una venta del período (para evitar duplicado accidental)
  const dupVenta = resolved ? (state.sales||[]).find(v =>
    v.periodType===resolved.periodType &&
    v.periodStart===resolved.periodStart &&
    v.periodEnd===resolved.periodEnd
  ) : null;

  // Agrupar: con receta vs sin receta
  const matched = proposal.filter(p=>p.recipe && p.recipe.length);
  const ignored = proposal.filter(p=>!p.recipe || p.recipe.length===0);
  const totalSold = matched.reduce((a,b)=>a+Number(b.qty||0),0);
  const ignoredUds = ignored.reduce((a,b)=>a+Number(b.qty||0),0);
  const totalDeduct = matched.reduce((a,b)=> a + Number(b.qty||0)*b.recipe.reduce((x,y)=>x+Number(y.units||0),0), 0);

  // Helper para render de un ingrediente de la receta
  const renderIngredient = (p, ing, idx) => {
    const prepOpts = preps.map(pp=>{
      const ppProd = state.products.find(x=>x.id===pp.productId);
      const label = `${ppProd?ppProd.name:'—'} — ${pp.name}`;
      return `<option value="${pp.id}" ${pp.id===ing.prepId?'selected':''}>${escapeHtml(label)}</option>`;
    }).join('');
    return `<div style="display:flex;gap:6px;align-items:center;margin-bottom:4px">
      <input type="number" min="0" step="0.5" value="${ing.units}" title="Unidades por venta" style="width:60px;text-align:right" oninput="_toteatChangeRecipeUnits('${p.toteatId}', ${idx}, this.value)">
      <span class="soft tiny">×</span>
      <select onchange="_toteatChangeMatch('${p.toteatId}', ${idx}, this.value)" style="flex:1;max-width:240px">
        ${prepOpts}
        <option value="">— Quitar —</option>
      </select>
    </div>`;
  };

  return `
  <div class="card" id="toteatProposal" style="border-left:4px solid var(--gold)">
    <div class="card-title">
      <span>📊 Propuesta de venta desde Toteat</span>
      <span class="tiny soft">${escapeHtml(fileName||'archivo')}</span>
    </div>
    <div style="background:#fbf6e8;border-left:3px solid var(--gold);padding:10px 12px;border-radius:4px;margin-bottom:12px">
      <strong>Fecha detectada en el archivo:</strong> ${escapeHtml(date||'(no detectada)')} · <span class="soft tiny">Formato: ${escapeHtml(format||'?')}</span><br>
      <span id="toteatSummary"><strong>${matched.length}</strong> productos cruzados, <strong>${totalSold} ventas</strong> → descontará <strong>${fmtUds(totalDeduct)} uds</strong> de inventario. <span class="soft">${ignored.length} ignorados (${ignoredUds} uds, sin receta).</span></span>
      ${dupVenta?`<br><span class="badge danger" style="margin-top:6px;display:inline-block">⚠️ Ya existe una venta registrada para ${escapeHtml(resolved?resolved.periodStart:'?')}${resolved && resolved.periodStart!==resolved.periodEnd?(' → '+resolved.periodEnd):''} (${escapeHtml(periodLabel((resolved||{}).periodType||'dia'))}). Si confirmas, se creará una segunda entrada.</span>`:''}
    </div>

    <div style="background:#f4f7ee;border:1px solid #d8dfca;padding:10px 12px;border-radius:4px;margin-bottom:12px">
      <div style="font-weight:600;margin-bottom:6px">📅 ¿A qué período corresponden estas ventas?</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:8px">
        <button class="small ${scope.mode==='dia'?'primary':''}" onclick="_toteatSetScope('dia')">Día</button>
        <button class="small ${scope.mode==='semana'?'primary':''}" onclick="_toteatSetScope('semana')">Semana</button>
        <button class="small ${scope.mode==='mes'?'primary':''}" onclick="_toteatSetScope('mes')">Mes</button>
        <button class="small ${scope.mode==='rango'?'primary':''}" onclick="_toteatSetScope('rango')">Rango</button>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center">
        ${scope.mode==='dia' ? `
          <label style="margin:0">Fecha</label>
          <input type="date" value="${escapeHtml(scope.dia||date||todayISO())}" onchange="_toteatUpdateScopeField('dia', this.value); _toteatSetScope('dia')" style="width:auto">
        ` : ''}
        ${scope.mode==='semana' ? `
          <label style="margin:0">Semana</label>
          <input type="week" value="${escapeHtml(scope.semana||currentISOWeek())}" onchange="_toteatUpdateScopeField('semana', this.value); _toteatSetScope('semana')" style="width:auto">
        ` : ''}
        ${scope.mode==='mes' ? `
          <label style="margin:0">Mes</label>

function confirmToteatImport(){
  if(!_toteatImport){ toast('Sin importación pendiente','warn'); return; }
  // Resolver el scope elegido por el usuario (día/semana/mes/rango)
  const resolved = _toteatResolveScope();
  if(!resolved){ toast('Selecciona un período válido (día / semana / mes / rango)','warn'); return; }
  const {periodStart, periodEnd, periodType} = resolved;
  const date = periodEnd; // "when" cronológico = último día del período

  // Acumular por prepId aplicando la receta: para cada fila con qty Q y receta [{prepId, units}],
  //   sumar Q * units al prepId correspondiente. Una fila Toteat puede aportar a varias preps.
  const acum = {};
  _toteatImport.proposal.forEach(p=>{
    if(!p.recipe || !p.recipe.length || !p.qty) return;
    p.recipe.forEach(ing=>{
      if(!ing.prepId) return;
      const u = Number(ing.units||0);
      if(u<=0) return;
      acum[ing.prepId] = (acum[ing.prepId]||0) + Number(p.qty)*u;
    });
  });
  // Las unidades de inventario son enteras → redondeamos a entero. Si quedó algo < 0.5, se descarta.
  const items = Object.keys(acum)
    .map(prepId => ({prepId, units: Math.round(acum[prepId])}))
    .filter(x=>x.units>0);
  if(items.length===0){
    toast('No hay productos cruzados con cantidad > 0','warn');
    return;
  }

  // Guardar/actualizar mapeos Toteat -> receta (memoria persistente)
  if(!state.toteatMap) state.toteatMap = {};
  let saved = 0, updated = 0;
  _toteatImport.proposal.forEach(p=>{
    if(!p.recipe || !p.recipe.length) return;
    const cleanRecipe = p.recipe
      .filter(r=>r.prepId && Number(r.units)>0)
      .map(r=>({prepId:r.prepId, units:Number(r.units)}));
    if(!cleanRecipe.length) return;
    const prev = state.toteatMap[p.toteatId];
    state.toteatMap[p.toteatId] = {
      toteatName: p.name,
      recipe: cleanRecipe
    };
    if(!prev) saved++;
    else if(JSON.stringify(prev.recipe) !== JSON.stringify(cleanRecipe)) updated++;
  });

  // Crear la venta con el período elegido (día/semana/mes/rango)
  const v = {
    id: uid(),
    when: periodEnd,                // cronología = último día del período
    periodStart,
    periodEnd,
    periodType,
    items,
    notes: `Importado desde Toteat (${_toteatImport.fileName||'export.xls'})`,
    userId: session.name,
    source: 'toteat'
  };
  state.sales.push(v);
  const totUds = items.reduce((a,b)=>a+b.units,0);
  const mapNote = (saved>0||updated>0) ? ` — mapeos: ${saved} nuevos, ${updated} actualizados` : '';
  const periodTxt = periodType==='dia'
    ? `del ${fmtDateShort(periodStart)}`
    : `${periodLabel(periodType)} ${fmtDateShort(periodStart)} → ${fmtDateShort(periodEnd)}`;
  logMovement('venta', `Venta ${periodTxt} importada desde Toteat: ${totUds} uds`,
    items.map(it=>{const p=state.preparations.find(x=>x.id===it.prepId);return `${p?p.name:'—'}×${it.units}`}).join(', ')
    + mapNote,
    {items: items.map(it=>({prepId:it.prepId, units:it.units})), periodStart, periodEnd, periodType, notes: 'Toteat'}
  );

  _toteatImport = null;
  saveState();
  renderView();
  toast(`Venta ${periodTxt} creada: ${totUds} uds (${items.length} prep.)${saved+updated>0?`. ${saved+updated} mapeos guardados.`:''}`);
}

/* ---------- ADMIN: GESTIÓN DE MAPEOS TOTEAT (Config) ---------- */
let _toteatMapFilter = '';
let _toteatMapView = 'preps'; // 'preps' (preparation-centric) | 'ids' (toteat-centric)

function _buildPrepToToteatIndex(){
  const tmap = state.toteatMap || {};
  const preps = state.preparations || [];
  const idx = {};
  preps.forEach(p => idx[p.id] = []);
  Object.keys(tmap).forEach(tid => {
    const m = tmap[tid];
    (m.recipe||[]).forEach(ing => {
      if(!idx[ing.prepId]) idx[ing.prepId] = [];
      idx[ing.prepId].push({toteatId: tid, toteatName: m.toteatName||'', units: ing.units});
    });
  });
  // sort each list by toteatName for stable display
  Object.keys(idx).forEach(k => idx[k].sort((a,b)=>(a.toteatName||'').localeCompare(b.toteatName||'')));
  return idx;
}

function renderToteatMapEditor(){
  const tmap = state.toteatMap || {};
  const preps = state.preparations || [];
  const ids = Object.keys(tmap);
  const prepToToteat = _buildPrepToToteatIndex();

  const q = (_toteatMapFilter||'').toLowerCase().trim();
  const filteredPreps = q
    ? preps.filter(p => {
        const prod = state.products.find(x=>x.id===p.productId);
        const txt = ((prod?prod.name:'')+' '+(p.name||'')).toLowerCase();
        if(txt.includes(q)) return true;
        const tlist = prepToToteat[p.id]||[];
        return tlist.some(t => t.toteatId.toLowerCase().includes(q) || (t.toteatName||'').toLowerCase().includes(q));
      })
    : preps;

  const mappedPreps = preps.filter(p => (prepToToteat[p.id]||[]).length>0).length;

  return `<div class="card">
    <div class="card-title">
      <span>5 · Mapeos Toteat → Preparaciones</span>
      <span class="tiny soft">${mappedPreps}/${preps.length} prep con código · ${ids.length} ID Toteat</span>
    </div>
    <p class="muted" style="margin-top:0">Para cada <strong>preparación</strong> de tu inventario, asocia uno o varios <strong>códigos Toteat</strong>. Ej: <em>Hamburguesa Cocina</em> recibe ventas desde 3 productos: <em>Clásica Simple (×1), Clásica Doble (×2), Con Queso (×1)</em>. Al importar el export Toteat, se descuenta automáticamente la cantidad correcta.</p>

    <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap">
      <input type="text" placeholder="Buscar preparación, ID o nombre Toteat…" value="${escapeHtml(_toteatMapFilter)}" oninput="_toteatMapFilter=this.value;clearTimeout(window._tmT);window._tmT=setTimeout(renderView,200)" style="flex:1;min-width:220px">
      <button class="small" onclick="downloadToteatMapTemplate()" title="Exporta un Excel con todas las preparaciones y sus mapeos actuales">↓ Plantilla Excel</button>
      <input type="file" id="toteatMapFile" accept=".xlsx,.xls" style="display:none" onchange="uploadToteatMapExcel(event)">
      <button class="small" onclick="document.getElementById('toteatMapFile').click()" title="Sube un Excel con los códigos Toteat de cada preparación">📤 Subir Excel</button>
      <button class="small" onclick="toggleToteatMapView()" title="Cambiar vista">${_toteatMapView==='preps'?'Vista por ID Toteat':'Vista por Preparación'}</button>
    </div>

    ${preps.length===0
      ? '<div class="empty-state soft"><div class="icon">📋</div><div>Aún no hay preparaciones. Crea preparaciones en Productos · Preparaciones primero, luego vuelve aquí para asociarles códigos Toteat.</div></div>'
      : _toteatMapView==='ids'
        ? _renderToteatMapByIds(tmap, preps, q)
        : _renderToteatMapByPreps(filteredPreps, prepToToteat)}

            ? '<div class="soft tiny" style="margin:4px 0">Sin códigos Toteat asociados.</div>'

function _renderToteatMapByIds(tmap, preps, q){

  if(ids.length===0) return '<div class="empty-state soft"><div class="icon">🔗</div><div>Sin mapeos todavía. Usa la vista <strong>Por Preparación</strong> y asigna IDs, o importa un Excel.</div></div>';

    <tbody>${filtered.map(id=>{

              <select onchange="_editToteatMapPrep('${id}', ${idx}, this.value)" style="flex:1;max-width:240px">

                }).join('')}
                <option value="">— Quitar —</option>
              </select>
            </div>`;
          }).join('')}
          <button class="small" onclick="_addToteatMapIngredient('${id}')">+ ingrediente</button>
        </td>
        <td><button class="small danger" onclick="deleteToteatMapping('${id}')">Eliminar</button></td>

function toggleToteatMapView(){
  _toteatMapView = _toteatMapView==='preps' ? 'ids' : 'preps';
  renderView();
}

function addToteatMappingForPrep(prepId){
  const prep = (state.preparations||[]).find(p=>p.id===prepId);
  if(!prep) return;
  const tid = (prompt(`Código Toteat para asociar a "${prep.name}":\n(Ej: 4010)`,'')||'').trim();
  if(!tid) return;

  if(!state.toteatMap) state.toteatMap = {};
  const existing = state.toteatMap[tid];

  if(existing){
    if(!Array.isArray(existing.recipe)) existing.recipe = [];
    if(existing.recipe.find(r=>r.prepId===prepId)){
      toast(`El ID ${tid} ya está asociado a "${prep.name}"`,'warn');
      return;
    }
    const uRaw = prompt(`El ID ${tid} ya existe ("${existing.toteatName||tid}").\n¿Cuántas unidades de "${prep.name}" se descuentan por cada venta?`,'1');
    const u = parseFloat(uRaw);
    if(isNaN(u)||u<=0) return;
    existing.recipe.push({prepId: prepId, units: u});
    saveState();
    renderView();
    toast(`"${prep.name}" agregada a la receta de ${tid} (×${u})`);
    return;
  }

  const name = (prompt(`Nombre del producto en Toteat (ej: Clásica Doble):`, prep.name||'')||'').trim();
  if(!name) return;
  const uRaw = prompt(`¿Cuántas unidades de "${prep.name}" se descuentan por cada venta de "${name}"?`,'1');
  const u = parseFloat(uRaw);
  if(isNaN(u)||u<=0) return;

  state.toteatMap[tid] = {
    toteatName: name,
    recipe: [{prepId: prepId, units: u}]
  };
  saveState();
  renderView();
  toast(`Mapeo creado: ${tid} (${name}) → ${u}× ${prep.name}`);
}

function removeToteatMappingFromPrep(prepId, toteatId){
  const m = (state.toteatMap||{})[toteatId];
  if(!m) return;
  const prep = (state.preparations||[]).find(p=>p.id===prepId);
  if(!confirm(`¿Quitar "${prep?prep.name:'esta preparación'}" de la receta del ID ${toteatId} (${m.toteatName||''})?`)) return;
  m.recipe = (m.recipe||[]).filter(r=>r.prepId!==prepId);
  if(m.recipe.length===0){
    delete state.toteatMap[toteatId];
    toast(`Mapeo de ID ${toteatId} eliminado (receta vacía)`);
  } else {
    toast(`Ingrediente quitado del ID ${toteatId}`);
  }
  saveState();
  renderView();
}

function editToteatMappingForPrep(prepId, toteatId){
  const m = (state.toteatMap||{})[toteatId];
  if(!m) return;
  const prep = (state.preparations||[]).find(p=>p.id===prepId);
  if(!prep) return;
  const ing = (m.recipe||[]).find(r=>r.prepId===prepId);
  if(!ing) return;

  const newName = (prompt(`Nombre del producto en Toteat (ID ${toteatId}):`, m.toteatName||'')||'').trim();
  if(!newName) return;
  const uRaw = prompt(`Unidades de "${prep.name}" por venta de "${newName}":`, String(ing.units));
  const u = parseFloat(uRaw);
  if(isNaN(u)||u<=0) return;
  m.toteatName = newName;
  ing.units = u;
  saveState();
  renderView();
  toast(`Mapeo actualizado`);
}

function downloadToteatMapTemplate(){
  if(typeof XLSX === 'undefined'){ toast('Librería Excel no cargada. Recarga la página.','warn'); return; }
  const preps = state.preparations || [];
  if(preps.length===0){ toast('No hay preparaciones para exportar','warn'); return; }
  const prepToToteat = _buildPrepToToteatIndex();

  // Una fila por (preparación × código Toteat). Preparaciones sin código aparecen igual (1 fila con códigos en blanco).
  const dataRows = [
    ['CLAVE PREP (no modificar)','Producto','Preparación','ID Toteat','Producto Toteat','Unidades por venta']
  ];
  preps.forEach(p=>{
    const prod = state.products.find(x=>x.id===p.productId);
    const list = prepToToteat[p.id] || [];
    if(list.length===0){
      dataRows.push([p.id, prod?prod.name:'—', p.name||'', '', '', '']);
    } else {
      list.forEach(t => dataRows.push([p.id, prod?prod.name:'—', p.name||'', t.toteatId, t.toteatName, t.units]));
    }
  });

  const wsMap = XLSX.utils.aoa_to_sheet(dataRows);
  wsMap['!cols'] = [{wch:14},{wch:24},{wch:24},{wch:14},{wch:30},{wch:18}];

  const instr = [
    ['LA OVERA — Plantilla de Mapeos Toteat'],
    [''],
    ['Generada: ' + new Date().toLocaleString('es-CL')],
    [''],
    ['Cómo usar la plantilla'],
    ['1. Ve a la hoja "Mapeos".'],
    ['2. Para cada preparación, escribe en las columnas ID Toteat / Producto Toteat / Unidades el código que corresponde.'],
    ['3. Si una misma preparación recibe ventas desde varios productos Toteat (ej: Hamburguesa Cocina <- Clásica Simple, Clásica Doble, Con Queso), copia la fila tantas veces como códigos tenga, cambiando ID/Producto/Unidades en cada una.'],
    ['4. Si un mismo producto Toteat descuenta varias preparaciones (ej: Sandwich Mixto = 1 pan + 1 hamburguesa), pon el mismo ID Toteat en las filas de cada preparación involucrada, con las unidades correspondientes.'],
    ['5. NO modifiques la columna "CLAVE PREP". Esa columna identifica internamente la preparación.'],
    ['6. Guarda el archivo y súbelo con el botón "📤 Subir Excel" en Config → Mapeos Toteat.'],
    [''],
    ['Reglas'],
    ['• Filas con ID Toteat en blanco se ignoran (la preparación queda sin código nuevo).'],
    ['• Al subir, SE REEMPLAZAN los mapeos de los IDs Toteat que aparezcan en el archivo. Los IDs no presentes en el archivo NO se tocan.'],
    ['• Si quieres limpiar un mapeo, edítalo directamente en la plataforma (botón × en cada chip).'],
    ['• Las columnas Producto/Preparación son solo para tu referencia visual; el sistema usa la columna CLAVE PREP.']
  ];
  const wsHelp = XLSX.utils.aoa_to_sheet(instr);
  wsHelp['!cols'] = [{wch:100}];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, wsMap, 'Mapeos');
  XLSX.utils.book_append_sheet(wb, wsHelp, 'Instrucciones');

  const fname = `Plantilla_Mapeos_Toteat_${new Date().toISOString().slice(0,10)}.xlsx`;
  XLSX.writeFile(wb, fname);

}

function uploadToteatMapExcel(ev){
  if(typeof XLSX === 'undefined'){ toast('Librería Excel no cargada. Recarga la página.','warn'); return; }
  const f = ev.target.files && ev.target.files[0];
  if(!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const sheetName = wb.SheetNames.find(n => /mapeo/i.test(n)) || wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

      let headerIdx = -1;
      for(let i=0;i<Math.min(rows.length,10);i++){
        if(rows[i] && rows[i].some(c => String(c||'').toUpperCase().includes('CLAVE PREP'))){ headerIdx = i; break; }
      }
      if(headerIdx === -1){ toast('No encontré la fila de encabezado (CLAVE PREP). ¿Usaste la plantilla?','warn'); ev.target.value=''; return; }
      const header = rows[headerIdx].map(c=>String(c||'').trim().toLowerCase());
      const prepCol  = header.findIndex(h => h.includes('clave prep'));
      const idCol    = header.findIndex(h => h.includes('id toteat'));
      const nameCol  = header.findIndex(h => h.includes('producto toteat'));
      const unitsCol = header.findIndex(h => h.includes('unidades'));
      if(prepCol === -1 || idCol === -1){ toast('Faltan columnas CLAVE PREP o ID Toteat','warn'); ev.target.value=''; return; }

      const newMaps = {};
      const seenIds = new Set();
      const validPrepIds = new Set((state.preparations||[]).map(p=>p.id));
      let skipped = 0;

      for(let i=headerIdx+1;i<rows.length;i++){
        const row = rows[i]; if(!row) continue;
        const prepId = String(row[prepCol]||'').trim();
        const tid = String(row[idCol]||'').trim();
        if(!prepId || !tid) continue;
        if(!validPrepIds.has(prepId)){ skipped++; continue; }
        const tname = nameCol>=0 ? String(row[nameCol]||'').trim() : '';
        const uRaw = unitsCol>=0 ? row[unitsCol] : 1;
        const u = parseFloat(uRaw);
        const units = (isNaN(u)||u<=0) ? 1 : u;
        seenIds.add(tid);
        if(!newMaps[tid]) newMaps[tid] = {toteatName: tname, recipe: []};
        if(tname && !newMaps[tid].toteatName) newMaps[tid].toteatName = tname;
        const existingIng = newMaps[tid].recipe.find(r=>r.prepId===prepId);
        if(existingIng){ existingIng.units = units; } else { newMaps[tid].recipe.push({prepId, units}); }
      }

      if(seenIds.size===0){
        toast('No se detectó ningún mapeo válido en el archivo','warn');
        ev.target.value='';
        return;
      }

      const reemplazos = [...seenIds].filter(t => (state.toteatMap||{})[t]).length;
      const nuevos = seenIds.size - reemplazos;
      const ok = confirm(`Se aplicarán ${seenIds.size} mapeos:\n  • ${nuevos} nuevos\n  • ${reemplazos} reemplazados${skipped>0?`\n  • ${skipped} filas ignoradas (preparación desconocida)`:''}\n\n¿Continuar?`);
      if(!ok){ ev.target.value=''; return; }

      if(!state.toteatMap) state.toteatMap = {};
      seenIds.forEach(tid => { state.toteatMap[tid] = newMaps[tid]; });
      saveState();
      renderView();
      toast(`${seenIds.size} mapeos aplicados desde Excel`,'ok');
    } catch(err) {
      console.error(err);
      toast('Error leyendo el Excel: '+(err.message||err),'warn');
    } finally {
      ev.target.value = '';
    }
  };
  reader.readAsArrayBuffer(f);
}

function _editToteatMapUnits(toteatId, idx, value){
  const m = (state.toteatMap||{})[toteatId];
  if(!m || !m.recipe || !m.recipe[idx]) return;
  const n = parseFloat(value);
  m.recipe[idx].units = isNaN(n)?1:Math.max(0,n);
  saveState();
  toast('Mapeo actualizado');
}

function _editToteatMapPrep(toteatId, idx, newPrepId){
  const m = (state.toteatMap||{})[toteatId];
  if(!m || !m.recipe || !m.recipe[idx]) return;
  if(!newPrepId){
    m.recipe.splice(idx,1);
    if(m.recipe.length===0){
      delete state.toteatMap[toteatId];
      toast('Mapeo eliminado (receta vacía)');
    } else {
      toast('Ingrediente quitado');
    }
  } else {
    m.recipe[idx].prepId = newPrepId;
    toast('Mapeo actualizado');
  }
  saveState();
  renderView();
}

function _addToteatMapIngredient(toteatId){
  const m = (state.toteatMap||{})[toteatId];
  if(!m) return;
  const preps = state.preparations || [];
  if(!preps.length){ toast('No hay preparaciones creadas','warn'); return; }
  if(!Array.isArray(m.recipe)) m.recipe = [];
  const used = new Set(m.recipe.map(r=>r.prepId));
  const next = preps.find(p=>!used.has(p.id)) || preps[0];
  m.recipe.push({prepId: next.id, units: 1});
  saveState();
  renderView();
  toast('Ingrediente agregado');
}

function addToteatMapping(){
  const tid = (prompt('ID Toteat del producto (ej: 4010):','')||'').trim();
  if(!tid) return;
  if((state.toteatMap||{})[tid]){
    if(!confirm(`Ya existe un mapeo para ID ${tid}. ¿Sobrescribir?`)) return;
  }
  const name = (prompt('Nombre del producto en Toteat (ej: Clásica Doble):','')||'').trim();
  if(!name) return;
  const preps = state.preparations || [];
  if(!preps.length){ toast('Crea preparaciones primero','warn'); return; }
  if(!state.toteatMap) state.toteatMap = {};
  state.toteatMap[tid] = {
    toteatName: name,
    recipe: [{prepId: preps[0].id, units: 1}]
  };
  saveState();
  renderView();
  toast(`Mapeo creado para ID ${tid}. Edita la receta abajo.`);
}

function deleteToteatMapping(toteatId){
  const m = (state.toteatMap||{})[toteatId];
  if(!m) return;
  if(!confirm(`¿Eliminar el mapeo de "${m.toteatName||toteatId}"?\n\nNo afecta ventas ya registradas. Próximas importaciones tratarán este producto como sin asociación.`)) return;
  delete state.toteatMap[toteatId];
  saveState();
  renderView();
  toast('Mapeo eliminado');
}

// Variable de módulo para guardar la foto comprimida lista para subir
let _koPendingPhoto = null;
// Resultado del OCR para la foto actual: {hasMarker, detected: {prepId: qty}, rawText}
let _planillaOcrResult = null;

async function handlePhotoOrderFile(input){
  const file = input.files && input.files[0];
  if(!file){
    _koPendingPhoto = null;
    _planillaOcrResult = null;
    document.getElementById('koPreview').style.display = 'none';
    const ocrPrev = document.getElementById('koOcrPreview'); if(ocrPrev) ocrPrev.style.display = 'none';
    return;
  }
  if(file.size > 15*1024*1024){ toast('Foto demasiado grande (>15MB). Intenta menor resolución.', 'warn'); input.value=''; return; }
  try {
    // Dos versiones:
    //  - dataUrlStore: comprimida 1400px / 0.62 para guardar en el pedido (cloud sync)
    //  - dataUrlOcr: alta resolución 2400px / 0.92 para que Tesseract pueda leer los números chicos
    const dataUrlStore = await compressImageToDataUrl(file, 1400, 0.62);
    const dataUrlOcr   = await compressImageToDataUrl(file, 2400, 0.92);
    _koPendingPhoto = dataUrlStore;
    const img = document.getElementById('koPreviewImg');
    img.src = dataUrlStore;
    const sizeKB = Math.round((dataUrlStore.length * 0.75) / 1024);
    const ocrKB  = Math.round((dataUrlOcr.length * 0.75) / 1024);
    document.getElementById('koPreviewInfo').textContent =
      `Foto guardada ≈ ${sizeKB} KB · OCR usando alta resolución (${ocrKB} KB). Analizando…`;
    document.getElementById('koPreview').style.display = 'block';
    await runPlanillaOcr(dataUrlOcr);
  } catch(e){
    toast('Error procesando la foto: '+(e.message||e), 'warn');
  }
}

// Parser: extrae R-codes + cantidades de un texto OCR de la planilla SEMANAL.
// Formato esperado por fila:  R##  Nombre  uds  Fecha1 Pedido1 Fecha2 Pedido2 ... Fecha7 Pedido7
// Devuelve detected[prepId] = [q0..q6] (lunes..domingo, null si vacío).
// También soporta planilla legacy de 1 columna (V3): devuelve [qty] de 1 elemento.
function parsePlanillaText(text){
  if(!text) return {hasMarker:false, detected:{}, todayIdx:_todayWeekdayIdx()};
  // Marker semanal W1 o legacy V3 (tolerante a OCR sin ##)
  const hasMarker = /##\s*PEDIDO[-\s]?COC[-\s]?W1\s*##/i.test(text)
                 || /PEDIDO[\s-]?COC[\s-]?W1/i.test(text)
                 || /##\s*PEDIDO[-\s]?COC[-\s]?V?3\s*##/i.test(text)
                 || /PEDIDO[\s-]?COC[\s-]?V?3/i.test(text);
  const isWeekly = /PEDIDO[\s-]?COC[\s-]?W1/i.test(text);
  const rCodeMap = _getPlanillaRCodeMap();
  const detected = {};
  const lines = text.split(/\r?\n/);
  // Regex de fecha: dd-mm-yy, dd/mm/yyyy, dd.mm.yy o dd,mm,yy (NO usa \s para no comerse cantidades adyacentes).
  const dateRe = /(\d{1,2})[-./,](\d{1,2})[-./,](\d{2,4})/g;
  lines.forEach(line => {
    const m = line.match(/\bR\s*(\d{1,2})\b/i);
    if(!m) return;
    const rNum = parseInt(m[1], 10);
    const rCode = 'R' + String(rNum).padStart(2,'0');
    const prep = rCodeMap[rCode];
    if(!prep) return;
    // Encontrar todas las fechas en la línea, en orden
    const dateMatches = [];
    const dr = new RegExp(dateRe.source, 'g');
    let dm;
    while((dm = dr.exec(line)) !== null){
      dateMatches.push({start: dm.index, end: dm.index + dm[0].length});
    }
    // Filtro auxiliar: descarta gramaje + número de R-code
    const cleanNums = (seg) => (seg.match(/\d+/g)||[])
        .map(n=>parseInt(n,10))
        .filter(n => n !== rNum && (!prep.grams || n !== prep.grams) && n >= 0 && n < 1000);

    if(dateMatches.length === 0){
      // Formato legacy 1-columna: toma el último número útil
      const filtered = cleanNums(line);
      if(filtered.length === 0) return;
      detected[prep.id] = [filtered[filtered.length - 1]];
      return;
    }
    // Por cada slot entre fechas, extrae la cantidad (último número útil del segmento)
    const slots = [];
    for(let i=0; i<dateMatches.length; i++){
      const sliceStart = dateMatches[i].end;
      const sliceEnd = (i+1 < dateMatches.length) ? dateMatches[i+1].start : line.length;
      const segment = line.substring(sliceStart, sliceEnd);
      const nums = cleanNums(segment);
      slots.push(nums.length ? nums[nums.length - 1] : null);
    }
    // Si vinieron menos de 7 slots (OCR perdió fechas), rellena con null al final
    while(slots.length < 7) slots.push(null);
    detected[prep.id] = slots.slice(0, 7);
  });
  return {hasMarker, detected, rawText: text, isWeekly, todayIdx:_todayWeekdayIdx()};
}

// Aplica el filtro "solo la columna de hoy" sobre el resultado del parser semanal.
// Devuelve {prepId: qty} con cantidades >0 únicamente del slot actual.
function _todayQtyFromResult(result){
  if(!result || !result.detected) return {};
  const idx = (typeof result.todayIdx === 'number') ? result.todayIdx : _todayWeekdayIdx();
  const out = {};
  Object.entries(result.detected).forEach(([prepId, slots])=>{
    const arr = Array.isArray(slots) ? slots : [slots];
    let q;
    if(arr.length === 1){
      // Legacy single-column: lo aceptamos como pedido de hoy
      q = arr[0];
    } else {
      q = arr[idx];
    }
    if(q != null && q > 0) out[prepId] = q;
  });
  return out;
}

async function runPlanillaOcr(dataUrl){
  const statusEl = document.getElementById('koOcrStatus');
  const setStatus = (msg, cls)=>{ if(statusEl){ statusEl.textContent = msg; statusEl.className = 'tiny ' + (cls||''); } };
  if(typeof Tesseract === 'undefined'){
    setStatus('OCR no disponible. Puedes igualmente enviar para validación manual.', 'soft');
    _planillaOcrResult = {hasMarker:false, detected:{}, rawText:''};
    renderPlanillaOcrPreview();
    return;
  }
  setStatus('🔍 Analizando foto (esto puede tardar 10–30 seg)…', 'soft');
  try {
    // Config orientada a tablas con celdas pequeñas:
    //  - tessedit_pageseg_mode: 6 → bloque uniforme (mejor para tablas que 'auto')
    //  - preserve_interword_spaces: '1' → conserva separación entre fechas/cantidades
    //  - 'spa+eng' → mejor reconocimiento de números y mezcla con texto en español
    const res = await Tesseract.recognize(dataUrl, 'spa+eng', {
      logger: m => {
        if(m && m.status==='recognizing text' && typeof m.progress==='number'){
          setStatus(`🔍 Reconociendo texto (${Math.round(m.progress*100)}%)…`, 'soft');
        }
      },
      tessedit_pageseg_mode: '6',
      preserve_interword_spaces: '1'
    });
    const text = (res && res.data && res.data.text) || '';
    _planillaOcrResult = parsePlanillaText(text);
    _planillaOcrResult.todayDetected = _todayQtyFromResult(_planillaOcrResult);
    const todayN = Object.keys(_planillaOcrResult.todayDetected).length;
    const totalN = Object.keys(_planillaOcrResult.detected).length;
    const dayLbl = _weekdayLabel(_planillaOcrResult.todayIdx);
    if(_planillaOcrResult.hasMarker){
      setStatus(`✅ Planilla reconocida. Procesando columna de HOY (${dayLbl}). ${todayN} cantidades autocompletadas — revísalas antes de confirmar.`, 'soft');
    } else if(totalN > 0){
      setStatus(`⚠ Marcador no detectado. Para ${dayLbl} se leyeron ${todayN} ítems. Revisa que sea la planilla oficial.`, 'soft');
    } else {
      setStatus(`⚠ No se reconocieron cantidades. La letra a mano es difícil para el OCR — completa el pedido a mano abajo. Tip: foto de cerca, planilla plana, buena luz, sin sombras.`, 'soft');
    }
  } catch(e){
    setStatus('Error en OCR: '+(e.message||e)+'. Puedes completar el pedido manualmente abajo.', 'soft');
    _planillaOcrResult = {hasMarker:false, detected:{}, rawText:''};
  }
  renderPlanillaOcrPreview();
}

// Pinta el borrador editable agrupado por producto (igual layout que la planilla).
// Importante: solo muestra cantidades de la COLUMNA DE HOY (filtra pasadas/futuras).

  const host = document.getElementById('koOcrItems');
  const wrap = document.getElementById('koOcrPreview');
  const badge = document.getElementById('koOcrMarkerBadge');
  if(!host || !wrap) return;
  const result = _planillaOcrResult || {hasMarker:false, detected:{}, todayIdx:_todayWeekdayIdx()};
  const todayQty = result.todayDetected || _todayQtyFromResult(result);
  const dayLbl = _weekdayLabel(typeof result.todayIdx==='number' ? result.todayIdx : _todayWeekdayIdx());
  const fechaHoy = new Date().toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit',year:'2-digit'});

  if(badge){
    if(result.hasMarker){
      badge.textContent = '✓ Planilla oficial detectada';
      badge.className = 'badge ok';
    } else {
      badge.textContent = '⚠ Marcador no detectado';
      badge.className = 'badge warn';
    }
  }
  // Header informativo del día que se está procesando
  const headerInfo = `<div id="koOcrDayHeader" style="background:#FFFBE6;border:1px solid #F0D870;border-radius:6px;padding:8px 12px;margin-bottom:8px;font-size:13px">
    📅 <strong>Procesando columna: ${dayLbl} ${fechaHoy}</strong>
    <span class="tiny soft" style="margin-left:8px">Las cantidades de días pasados o futuros se ignoran.</span>
  </div>`;

  // ¿Ya existe pedido para hoy?
  const todayISO = new Date().toISOString().slice(0,10);
  const dup = (state.orders||[]).find(o => o.fechaPlanilla === todayISO &&
                                          (o.status === 'pendiente' || o.status === 'despachado'));
  const dupBanner = dup
    ? `<div id="koOcrDupBanner" style="background:#FDECEA;border:1px solid #E07B6F;border-radius:6px;padding:8px 12px;margin-bottom:8px;font-size:13px;color:#8B2C1E">
        ⚠ <strong>Ya existe un pedido para hoy</strong> (estado: <em>${escapeHtml(dup.status)}</em>). No se puede crear otro. Edítalo o anúlalo en Despacho primero.
      </div>`
    : '';

  // Agrupar por producto, en orden de inserción
  const grupos = new Map();
  state.preparations.forEach((pr, i)=>{
    const prod = state.products.find(p=>p.id===pr.productId);
    const baseName = prod?prod.name:'Otros';
    if(!grupos.has(baseName)) grupos.set(baseName, []);
    grupos.get(baseName).push({pr, rCode: 'R' + String(i+1).padStart(2,'0')});
  });
  const rows = [];
  rows.push(headerInfo);
  if(dupBanner) rows.push(dupBanner);
  grupos.forEach((items, base)=>{
    rows.push(`<div style="background:#4A6B3A;color:#fff;padding:4px 10px;font-weight:bold;font-size:12px;border-radius:4px;margin-top:8px">${escapeHtml(base.toUpperCase())}</div>`);
    items.forEach(({pr, rCode})=>{
      const detectedQty = todayQty[pr.id];
      const isAuto = detectedQty !== undefined;
      const val = isAuto ? detectedQty : 0;
      const flag = isAuto
        ? `<span class="badge ok" style="font-size:10px">OCR ${detectedQty}</span>`
        : `<span class="badge soft" style="font-size:10px">manual</span>`;
      const unit = pr.grams ? (pr.grams + ' g · uds') : 'uni';
      rows.push(`
        <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid var(--border);flex-wrap:wrap">
          <span class="soft" style="font-family:monospace;min-width:36px">${rCode}</span>
          <span style="flex:1;min-width:140px">${escapeHtml(pr.name)} <span class="soft tiny">(${unit})</span></span>
          ${flag}
          <span style="display:flex;align-items:center;gap:4px">
            <button class="qty-btn small" onclick="qtyEditPlanilla('${pr.id}',-1)">−</button>
            <input id="koq-${pr.id}" type="number" min="0" value="${val}" style="width:64px;text-align:center" oninput="_updatePlanillaSummary()">
            <button class="qty-btn small" onclick="qtyEditPlanilla('${pr.id}',1)">+</button>
          </span>
        </div>
      `);
    });
  });
  host.innerHTML = rows.join('');
  wrap.style.display = 'block';
  // Llenar área de debug con texto OCR crudo
  const rawEl = document.getElementById('koOcrRawText');
  if(rawEl){
    rawEl.textContent = (result.rawText || '(sin texto OCR)').slice(0, 4000);
  }
  _updatePlanillaSummary();
}

function qtyEditPlanilla(prepId, delta){
  const inp = document.getElementById('koq-'+prepId);
  if(!inp) return;

  _updatePlanillaSummary();
}

// Parsea texto pegado del usuario (tipicamente respuesta de Claude visión).
// Acepta:
//   - JSON estricto: {"R01": 11, "R04": 6}
//   - JSON con texto alrededor: extraerá el primer bloque {...}
//   - Lista "R01: 11" / "R01=11" / "R01 11" / "R01,11"  (1 por línea o separados por coma)
// Devuelve {rcode: qty, ...}
function parsePastedOcrText(text){
  const out = {};
  if(!text || typeof text !== 'string') return out;
  // Intento 1: JSON con bloque {...}
  const jsonMatch = text.match(/\{[\s\S]*?\}/);
  if(jsonMatch){
    try {
      const parsed = JSON.parse(jsonMatch[0]);
      Object.entries(parsed).forEach(([k,v])=>{
        const km = String(k).toUpperCase().match(/R\s*(\d{1,2})/);
        const n = parseInt(v, 10);
        if(km && Number.isFinite(n) && n >= 0 && n < 10000){
          out['R' + String(parseInt(km[1],10)).padStart(2,'0')] = n;
        }
      });
      if(Object.keys(out).length > 0) return out;
    } catch(e) { /* sigue al fallback */ }
  }
  // Intento 2: pares "R01: 11" / "R01 = 11" / "R01 11" / "R01, 11"
  const pairRe = /R\s*(\d{1,2})\s*[:=,\-\s]\s*(\d{1,4})/gi;
  let m;
  while((m = pairRe.exec(text)) !== null){
    const code = 'R' + String(parseInt(m[1],10)).padStart(2,'0');
    const qty = parseInt(m[2],10);
    if(Number.isFinite(qty) && qty >= 0 && qty < 10000){
      out[code] = qty;
    }
  }
  return out;
}

// Aplica el texto pegado al borrador: rellena los inputs koq-<prepId>.
// Llamado por el botón "Aplicar al borrador".
function applyPastedOcr(){
  const ta = document.getElementById('koPasteText');
  const st = document.getElementById('koPasteStatus');
  const setSt = (msg, ok)=>{ if(st){ st.textContent = msg; st.style.color = ok?'#1B5A99':'#8B2C1E'; } };
  if(!ta){ return; }
  const text = ta.value || '';
  if(!text.trim()){ setSt('Pega el resultado de Claude antes de aplicar.', false); return; }
  const map = parsePastedOcrText(text);
  const keys = Object.keys(map);
  if(keys.length === 0){
    setSt('No reconocí pares R##:cantidad. Revisa el formato (JSON o R01: 11).', false);
    return;
  }
  const rCodeMap = _getPlanillaRCodeMap();
  let applied = 0, unknown = [];
  keys.forEach(rcode=>{
    const prep = rCodeMap[rcode];
    if(!prep){ unknown.push(rcode); return; }
    const inp = document.getElementById('koq-'+prep.id);
    if(inp){
      inp.value = map[rcode];
      applied++;
    }
  });
  _updatePlanillaSummary();
  let msg = `✅ Aplicadas ${applied} cantidad${applied===1?'':'es'} al borrador.`;
  if(unknown.length) msg += ` ⚠ R-codes desconocidos: ${unknown.join(', ')}.`;
  setSt(msg, true);
}

function _updatePlanillaSummary(){
  const sumEl = document.getElementById('koOcrSummary');
  if(!sumEl) return;
  let totUds = 0, lineas = 0;
  state.preparations.forEach(pr=>{
    const inp = document.getElementById('koq-'+pr.id);
    if(!inp) return;
    const v = parseInt(inp.value)||0;
    if(v>0){ totUds += v; lineas++; }
  });
  // Verificar duplicado para hoy
  const todayISO = new Date().toISOString().slice(0,10);
  const dup = (state.orders||[]).find(o => o.fechaPlanilla === todayISO &&
                                          (o.status === 'pendiente' || o.status === 'despachado'));
  let msg;
  if(dup){
    msg = `⚠ Pedido de hoy ya existe (${dup.status}). No se puede crear otro.`;
  } else if(totUds===0){
    msg = 'Total: 0 uds. Ajusta cantidades para habilitar el envío.';
  } else {
    msg = `Total: ${totUds} uds en ${lineas} preparación${lineas>1?'es':''}.`;
  }
  sumEl.textContent = msg;
  const btn = document.getElementById('koConfirmBtn');
  if(btn) btn.disabled = (totUds===0) || !!dup;
}

// Cocina confirma el borrador → crea pedido directo en state.orders (status: pendiente).
// Bodega lo verá en Despacho con aceptar/rechazar.
function confirmPlanillaOrder(){
  const items = [];
  state.preparations.forEach(pr=>{
    const inp = document.getElementById('koq-'+pr.id);
    const v = parseInt(inp?inp.value:0)||0;
    if(v>0) items.push({prepId:pr.id, units:v});
  });
  if(items.length===0){ toast('Ingresa al menos una unidad antes de confirmar','warn'); return; }
  // Bloqueo duplicado: ya hay pedido de hoy
  const todayISO = new Date().toISOString().slice(0,10);
  const dup = (state.orders||[]).find(o => o.fechaPlanilla === todayISO &&
                                          (o.status === 'pendiente' || o.status === 'despachado'));
  if(dup){
    toast(`Ya existe un pedido para hoy (${dup.status}). Edítalo o anúlalo antes de crear uno nuevo.`,'warn');
    return;
  }
  // El flujo OCR siempre genera el pedido de HOY (es el día que cocina está fotografiando).
  // Si necesitan registrar otro día, lo hacen por flujo manual.
  const fecha = todayISO;
  const turno = (document.getElementById('koTurno')||{}).value || '';
  const hoja  = ((document.getElementById('koHoja')||{}).value || '').trim();
  const cmt   = ((document.getElementById('koNotes')||{}).value || '').trim();
  const dayLbl = _weekdayLabel(_todayWeekdayIdx());
  const notesParts = [];
  if(turno) notesParts.push('Turno: '+turno);
  if(hoja)  notesParts.push('Hoja Nº '+hoja);
  if(cmt)   notesParts.push(cmt);
  notesParts.push(`📷 Foto OCR · ${dayLbl} ${fecha}`+(_planillaOcrResult && _planillaOcrResult.hasMarker?' (marcador detectado)':''));
  const o = {
    id: uid(),
    when: new Date().toISOString(),
    items,
    notes: notesParts.join(' · '),
    status: 'pendiente',
    userId: session.name,
    source: 'foto-ocr',
    photo: _koPendingPhoto || null,
    fechaPlanilla: fecha
  };
  state.orders.push(o);
  logMovement('pedido', `Pedido por foto (OCR): ${items.reduce((a,b)=>a+b.units,0)} uds`, items.map(it=>{const p=state.preparations.find(x=>x.id===it.prepId);return `${p?p.name:'—'}×${it.units}`}).join(', '));
  // Limpiar estado de la foto
  _koPendingPhoto = null;
  _planillaOcrResult = null;
  const fileInp = document.getElementById('koFile'); if(fileInp) fileInp.value='';
  saveState(); renderView(); renderTabs();
  toast('Pedido enviado a Bodega. Esperando aceptación.');
}

function compressImageToDataUrl(file, maxSide, quality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onerror = ()=>reject(new Error('No pude leer la foto'));
    reader.onload = (e)=>{
      const img = new Image();
      img.onerror = ()=>reject(new Error('Imagen inválida'));
      img.onload = ()=>{
        let w = img.naturalWidth, h = img.naturalHeight;
        const scale = Math.min(1, maxSide / Math.max(w, h));
        w = Math.round(w*scale); h = Math.round(h*scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0,0,w,h);
        ctx.drawImage(img, 0, 0, w, h);
        try {
          const dataUrl = canvas.toDataURL('image/jpeg', quality);
          resolve(dataUrl);
        } catch(err){ reject(err); }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

  <div class="kov-grid">
    <div class="card kov-photo-card">
      <div class="card-title">Foto de la planilla</div>

    </div>
    <div class="card kov-form-card">
      <div class="card-title">Cantidades a despachar</div>
      <p class="muted" style="margin-top:0;font-size:13px">Mira la foto y escribe las cantidades que dice cada código (R01 a R${String(state.preparations.length).padStart(2,'0')}). Deja en 0 lo que no se pidió.</p>
      ${groupsHtml}
      <div style="margin:10px 0">
        <label>Notas adicionales para el despacho (opcional)</label>
        <textarea id="koValNotes" rows="2" placeholder="ej: confirmado con cocina vía whatsapp"></textarea>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">
        <button class="primary" onclick="authorizePhotoOrder()">✓ Autorizar y crear pedido</button>
        <button class="danger" onclick="rejectPhotoOrder()">✗ Rechazar</button>
        <button onclick="goTab('pedido')">Cancelar</button>

}

function koValDelta(prepId, d){
  const inp = document.getElementById('koVal-'+prepId);
  const v = (parseInt(inp.value)||0) + d;
  inp.value = Math.max(0, v);
}

function authorizePhotoOrder(){
  if(session.role !== 'admin'){ toast('Solo admin','warn'); return; }
  const ko = (state.kitchenOrders||[]).find(x=>x.id===_koValidatingId);
  if(!ko){ toast('Pedido no encontrado','warn'); return; }
  // Recolectar items
  const items = state.preparations.map(pr=>{
    const inp = document.getElementById('koVal-'+pr.id);
    const v = inp ? (parseInt(inp.value)||0) : 0;
    return {prepId: pr.id, units: v};
  }).filter(x=>x.units>0);
  if(items.length===0){ toast('Ingresa al menos una unidad antes de autorizar','warn'); return; }
  const valNotes = document.getElementById('koValNotes').value.trim();
  const totalUds = items.reduce((a,b)=>a+b.units,0);
  if(!confirm(`Autorizar pedido por foto:\n\n${items.length} preparaciones · ${totalUds} uds totales.\n\nEsto crea un pedido en Despacho para que bodega lo envíe. ¿Continuar?`)) return;

  // Crear order normal (igual que addPedido pero con autor = admin que valida y nota incluyendo la procedencia)
  const procedencia = `Pedido por foto subido por ${ko.requestedBy} (planilla ${ko.fecha||'—'}${ko.turno?' '+ko.turno:''}${ko.hoja?' hoja '+ko.hoja:''})`;
  const allNotes = [procedencia, ko.notes, valNotes].filter(Boolean).join(' · ');
  const o = {
    id: uid(),
    when: new Date().toISOString(),
    items,
    notes: allNotes,
    status: 'pendiente',
    userId: ko.requestedBy + ' (vía foto, autorizó '+session.name+')'
  };
  state.orders.push(o);

  // Marcar el kitchenOrder como autorizado
  ko.status = 'autorizado';
  ko.validatedBy = session.name;
  ko.validatedAt = new Date().toISOString();
  ko.linkedOrderId = o.id;
  // Liberar el data URL de la foto del state para no inflar Firestore (mantenemos histórico sin foto)
  ko.photo = null;

  logMovement('pedido', `Pedido por foto autorizado: ${totalUds} uds`, items.map(it=>{const p=state.preparations.find(x=>x.id===it.prepId);return `${p?p.name:'—'}×${it.units}`}).join(', '));
  saveState();
  _koValidatingId = null;
  toast('Pedido autorizado y enviado a Despacho');
  goTab('pedido');
}

function rejectPhotoOrder(){
  if(session.role !== 'admin'){ toast('Solo admin','warn'); return; }
  const ko = (state.kitchenOrders||[]).find(x=>x.id===_koValidatingId);
  if(!ko){ toast('Pedido no encontrado','warn'); return; }
  const reason = prompt('Motivo del rechazo (lo verá quien subió la foto):');
  if(reason===null) return;
  if(!reason.trim()){ toast('Indica un motivo','warn'); return; }
  ko.status = 'rechazado';
  ko.validatedBy = session.name;
  ko.validatedAt = new Date().toISOString();
  ko.rejectedReason = reason.trim();
  ko.photo = null;
  logMovement('pedido_foto', `Pedido por foto rechazado`, reason.trim());
  saveState();
  _koValidatingId = null;
  toast('Pedido rechazado');
  goTab('pedido');
}

/* ---------- DESPACHO ---------- */
function viewDespacho(){
  const isAdmin = session.role==='admin';
  const pending = state.orders.filter(o=>o.status==='pendiente').sort((a,b)=>a.when.localeCompare(b.when));
  const recent = state.orders.filter(o=>o.status!=='pendiente').sort((a,b)=>b.when.localeCompare(a.when)).slice(0,15);
  const stk = computeStock();
  return `
  <div class="page-head">
    <div><h1>Despacho — Bodega General</h1><div class="desc">Revisa los pedidos enviados por Cocina, ajusta las cantidades si es necesario y confirma el despacho.</div></div>
  </div>
  <div class="card">
    <div class="card-title">Pedidos pendientes de despacho</div>
    ${pending.length===0 ? '<div class="empty-state"><div class="icon">✅</div><div>Sin pedidos pendientes.</div></div>' :
    pending.map(o=>{
      return `<div style="border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;margin-bottom:10px">
          <div><strong>Pedido del ${fmtDateTime(o.when)}</strong><br><span class="soft">Solicitado por ${escapeHtml(o.userId||'—')}</span></div>
          <span class="badge warn">Pendiente</span>
        </div>
        ${o.notes?`<div style="background:#fbf6e8;border-left:3px solid var(--gold);padding:8px 12px;margin-bottom:10px;font-size:13px">${escapeHtml(o.notes)}</div>`:''}
        <table>
          <thead><tr><th>Preparación</th><th style="text-align:right">Disponible</th><th style="text-align:right">Solicitado</th><th style="text-align:right">A despachar</th></tr></thead>
          <tbody>
            ${o.items.map(it=>{
              const prep = state.preparations.find(p=>p.id===it.prepId);
              const prod = prep?state.products.find(x=>x.id===prep.productId):null;
              const av = stk.generalUds[it.prepId]||0;
              return `<tr>
                <td>${escapeHtml(prod?prod.name:'—')} — ${escapeHtml(prep?prep.name:'—')}</td>
                <td style="text-align:right">${fmtUds(av)} uds</td>
                <td style="text-align:right">${it.units} uds</td>
                <td style="text-align:right"><input id="dsp-${o.id}-${it.prepId}" type="number" min="0" max="${av}" value="${Math.min(it.units, av)}" style="width:100px;text-align:right"></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
        <div style="margin-top:12px;display:flex;gap:10px">
          <button class="olive" onclick="confirmDespacho('${o.id}')">Confirmar despacho</button>
          <button class="danger" onclick="cancelDespacho('${o.id}')">Cancelar pedido</button>
        </div>
      </div>`;
    }).join('')}
  </div>

  ${recent.length>0?`
  <div class="card">
    <div class="card-title">Últimos pedidos resueltos</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Pedido</th><th>Estado</th><th>Items despachados</th><th style="text-align:right">Total</th>${isAdmin?'<th></th>':''}</tr></thead>
      <tbody>${recent.map(o=>{
        const finalItems = o.finalItems||o.items||[];
        const tot = finalItems.reduce((a,b)=>a+Number(b.units||0),0);
        const hasDiff = o.status==='despachado' && o.finalItems && o.items && (()=>{
          const r = Object.fromEntries(o.items.map(it=>[it.prepId, Number(it.units||0)]));
          const f = Object.fromEntries(o.finalItems.map(it=>[it.prepId, Number(it.units||0)]));
          const ids = new Set([...Object.keys(r), ...Object.keys(f)]);
          return [...ids].some(id => (r[id]||0)!==(f[id]||0));
        })();
        const itemsCell = hasDiff
          ? renderItemsChips(finalItems, {max:5, compare:o.items})
          : renderItemsChips(finalItems, {max:5});
        return `<tr>
          <td><strong>${fmtDateTime(o.when)}</strong>${o.dispatchedAt?`<br><span class="soft tiny">Resuelto: ${fmtDateTime(o.dispatchedAt)}</span>`:''}</td>
          <td><span class="badge ${o.status==='despachado'?'ok':'soft'}">${o.status}</span></td>
          <td>${itemsCell}</td>
          <td style="text-align:right">${o.status==='despachado'?`<strong>${tot}</strong> <span class="soft tiny">uds</span>`:'<span class="soft tiny">—</span>'}</td>

        </tr>`;
      }).join('')}</tbody></table></div>
  </div>`:''}`;
