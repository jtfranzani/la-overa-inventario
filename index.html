function addCompra(){
  const productId = document.getElementById('cpProduct').value;
  const supplier = document.getElementById('cpSupplier').value.trim();
  const kg = parseFloat(document.getElementById('cpKg').value);
  const pricePerKg = parseFloat(document.getElementById('cpPrice').value)||0;
  const invoice = document.getElementById('cpInvoice').value.trim();
  const when = document.getElementById('cpDate').value || todayISO();
  const notes = document.getElementById('cpNotes').value.trim();
  if(!productId){ toast('Selecciona un producto','warn'); return; }
  if(!kg||kg<=0){ toast('Ingresa kg válidos','warn'); return; }
  const c = {id:uid(), when, productId, kg, pricePerKg, supplier, invoice, notes, userId:session.name};
  state.purchases.push(c);
  const prod = state.products.find(p=>p.id===productId);
  logMovement('compra', `Compra ${fmtKg(kg)} kg de ${prod?prod.name:'—'}`, `Proveedor: ${supplier||'s/i'} · $${fmtNum(pricePerKg,0)}/kg`);
  saveState(); renderView(); renderTabs();
  toast(`Compra registrada: ${fmtKg(kg)} kg`);
}
function deleteCompra(id){
  if(!confirm('¿Eliminar esta compra? El stock se recalculará.')) return;
  state.purchases = state.purchases.filter(c=>c.id!==id);
  saveState(); renderView();
  toast('Compra eliminada');
}

/* ---------- OCR DE FACTURA (compras) ---------- */
function _ocrSetStatus(text, kind){
  const el = document.getElementById('cpOcrStatus'); if(!el) return;
  el.className = 'ocr-status' + (kind ? ' '+kind : '');
  if(kind==='running'){
    el.innerHTML = '<span class="ocr-spinner"></span> ' + text;
  } else {
    el.textContent = text || '';
  }
}
function _ocrFlash(id){
  const el = document.getElementById(id); if(!el) return;
  el.classList.add('ocr-hit');
  setTimeout(()=>{ try{ el.classList.remove('ocr-hit'); }catch(e){} }, 2500);
}
function clearOcrPreview(){
  const ids = ['cpInvoiceCamera','cpInvoiceFile','cpInvoiceXML','cpInvoicePDF'];
  ids.forEach(id=>{ const e=document.getElementById(id); if(e) e.value=''; });
  const prev = document.getElementById('cpOcrPreview'); if(prev) prev.classList.remove('show');
  const thumb = document.getElementById('cpOcrThumb'); if(thumb){ thumb.src=''; thumb.style.display='none'; }
  const extract = document.getElementById('cpOcrExtract'); if(extract) extract.innerHTML='';
  window._lastInvoiceParsed = null;
  _ocrSetStatus('','');
}
async function handleInvoiceUpload(ev){
  const file = ev.target.files && ev.target.files[0];
  if(!file) return;
  // Vista previa de la imagen
  const url = URL.createObjectURL(file);
  const prev = document.getElementById('cpOcrPreview');
  const thumb = document.getElementById('cpOcrThumb');
  if(thumb){ thumb.src = url; thumb.style.display='block'; }
  if(prev){ prev.classList.add('show'); }
  document.getElementById('cpOcrExtract').innerHTML = '<i>Procesando imagen…</i>';
  _ocrSetStatus('Leyendo factura, esto puede tardar 10–20 s la primera vez…', 'running');

  if(typeof Tesseract === 'undefined'){
    _ocrSetStatus('No se pudo cargar el motor OCR. Revisa tu conexión y reintenta.', 'err');
    return;
  }
  try{
    const res = await Tesseract.recognize(file, 'spa', {
      logger: m => {
        if(m && m.status==='recognizing text' && typeof m.progress==='number'){
          _ocrSetStatus(`Reconociendo texto (${Math.round(m.progress*100)}%)…`, 'running');
        }
      }
    });
    const text = (res && res.data && res.data.text) || '';
    const parsed = parseInvoiceText(text);
    applyInvoiceToForm(parsed, text);
  } catch(err){
    console.error('OCR error', err);
    _ocrSetStatus('No se pudo procesar la imagen. Puedes ingresar los datos manualmente.', 'err');
    document.getElementById('cpOcrExtract').innerHTML = '<i>Error al leer la imagen.</i>';
  }
}

/* Parsea texto crudo de OCR a campos de factura. Funciona con facturas chilenas
   genéricas: detecta fecha, RUT, folio (N° factura), proveedor (razón social),
   kg, precio y producto (matcheando contra state.products). */
/* Helper compartido: busca el producto del catálogo que mejor coincida con un
   texto. Insensible a acentos y prioriza:
   1) Match al inicio del texto (rawName.startsWith(producto))
   2) Match exacto del nombre completo, con la posición más temprana en el texto
   3) Match por primer token significativo (≥4 chars), también por posición. */
function _matchProduct(text){
  if(typeof state==='undefined' || !Array.isArray(state.products)) return null;
  const norm = s => (s||'').toString().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const lower = norm(text);
  let best = null, bestScore = -1, bestPos = Infinity;
  for(const p of state.products){
    const nm = norm(p.name).trim();
    if(!nm) continue;
    let score = -1, pos = Infinity;
    const idx = lower.indexOf(nm);
    if(idx >= 0){
      score = (idx === 0) ? 100 : 60;          // bonus si empieza con el nombre
      pos = idx;
    } else {
      const tok = nm.split(/\s+/).find(t=>t.length>=4);
      if(tok){
        const tidx = lower.indexOf(tok);
        if(tidx >= 0){
          score = (tidx === 0) ? 40 : 20;
          pos = tidx;
        }
      }
    }
    if(score < 0) continue;
    // Preferimos score más alto; con empate, la posición más temprana gana.
    if(score > bestScore || (score === bestScore && pos < bestPos)){
      best = p; bestScore = score; bestPos = pos;
    }
  }
  return best;
}

function parseInvoiceText(text){
  const out = { date:null, invoice:null, supplier:null, productId:null, productName:null, kg:null, pricePerKg:null, raw:text||'' };
  if(!text) return out;
  const T = String(text).replace(/[\u00A0]/g,' ');
  const lines = T.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);

  // --- Fecha (dd/mm/yyyy, dd-mm-yyyy, dd.mm.yyyy) ---
  let mDate = null;
  // Prefer line containing "fecha" or "emisión"
  for(const ln of lines){
    if(/fecha|emisi/i.test(ln)){
      const m = ln.match(/\b(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})\b/);
      if(m){ mDate = m; break; }
    }
  }
  if(!mDate){
    const m = T.match(/\b(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})\b/);
    if(m) mDate = m;
  }
  if(mDate){
    let d = parseInt(mDate[1],10), mo = parseInt(mDate[2],10), y = parseInt(mDate[3],10);
    if(y<100) y += 2000;
    if(d>=1 && d<=31 && mo>=1 && mo<=12 && y>=2000 && y<=2100){
      out.date = `${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }
  }

  // --- Folio / N° factura ---
  // Try labeled patterns first
  let mFolio = T.match(/(?:folio|n[°ºo.]?\s*factura|factura\s*n[°ºo.]?|n[°ºo.]?)\s*[:#]?\s*([0-9]{3,12})/i);
  if(mFolio){ out.invoice = mFolio[1]; }

  // --- RUT (XX.XXX.XXX-Y) ---
  const mRut = T.match(/\b(\d{1,2}\.?\d{3}\.?\d{3}-[0-9Kk])\b/);
  if(mRut){ out.rut = mRut[1]; }

  // --- Razón social / proveedor ---
  // IMPORTANTE: en facturas chilenas "SEÑORES:" / "SEÑOR(ES):" indica el
  // CLIENTE/receptor (no el proveedor). Excluimos esas líneas. Estrategia:
  //   1) "Razón social: …" del emisor.
  //   2) Primera línea que parezca nombre de empresa (S.A. / SpA / LTDA / etc.).
  //   3) Primera línea totalmente en mayúsculas con largo razonable.
  const isClientLine = ln => /se[nñ]or(?:\(es\)|es)?\s*[:\-]/i.test(ln);
  let supplier = null;
  for(const ln of lines){
    if(isClientLine(ln)) continue;
    const m = ln.match(/raz[óo]n\s+social\s*[:\-]?\s*(.+)/i);
    if(m){ supplier = m[1].trim().replace(/\s{2,}/g,' '); break; }
  }
  if(!supplier){
    for(const ln of lines){
      if(isClientLine(ln)) continue;
      if(/\b(S\.A\.|SpA|LTDA\.?|EIRL|S\.R\.L\.?|COMERCIAL|SERVICIOS|DISTRIBUIDORA|FRIGORIFICO|FRIGORÍFICO|CARNES|ALIMENTOS|SOCIEDAD|LIMITADA|SALMONES|AGRICOLA|AGRÍCOLA)\b/i.test(ln) && ln.length<=80){
        supplier = ln.trim(); break;
      }
    }
  }
  if(!supplier){
    for(const ln of lines){
      if(isClientLine(ln)) continue;
      if(/factura|folio|fecha|rut\b/i.test(ln)) continue;
      if(/^([A-Z0-9ÁÉÍÓÚÑ&\.\s,\-]{6,})$/.test(ln) && ln.length<=80){ supplier = ln.trim(); break; }
    }
  }
  if(supplier){
    // Clean trailing RUT/IDs
    supplier = supplier.replace(/\s*\d{1,2}\.?\d{3}\.?\d{3}-[0-9Kk]\s*$/,'').trim();
    supplier = supplier.replace(/\s{2,}/g,' ');
    if(supplier.length>2) out.supplier = supplier;
  }

  // --- Kg ---
  // Look for "10 kg", "10,5 kg", "Kgs 12", "12.5 KG"
  let kg = null;
  const kgRegexes = [
    /(\d{1,4}[.,]?\d{0,3})\s*kgs?\b/i,
    /\bkgs?\s*[:\-]?\s*(\d{1,4}[.,]?\d{0,3})/i,
    /(\d{1,4}[.,]?\d{0,3})\s*kilos?\b/i,
  ];
  for(const re of kgRegexes){
    const m = T.match(re); if(m){ kg = m[1]; break; }
  }
  if(kg){
    const n = parseFloat(String(kg).replace(',','.'));
    if(!isNaN(n) && n>0 && n<10000) out.kg = n;
  }

  // --- Precio por kg ---
  // Looks for "$X.XXX /kg" or "precio kg" patterns
  let price = null;
  const priceRegexes = [
    /\$\s*([\d.]{3,9})\s*\/?\s*kg/i,
    /precio\s*(?:\/?\s*kg|unitario)\s*[:\-]?\s*\$?\s*([\d.]{3,9})/i,
    /\bvalor\s*(?:\/?\s*kg)?\s*[:\-]?\s*\$?\s*([\d.]{3,9})/i,
  ];
  for(const re of priceRegexes){
    const m = T.match(re); if(m){ price = m[1]; break; }
  }
  if(price){
    const n = parseInt(String(price).replace(/\./g,''),10);
    if(!isNaN(n) && n>0 && n<10000000) out.pricePerKg = n;
  }

  // --- Producto: fuzzy match contra state.products (insensible a acentos) ---
  const best = _matchProduct(T);
  if(best){ out.productId = best.id; out.productName = best.name; }

  return out;
}

function applyInvoiceToForm(parsed, rawText){
  // Guardar para multi-item: el usuario puede hacer clic en otras líneas luego.
  window._lastInvoiceParsed = parsed;

  // Si viene una lista de items (XML/PDF estructurado), usar items[0] por defecto.
  const items = Array.isArray(parsed.items) ? parsed.items : [];
  const primary = items.length ? items[0] : null;

  // Resolver los campos "principales" combinando primary item + campos sueltos
  const pickProductId   = (primary && primary.productId)   || parsed.productId   || null;
  const pickProductName = (primary && primary.productName) || parsed.productName || null;
  const pickKg          = (primary && primary.kg!=null)    ? primary.kg          : (parsed.kg!=null?parsed.kg:null);
  const pickPrice       = (primary && primary.pricePerKg)  || parsed.pricePerKg  || null;
  const pickRawName     = primary && primary.rawName       || null;

  const got = [];
  const missed = [];

  // Producto
  if(pickProductId){
    const sel = document.getElementById('cpProduct');
    if(sel){
      const opt = Array.from(sel.options).find(o=>o.value===pickProductId);
      if(opt){ sel.value = pickProductId; _ocrFlash('cpProduct'); got.push('Producto: '+pickProductName); }
      else { missed.push('Producto'); }
    }
  } else { missed.push(pickRawName?`Producto (no mapeado: ${pickRawName})`:'Producto'); }

  // Proveedor
  if(parsed.supplier){
    const inp = document.getElementById('cpSupplier');
    if(inp){ inp.value = parsed.supplier; _ocrFlash('cpSupplier'); got.push('Proveedor: '+parsed.supplier); }
  } else { missed.push('Proveedor'); }

  // Kg
  if(pickKg!=null){
    const inp = document.getElementById('cpKg');
    if(inp){ inp.value = pickKg; _ocrFlash('cpKg'); got.push('Kg: '+pickKg); }
  } else { missed.push('Kg'); }

  // Fecha
  if(parsed.date){
    const inp = document.getElementById('cpDate');
    if(inp){ inp.value = parsed.date; _ocrFlash('cpDate'); got.push('Fecha: '+parsed.date); }
  } else { missed.push('Fecha'); }

  // Precio (prioridad secundaria)
  if(pickPrice){
    const inp = document.getElementById('cpPrice');
    if(inp){ inp.value = pickPrice; _ocrFlash('cpPrice'); got.push('$/kg: '+pickPrice); }
  }
  // N° factura (prioridad secundaria)
  if(parsed.invoice){
    const inp = document.getElementById('cpInvoice');
    if(inp){ inp.value = parsed.invoice; _ocrFlash('cpInvoice'); got.push('N° factura: '+parsed.invoice); }
  }

  // Lista de items (solo si hay ≥2)
  let itemsHTML = '';
  if(items.length >= 2){
    const rows = items.map((it,i)=>{
      const mapped = it.productId
        ? `<span class="map">→ ${escapeHtml(it.productName)}</span>`
        : `<span class="nomap">→ sin mapear</span>`;
      const qty = it.kg!=null ? `${fmtKg(it.kg)} kg${it.pricePerKg?` · $${fmtNum(it.pricePerKg,0)}/kg`:''}` : '';
      return `<div class="ocr-item${i===0?' selected':''}" data-idx="${i}" onclick="selectInvoiceItem(${i})">
        <span class="ix">${i+1}.</span>
        <span class="nm">${escapeHtml(it.rawName||'Línea '+(i+1))}</span>
        <span class="qty">${escapeHtml(qty)}</span>
        ${mapped}
      </div>`;
    }).join('');
    itemsHTML = `
      <div class="ocr-multi-hint">Esta factura tiene <b>${items.length} productos</b>. Cargué el primero al formulario. Si necesitas registrar otro, haz clic en su línea (cada compra debe registrarse por separado).</div>
      <div class="ocr-items">${rows}</div>
    `;
  }

  const extract = document.getElementById('cpOcrExtract');
  if(extract){
    const pillsOk = got.map(g=>`<span class="pill-ok">✓ ${escapeHtml(g)}</span>`).join(' ');
    const pillsNo = missed.map(g=>`<span class="pill-miss">✕ ${escapeHtml(g)}</span>`).join(' ');
    extract.innerHTML = `
      <div style="margin-bottom:8px"><b>Datos detectados</b> — revisa y corrige antes de registrar:</div>
      <div>${pillsOk||'<i>No se detectaron campos automáticamente.</i>'}</div>
      ${missed.length?`<div style="margin-top:6px">${pillsNo}</div>`:''}
      ${itemsHTML}
      <div class="clear-link" onclick="clearOcrPreview()">Descartar y limpiar</div>
    `;
  }

  if(got.length){
    _ocrSetStatus(`Listo: ${got.length} campos detectados${items.length>=2?` · ${items.length} líneas en la factura`:''}. Revisa antes de registrar.`, 'ok');
  } else {
    _ocrSetStatus('No detecté datos claros. Ingresa los campos manualmente.', 'err');
  }
}

/* Permite al usuario alternar entre líneas de una factura con varios productos. */
function selectInvoiceItem(idx){
  const parsed = window._lastInvoiceParsed;
  if(!parsed || !Array.isArray(parsed.items) || !parsed.items[idx]) return;
  const it = parsed.items[idx];
  // Producto
  const sel = document.getElementById('cpProduct');
  if(sel){
    if(it.productId){
      const opt = Array.from(sel.options).find(o=>o.value===it.productId);
      if(opt){ sel.value = it.productId; _ocrFlash('cpProduct'); }
    } else {
      sel.value = '';
    }
  }
  // Kg
  const kgInp = document.getElementById('cpKg');
  if(kgInp){ kgInp.value = it.kg!=null ? it.kg : ''; _ocrFlash('cpKg'); }
  // Precio
  const prInp = document.getElementById('cpPrice');
  if(prInp){ prInp.value = it.pricePerKg || ''; if(it.pricePerKg) _ocrFlash('cpPrice'); }
  // Marca visualmente la fila seleccionada
  document.querySelectorAll('.ocr-item').forEach(el=>el.classList.remove('selected'));
  const row = document.querySelector(`.ocr-item[data-idx="${idx}"]`);
  if(row) row.classList.add('selected');
  toast(`Línea ${idx+1} cargada al formulario`,'ok');
}

/* ---------- XML (SII DTE) ---------- */
async function handleInvoiceXML(ev){
  const file = ev.target.files && ev.target.files[0];
  if(!file) return;
  const prev = document.getElementById('cpOcrPreview');
  const thumb = document.getElementById('cpOcrThumb');
  if(thumb){ thumb.style.display='none'; thumb.src=''; }
  if(prev) prev.classList.add('show');
  document.getElementById('cpOcrExtract').innerHTML = `<i>Leyendo XML…</i>`;
  _ocrSetStatus('Procesando XML de factura electrónica…', 'running');
  try{
    const txt = await file.text();
    const parsed = parseInvoiceXML(txt);
    if(!parsed || (!parsed.items.length && !parsed.invoice && !parsed.supplier)){
      _ocrSetStatus('No reconocí el XML como una factura DTE estándar. Intenta otro archivo.', 'err');
      document.getElementById('cpOcrExtract').innerHTML = '<i>XML no reconocido.</i>';
      return;
    }
    applyInvoiceToForm(parsed, txt);
  } catch(err){
    console.error('XML parse error', err);
    _ocrSetStatus('No se pudo leer el XML. Verifica el archivo.', 'err');
    document.getElementById('cpOcrExtract').innerHTML = '<i>Error leyendo XML.</i>';
  }
}

/* Parsea un XML de DTE chileno (TipoDTE 33/34/...) y extrae todo el detalle. */
function parseInvoiceXML(xmlString){
  const out = { date:null, invoice:null, supplier:null, rut:null, items:[], raw:xmlString||'', tipoDTE:null };
  if(!xmlString) return out;
  let doc;
  try{
    const parser = new DOMParser();
    doc = parser.parseFromString(xmlString, 'text/xml');
  } catch(e){ return out; }
  if(!doc) return out;
  // En XML con namespace, getElementsByTagName('NombreLocal') puede no funcionar
  // en algunos parsers; usamos getElementsByTagNameNS('*', 'Nombre') que es más robusto.
  const get = (tag)=>{
    const list = doc.getElementsByTagNameNS('*', tag);
    return list && list.length ? list : doc.getElementsByTagName(tag);
  };
  const txt = (tag, root)=>{
    const scope = root || doc;
    let list;
    if(scope.getElementsByTagNameNS){
      try{ list = scope.getElementsByTagNameNS('*', tag); }catch(e){ list = scope.getElementsByTagName(tag); }
    } else {
      list = scope.getElementsByTagName(tag);
    }
    if(!list || !list.length) return null;
    const el = list[0];
    return (el.textContent||'').trim() || null;
  };
  // Encabezado
  out.tipoDTE = txt('TipoDTE');
  out.invoice = txt('Folio');
  out.date    = txt('FchEmis');
  out.supplier= txt('RznSoc');
  out.rut     = txt('RUTEmisor');

  // Detalle: múltiples bloques <Detalle>
  const detalles = get('Detalle');
  const norm = s => (s||'').toString().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  for(let i=0; i<detalles.length; i++){
    const d = detalles[i];
    const nm  = txt('NmbItem', d);
    const qty = parseFloat(txt('QtyItem', d));
    const um  = (txt('UnmdItem', d)||'').toLowerCase();
    const prc = parseFloat(txt('PrcItem', d));
    // Solo aceptamos líneas en KILO/KG (es lo que la app maneja)
    const isKg = /\bkilo|^kg$|\bkgs?\b/.test(um);
    const item = { rawName: nm||'', kg:null, pricePerKg:null, productId:null, productName:null, unit:um||null };
    if(!isNaN(qty) && qty>0){
      if(isKg || !um){ item.kg = qty; }
    }
    if(!isNaN(prc) && prc>0){ item.pricePerKg = Math.round(prc); }
    // Mapeo a state.products usando el helper compartido (prioriza inicio)
    if(nm){
      const best = _matchProduct(nm);
      if(best){ item.productId = best.id; item.productName = best.name; }
    }
    out.items.push(item);
  }
  return out;
}

/* ---------- PDF ---------- */
async function handleInvoicePDF(ev){
  const file = ev.target.files && ev.target.files[0];
  if(!file) return;
  const prev = document.getElementById('cpOcrPreview');
  const thumb = document.getElementById('cpOcrThumb');
  if(thumb){ thumb.style.display='none'; thumb.src=''; }
  if(prev) prev.classList.add('show');
  document.getElementById('cpOcrExtract').innerHTML = '<i>Leyendo PDF…</i>';
  _ocrSetStatus('Extrayendo texto del PDF…', 'running');
  if(typeof pdfjsLib === 'undefined'){
    _ocrSetStatus('No se pudo cargar el lector de PDF. Revisa tu conexión.', 'err');
    return;
  }
  try{
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: buf}).promise;
    let text = '';
    // Reconstruimos las líneas usando coordenadas Y para preservar el layout
    for(let p=1; p<=pdf.numPages; p++){
      const page = await pdf.getPage(p);
      const tc = await page.getTextContent();
      const lines = {};
      tc.items.forEach(it => {
        const y = Math.round(it.transform[5]);
        const x = it.transform[4];
        if(!lines[y]) lines[y] = [];
        lines[y].push({x, s: it.str});
      });
      const sortedY = Object.keys(lines).map(Number).sort((a,b)=>b-a);
      for(const y of sortedY){
        lines[y].sort((a,b)=>a.x-b.x);
        text += lines[y].map(o=>o.s).join(' ') + '\n';
      }
    }
    const parsed = parseInvoicePDFText(text);
    if(!parsed.items.length && !parsed.invoice && !parsed.supplier){
      _ocrSetStatus('No reconocí datos en el PDF. Intenta con otro archivo o usa una foto.', 'err');
      document.getElementById('cpOcrExtract').innerHTML = '<i>No se reconocieron datos en el PDF.</i>';
      return;
    }
    applyInvoiceToForm(parsed, text);
  } catch(err){
    console.error('PDF parse error', err);
    _ocrSetStatus('No se pudo leer el PDF. Puede ser una imagen escaneada — intenta subirlo como foto.', 'err');
    document.getElementById('cpOcrExtract').innerHTML = '<i>Error leyendo PDF.</i>';
  }
}

/* Parser de texto de PDFs de factura (texto seleccionable, no escaneado).
   Reusa parseInvoiceText para cabecera y agrega detección de múltiples líneas
   detallando productos en formato típico SII:
   "CODIGO CANTIDAD DETALLE UNIDAD P. UNITARIO TOTAL". */
function parseInvoicePDFText(text){
  const single = parseInvoiceText(text||'');
  const out = {
    date: single.date, invoice: single.invoice, supplier: single.supplier,
    rut: single.rut || null, items: [], raw: text||''
  };
  const norm = s => (s||'').toString().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const lines = String(text||'').split(/\r?\n/).map(l=>l.trim()).filter(Boolean);

  // Estrategia: línea con número formato 1.234,56 + KILO/KG + nombre
  // Ejemplo SII: "101313C 37,56 OSOBUCO MANO TROZADO N S/P CAT.V KILO $ 7.689,99 $ 288.836"
  const itemRegex = /^([A-Z0-9]{2,12})?\s*([\d.]+,\d{1,3})\s+(.+?)\s+(KILO|KG|KGS|UNIDAD|UN)\s+\$?\s*([\d.]+(?:,\d{1,3})?)\s+\$?\s*([\d.,]+)/i;
  for(const ln of lines){
    const m = ln.match(itemRegex);
    if(!m) continue;
    const codigo = (m[1]||'').trim();
    const qtyStr = m[2];
    const name = (m[3]||'').trim();
    const unit = m[4].toUpperCase();
    const prcStr = m[5];
    if(unit !== 'KILO' && unit !== 'KG' && unit !== 'KGS') continue;
    // Convertir a número: el formato chileno usa "." como miles y "," como decimal
    const toNum = s => {
      if(!s) return null;
      s = String(s).replace(/\./g,'').replace(',','.');
      const n = parseFloat(s);
      return isNaN(n) ? null : n;
    };
    const kg = toNum(qtyStr);
    const pricePerKg = toNum(prcStr);
    if(!kg || kg<=0) continue;
    const item = { rawName:name, kg, pricePerKg: pricePerKg ? Math.round(pricePerKg) : null, productId:null, productName:null, codigo: codigo||null };
    // Map a state.products (prioriza match al inicio del nombre)
    const best = _matchProduct(name);
    if(best){ item.productId = best.id; item.productName = best.name; }
    out.items.push(item);
  }
  // Si no detectamos items "tabla", caer al modo single (foto-style)
  if(!out.items.length && (single.kg || single.productId)){
    out.items.push({
      rawName: single.productName || '',
      kg: single.kg, pricePerKg: single.pricePerKg||null,
      productId: single.productId||null, productName: single.productName||null
    });
  }
  // Fecha en formato "11 de mayo de 2026" - solo si parseInvoiceText no la halló
  if(!out.date){
    const m = (text||'').match(/(\d{1,2})\s+de\s+([a-záéíóú]+)\s+de\s+(\d{4})/i);
    if(m){
      const months = {enero:1,febrero:2,marzo:3,abril:4,mayo:5,junio:6,julio:7,agosto:8,septiembre:9,setiembre:9,octubre:10,noviembre:11,diciembre:12};
      const mo = months[norm(m[2])];
      if(mo){
        const d = parseInt(m[1],10), y = parseInt(m[3],10);
        out.date = `${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      }
    }
  }
  // Folio con punto de miles (139.969) - el parser base solo agarra los dígitos
  // contiguos, así que sobreescribimos si encontramos uno mejor con prefijo "N°".
  {
    const m = (text||'').match(/N[°ºo]\s*([\d.]+)/);
    if(m){
      const f = m[1].replace(/\./g,'');
      if(/^\d{3,12}$/.test(f) && (!out.invoice || f.length>out.invoice.length)) out.invoice = f;
    }
  }
  // Proveedor: sobreescribimos si parseInvoiceText capturó por error una línea
  // que parece ser del receptor (contiene "SEÑOR" o "FRANZANI" — receptor).
  const supplierLooksWrong = !out.supplier || /se[nñ]or|franzani/i.test(out.supplier);
  if(supplierLooksWrong){
    let candidate = null;
    for(const ln of lines){
      if(/se[nñ]or|franzani|restaurant/i.test(ln)) continue;
      if(/factura|folio|fecha|rut\b|s\.i\.i\.|santiago$|talca$|panguilemo/i.test(ln)) continue;
      if(/^[A-ZÑ&\.\s,\-]{4,40}$/.test(ln)){ candidate = ln.trim(); break; }
    }
    if(candidate) out.supplier = candidate;
  }
  return out;
}

// Devuelve kg disponibles en Bodega General para un producto (computeStock ya descuenta producciones previas).
function _kgAvailable(productId){
  if(!productId) return 0;
  const stk = computeStock();
  return Number(stk.generalKg[productId]||0);
}

/* Bloquea/habilita el botón "Registrar — mover kg a unidades" según la regla:
   - Producto seleccionado
   - Peso inicial > 0
   - Peso inicial <= kg disponibles en Bodega General */
function _updateProduccionButton(){
  const btn = document.getElementById('btnAddProduccion');
  const msg = document.getElementById('btnAddProduccionMsg');
  if(!btn) return;
  const productSel = document.getElementById('prProduct');
  const initInp = document.getElementById('prInitial');
  const productId = productSel ? productSel.value : '';
  const initialKg = parseFloat(initInp?initInp.value:0)||0;

  let block = false, reason = '';
  if(!productId){
    block = true; reason = 'Selecciona un producto.';
  } else {
    const avail = _kgAvailable(productId);
    const prod = state.products.find(p=>p.id===productId);
    const pname = prod?prod.name:'producto';
    if(avail<=0){
      block = true;
      reason = `🚫 Sin stock de ${pname} en Bodega General. Registra una compra antes de producir.`;
    } else if(initialKg<=0){
      // Producto OK, pero todavía no ingresó kg → no bloqueamos por kg, pero
      // el botón sigue validando dentro de addProduccion al hacer clic.
      block = false; reason = '';
    } else if(initialKg>avail){
      block = true;
      reason = `🚫 Stock insuficiente. Solo hay ${fmtKg(avail)} kg de ${pname} disponibles. Reduce el peso inicial o registra una compra.`;
    }
  }

  btn.disabled = block;
  if(block){
    btn.classList.add('disabled-rule');
    btn.title = reason;
  } else {
    btn.classList.remove('disabled-rule');
    btn.title = '';
  }
  if(msg){ msg.textContent = block ? reason : ''; }
}

function updateMermaPreview(){
  const out = document.getElementById('prMermaPreview');
  const hint = document.getElementById('prKgHint');
  const inp  = document.getElementById('prInitial');
  if(!out) return;
  const productId = document.getElementById('prProduct').value;
  const initialKg = parseFloat(inp?inp.value:0)||0;

  // Hint de kg disponibles (siempre que haya producto seleccionado)
  if(hint){
    if(!productId){
      hint.innerHTML = 'Selecciona un producto para ver kg disponibles.';
      hint.style.color = '';
      if(inp) inp.style.borderColor = '';
    } else {
      const avail = _kgAvailable(productId);
      const prod = state.products.find(p=>p.id===productId);
      const pname = escapeHtml(prod?prod.name:'—');
      if(avail<=0){
        hint.innerHTML = `🚨 <strong>Sin stock</strong> de ${pname} en Bodega General. Registra una compra antes de producir.`;
        hint.style.color = '#c0392b';
        if(inp) inp.style.borderColor = '#c0392b';
      } else if(initialKg>0 && initialKg>avail){
        hint.innerHTML = `🚨 Sin stock suficiente. Disponible: <strong>${fmtKg(avail)} kg</strong> de ${pname}. Estás intentando producir <strong>${fmtKg(initialKg)} kg</strong>.`;
        hint.style.color = '#c0392b';
        if(inp) inp.style.borderColor = '#c0392b';
      } else {
        hint.innerHTML = `Disponible en Bodega General: <strong>${fmtKg(avail)} kg</strong> de ${pname}.`;
        hint.style.color = 'var(--text-soft)';
        if(inp) inp.style.borderColor = '';
      }
    }
  }

  if(!productId || initialKg<=0){
    out.value = '';
    // Importante: actualizar el estado del botón aunque no haya kg ingresados,
    // porque si el producto no tiene stock el botón debe quedar bloqueado.
    _updateProduccionButton();
    return;
  }
  const preps = state.preparations.filter(p=>p.productId===productId);
  let kgProducidos = 0;
  preps.forEach(p=>{
    const inpu = document.getElementById('prep-'+p.id);
    const units = parseInt(inpu?inpu.value:0)||0;
    kgProducidos += units * (Number(p.grams)||0) / 1000;
  });
  const merma = Math.max(0, initialKg - kgProducidos);
  const pct = initialKg>0 ? (merma/initialKg*100) : 0;
  out.value = `${merma.toFixed(3)} kg  (${pct.toFixed(1)}%)`;

  // Bloqueo del botón "Registrar" según la regla de stock
  _updateProduccionButton();
}

function addProduccion(){
  const productId = document.getElementById('prProduct').value;
  const when = document.getElementById('prDate').value || todayISO();
  const initialKg = parseFloat(document.getElementById('prInitial').value);
  const notes = document.getElementById('prNotes').value.trim();
  if(!productId){ toast('Selecciona producto','warn'); return; }
  if(!initialKg||initialKg<=0){ toast('Ingresa peso inicial','warn'); return; }
  // REGLA: no se puede producir más kg de los que hay en Bodega General para ese producto.
  const kgAvail = _kgAvailable(productId);
  const prodSel = state.products.find(p=>p.id===productId);
  const pname = prodSel?prodSel.name:'—';
  if(kgAvail<=0){
    toast(`Sin stock de ${pname} en Bodega General. Registra una compra antes de producir.`,'warn');
    return;
  }
  if(initialKg>kgAvail){
    toast(`Stock insuficiente: solo hay ${fmtKg(kgAvail)} kg de ${pname} en Bodega General.`,'warn');
    return;
  }
  const allPreps = state.preparations.filter(p=>p.productId===productId);
  const preps = allPreps.map(p=>{
    const inp = document.getElementById('prep-'+p.id);
    const units = parseInt(inp?inp.value:0)||0;
    return {prepId:p.id, units};
  }).filter(x=>x.units>0);
  if(preps.length===0){ toast('Ingresa unidades en al menos una preparación','warn'); return; }
  // Merma se calcula como rendimiento: kg inicial - kg producido en preparaciones
  let kgProducidos = 0;
  preps.forEach(pp=>{
    const prep = state.preparations.find(x=>x.id===pp.prepId);
    if(prep) kgProducidos += pp.units * (Number(prep.grams)||0) / 1000;
  });
  const merma = Math.max(0, initialKg - kgProducidos);
  const pr = {id:uid(), when, productId, initialKg, merma, preps, notes, userId:session.name};
  state.productions.push(pr);
  const prod = state.products.find(p=>p.id===productId);
  const totalUds = preps.reduce((a,b)=>a+b.units,0);
  const mermaPct = initialKg>0 ? (merma/initialKg*100).toFixed(1) : 0;
  logMovement('producción', `Producción de ${prod?prod.name:'—'}: ${fmtKg(initialKg)} kg → ${totalUds} uds`, `Merma: ${fmtKg(merma)} kg (${mermaPct}%)`);
  saveState(); renderView();
  toast(`Producción registrada: ${totalUds} uds · merma ${mermaPct}%`);
}
function deleteProduccion(id){
  if(!confirm('¿Eliminar esta producción? El stock se recalculará.')) return;
  state.productions = state.productions.filter(p=>p.id!==id);
  saveState(); renderView();
  toast('Producción eliminada');
}

function recalcInv(input){
  const theo = parseFloat(input.dataset.theo)||0;
  const real = parseFloat(input.value)||0;
  const delta = real - theo;
  const tr = input.closest('tr');
  const descCell = tr.querySelector('.invDesc');
  const statusBadge = tr.querySelector('.invStatus');
  if(Math.abs(delta)<0.001){
    descCell.textContent='—'; descCell.className='invDesc';
    statusBadge.textContent='OK'; statusBadge.className='badge ok invStatus';
    input.classList.remove('input-warn');
  } else {
    const sign = delta>0?'+':'';
    descCell.textContent = sign+fmtNum(delta, input.dataset.key.startsWith('kg:')?3:0);
    descCell.className = 'invDesc '+(delta>0?'descuadre-pos':'descuadre-neg');
    statusBadge.textContent = delta>0?'Sobrante':'Faltante';
    statusBadge.className='badge '+(delta>0?'info':'warn')+' invStatus';
    input.classList.add('input-warn');
  }
}

function saveInventario(bodega){
  const rows = document.querySelectorAll('.invReal');
  const items = [];
  rows.forEach(r=>{
    const key = r.dataset.key;
    const theoretical = parseFloat(r.dataset.theo)||0;
    const real = parseFloat(r.value)||0;
    items.push({key, theoretical, real, descuadre: real-theoretical});
  });
  const reason = document.getElementById('invReason').value.trim();
  const cargaInicial = !!(document.getElementById('invCargaInicial') && document.getElementById('invCargaInicial').checked);
  if(!reason){ toast('Ingresa el motivo del ajuste','warn'); return; }
  const inv = {id:uid(), when:new Date().toISOString(), bodega, items, reason, cargaInicial, userId:session.name};
  state.inventories.push(inv);
  const desc = items.filter(i=>Math.abs(i.descuadre)>0.001).length;
  logMovement('inventario', `Conteo ${bodega==='general'?'Bodega General':'Bodega Cocina'}: ${desc} descuadres`, reason);
  saveState(); renderView();
  toast('Conteo registrado y ajuste aplicado');
}

function uploadInventoryExcel(ev, bodega){
  if(typeof XLSX === 'undefined'){ toast('Librería Excel no cargada. Recarga la página.','warn'); return; }
  const f = ev.target.files && ev.target.files[0];
  if(!f){ return; }
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array'});
      // Buscar hoja "Inventario" (case-insensitive); si no, usar la primera
      let sheetName = wb.SheetNames.find(n => /inventario/i.test(n)) || wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      // Buscar la fila de encabezado (que contenga "CLAVE")
      let headerIdx = -1;
      for(let i=0;i<Math.min(rows.length,10);i++){
        if(rows[i] && rows[i].some(c => String(c||'').toUpperCase().includes('CLAVE'))){ headerIdx = i; break; }
      }
      if(headerIdx === -1){ toast('No encontré la fila de encabezado. ¿Usaste la plantilla?','warn'); return; }
      const header = rows[headerIdx].map(c=>String(c||'').trim().toLowerCase());
      const keyCol = header.findIndex(h => h.includes('clave'));
      const realCol = header.findIndex(h => h.includes('real'));
      if(keyCol === -1 || realCol === -1){ toast('Faltan columnas CLAVE o Stock real','warn'); return; }

      // Mapear clave → real
      const updates = {};
      for(let i=headerIdx+1;i<rows.length;i++){
        const row = rows[i]; if(!row) continue;
        const key = String(row[keyCol]||'').trim();
        const realRaw = row[realCol];
        if(!key) continue;
        if(realRaw === '' || realRaw === null || realRaw === undefined) continue;
        const n = Number(realRaw);
        if(isNaN(n) || n<0) continue;
        updates[key] = n;
      }

      const inputs = document.querySelectorAll('.invReal');
      let matched = 0;
      inputs.forEach(inp => {
        const k = inp.dataset.key;
        if(updates.hasOwnProperty(k)){
          inp.value = updates[k];
          try{ if(typeof recalcInv === 'function') recalcInv(inp); }catch(e){/* fila sin contexto DOM, seguir */}
          matched++;
        }
      });

      toast(`Excel importado: ${matched} items precargados`,'ok');
      ev.target.value = ''; // permitir re-subir el mismo archivo
    }catch(err){
      console.error(err);
      toast('Error leyendo el Excel: '+(err.message||err),'warn');
    }
  };
  reader.readAsArrayBuffer(f);
}

// Helpers de período
function isoWeekToRange(weekStr){
  // weekStr = "2026-W19" → {start, end} ISO yyyy-mm-dd (lun a dom)
  if(!weekStr) return null;
  const m = weekStr.match(/^(\d{4})-W(\d{2})$/); if(!m) return null;
  const year = parseInt(m[1]), week = parseInt(m[2]);
  // ISO 8601: el jueves de la semana 1 está en el año
  const simple = new Date(Date.UTC(year, 0, 1 + (week-1)*7));
  const dow = simple.getUTCDay();
  const mondayDelta = (dow<=4 ? 1 : 8) - dow;
  const monday = new Date(simple); monday.setUTCDate(simple.getUTCDate()+mondayDelta);
  const sunday = new Date(monday); sunday.setUTCDate(monday.getUTCDate()+6);
  return {start: monday.toISOString().slice(0,10), end: sunday.toISOString().slice(0,10)};
}
function monthToRange(monthStr){
  if(!monthStr) return null;
  const m = monthStr.match(/^(\d{4})-(\d{2})$/); if(!m) return null;
  const year = parseInt(m[1]), month = parseInt(m[2]);
  const start = new Date(Date.UTC(year, month-1, 1));
  const end = new Date(Date.UTC(year, month, 0));
  return {start: start.toISOString().slice(0,10), end: end.toISOString().slice(0,10)};
}
function currentISOWeek(){
  const d = new Date(); d.setHours(0,0,0,0);
  const dayNum = (d.getDay()+6)%7;
  d.setDate(d.getDate()-dayNum+3);
  const firstThu = new Date(d.getFullYear(),0,4);
  const diff = (d - firstThu) / (7*24*60*60*1000);
  const week = 1 + Math.round(diff);
  return `${d.getFullYear()}-W${String(week).padStart(2,'0')}`;
}
function currentMonth(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function fmtDateShort(iso){ if(!iso) return '—'; const d=new Date(iso+'T00:00:00'); return d.toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit',year:'2-digit'}); }
function fmtPeriod(v){
  const t = v.periodType || 'dia';
  const s = v.periodStart || v.when;
  const e = v.periodEnd || v.when;
  if(t==='dia' || s===e) return fmtDateShort(s);
  if(t==='semana') return `${fmtDateShort(s)} → ${fmtDateShort(e)}`;
  if(t==='mes'){ const d=new Date(s+'T00:00:00'); return d.toLocaleDateString('es-CL',{month:'long',year:'numeric'}); }
  return `${fmtDateShort(s)} → ${fmtDateShort(e)}`;
}
function periodLabel(t){ return {dia:'Día',semana:'Semana',mes:'Mes',rango:'Rango'}[t]||t; }
function periodDays(v){
  const s = new Date((v.periodStart||v.when)+'T00:00:00');
  const e = new Date((v.periodEnd||v.when)+'T00:00:00');
  return Math.round((e-s)/(24*3600*1000))+1;
}

function setVentMode(m){ window._ventMode = m; renderView(); }

function addVenta(){
  const mode = window._ventMode || 'dia';
  let periodStart, periodEnd;
  if(mode==='dia'){
    const d = document.getElementById('ventDate').value || todayISO();
    periodStart = d; periodEnd = d;
  } else if(mode==='semana'){
    const w = document.getElementById('ventWeek').value;
    if(!w){ toast('Selecciona una semana','warn'); return; }
    const r = isoWeekToRange(w);
    if(!r){ toast('Semana inválida','warn'); return; }
    periodStart = r.start; periodEnd = r.end;
  } else if(mode==='mes'){
    const mm = document.getElementById('ventMonth').value;
    if(!mm){ toast('Selecciona un mes','warn'); return; }
    const r = monthToRange(mm);
    periodStart = r.start; periodEnd = r.end;
  } else if(mode==='rango'){
    periodStart = document.getElementById('ventFrom').value;
    periodEnd = document.getElementById('ventTo').value;
    if(!periodStart || !periodEnd){ toast('Ingresa fechas desde y hasta','warn'); return; }
    if(periodStart > periodEnd){ toast('La fecha "Desde" debe ser anterior a "Hasta"','warn'); return; }
  }
  const notes = document.getElementById('ventNotes').value.trim();
  const items = state.preparations.map(pr=>{
    const v = parseInt(document.getElementById('vent-'+pr.id).value)||0;
    return {prepId:pr.id, units:v};
  }).filter(x=>x.units>0);
  if(items.length===0){ toast('Ingresa al menos una venta','warn'); return; }
  const v = {id:uid(), when:periodEnd, periodStart, periodEnd, periodType:mode, items, notes, userId:session.name};
  state.sales.push(v);
  const tot = items.reduce((a,b)=>a+b.units,0);
  const periodTxt = mode==='dia' ? `del ${fmtDateShort(periodStart)}` : `${periodLabel(mode)} ${fmtDateShort(periodStart)} → ${fmtDateShort(periodEnd)}`;
  logMovement('venta', `Ventas ${periodTxt}: ${tot} uds`, items.map(it=>{const p=state.preparations.find(x=>x.id===it.prepId);return `${p?p.name:'—'}×${it.units}`}).join(', '));
  saveState(); renderView();
  toast(`Ventas registradas: ${tot} uds`);
}
function deleteVenta(id){
  if(!confirm('¿Eliminar este registro de ventas? El stock se recalculará.')) return;
  state.sales = state.sales.filter(v=>v.id!==id);
  saveState(); renderView();
  toast('Venta eliminada');
}

    <div class="card-title">Historial de pedidos</div>
    ${hist.length===0 ? '<div class="empty-state soft">Sin pedidos enviados.</div>' :
    `<div class="table-wrap"><table>
      <thead><tr><th>Pedido</th><th>Despachado</th><th>Por</th><th>Detalle</th><th>Solicitado</th><th>Despachado</th><th>Estado</th></tr></thead>
      <tbody>${hist.map(o=>{
        const det = (o.items||[]).map(it=>{const p=state.preparations.find(x=>x.id===it.prepId);return `${p?p.name:'—'}×${it.units}`}).join(', ');
        const final = (o.finalItems||[]).map(it=>{const p=state.preparations.find(x=>x.id===it.prepId);return `${p?p.name:'—'}×${it.units}`}).join(', ');
        const totReq = (o.items||[]).reduce((a,b)=>a+Number(b.units||0),0);
        const totDis = (o.finalItems||[]).reduce((a,b)=>a+Number(b.units||0),0);
        const badge = o.status==='pendiente' ? 'warn' : o.status==='despachado' ? 'ok' : 'soft';
        return `<tr>
          <td>${fmtDateTime(o.when)}</td>
          <td>${o.dispatchedAt?fmtDateTime(o.dispatchedAt):'—'}</td>
          <td class="soft">${escapeHtml(o.userId||'—')}</td>
          <td>${escapeHtml(det)}${final?'<br><span class="soft tiny">Final: '+escapeHtml(final)+'</span>':''}</td>
          <td>${totReq}</td>
          <td>${o.status==='despachado'?totDis:'—'}</td>
          <td><span class="badge ${badge}">${o.status}</span></td>
        </tr>`;
      }).join('')}</tbody></table></div>`}
  </div>`;
}

function pedDelta(prepId, d){
  const inp = document.getElementById('ped-'+prepId);
  const v = (parseInt(inp.value)||0) + d;
  inp.value = Math.max(0, v);
}
function addPedido(){
  const items = state.preparations.map(pr=>{
    const v = parseInt(document.getElementById('ped-'+pr.id).value)||0;
    return {prepId:pr.id, units:v};
  }).filter(x=>x.units>0);
  if(items.length===0){ toast('Ingresa al menos una unidad','warn'); return; }
  const notes = document.getElementById('pedNotes').value.trim();
  const o = {id:uid(), when:new Date().toISOString(), items, notes, status:'pendiente', userId:session.name};
  state.orders.push(o);
  logMovement('pedido', `Pedido cocina: ${items.reduce((a,b)=>a+b.units,0)} uds`, items.map(it=>{const p=state.preparations.find(x=>x.id===it.prepId);return `${p?p.name:'—'}×${it.units}`}).join(', '));
  saveState(); renderView(); renderTabs();
  toast('Pedido enviado a Bodega General');
}

/* ---------- DESPACHO ---------- */

  const stk = computeStock();
  return `
  <div class="page-head">
    <div><h1>Despacho — Bodega General</h1><div class="desc">Revisa los pedidos enviados por Cocina, ajusta las cantidades si es necesario y confirma el despacho.</div></div>
  </div>
  <div class="card">
    <div class="card-title">Pedidos pendientes de despacho</div>

    pending.map(o=>{

        <table>
          <thead><tr><th>Preparación</th><th style="text-align:right">Disponible</th><th style="text-align:right">Solicitado</th><th style="text-align:right">A despachar</th></tr></thead>
          <tbody>
            ${o.items.map(it=>{
              const prep = state.preparations.find(p=>p.id===it.prepId);
              const prod = prep?state.products.find(x=>x.id===prep.productId):null;
              const av = stk.generalUds[it.prepId]||0;
              return `<tr>
                <td>${escapeHtml(prod?prod.name:'—')} — ${escapeHtml(prep?prep.name:'—')}</td>
                <td style="text-align:right">${fmtUds(av)} uds</td>
                <td style="text-align:right">${it.units} uds</td>
                <td style="text-align:right"><input id="dsp-${o.id}-${it.prepId}" type="number" min="0" max="${av}" value="${Math.min(it.units, av)}" style="width:100px;text-align:right"></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
        <div style="margin-top:12px;display:flex;gap:10px">
          <button class="olive" onclick="confirmDespacho('${o.id}')">Confirmar despacho</button>

        </div>

  <div class="card">
    <div class="card-title">Últimos pedidos resueltos</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Cuándo</th><th>Resuelto</th><th>Detalle final</th><th>Estado</th></tr></thead>
      <tbody>${recent.map(o=>{
        const det = (o.finalItems||o.items||[]).map(it=>{const p=state.preparations.find(x=>x.id===it.prepId);return `${p?p.name:'—'}×${it.units}`}).join(', ');
        return `<tr>
          <td>${fmtDateTime(o.when)}</td>
          <td>${fmtDateTime(o.dispatchedAt)}</td>
          <td>${escapeHtml(det)}</td>
          <td><span class="badge ${o.status==='despachado'?'ok':'soft'}">${o.status}</span></td>
        </tr>`;
      }).join('')}</tbody></table></div>
  </div>`:''}`;
}

function confirmDespacho(id){
  const o = state.orders.find(x=>x.id===id);
  if(!o) return;
  const finalItems = o.items.map(it=>{
    const inp = document.getElementById(`dsp-${id}-${it.prepId}`);
    return {prepId:it.prepId, units: parseInt(inp?inp.value:0)||0};
  }).filter(x=>x.units>0);
  if(finalItems.length===0){ if(!confirm('No despacharás unidades. ¿Confirmar como cancelado?')) return; o.status='cancelado'; }
  else { o.status='despachado'; o.finalItems = finalItems; }
  o.dispatchedAt = new Date().toISOString();
  o.dispatchedBy = session.name;
  const tot = finalItems.reduce((a,b)=>a+b.units,0);
  logMovement('despacho', `Despacho ${tot} uds de General → Cocina`, finalItems.map(it=>{const p=state.preparations.find(x=>x.id===it.prepId);return `${p?p.name:'—'}×${it.units}`}).join(', '));
  saveState(); renderView(); renderTabs();
  toast('Despacho confirmado');
}
function cancelDespacho(id){
  if(!confirm('¿Cancelar este pedido?')) return;
  const o = state.orders.find(x=>x.id===id);
  o.status='cancelado'; o.dispatchedAt = new Date().toISOString(); o.dispatchedBy = session.name;
  logMovement('despacho', `Pedido cancelado`, `Pedido del ${fmtDateTime(o.when)}`);
  saveState(); renderView(); renderTabs();
  toast('Pedido cancelado');
}

/* ---------- TRASPASO (Cocina → Bodega General) ---------- */
// Cocina solicita devolver unidades a Bodega General cuando hay sobrestock.
// Bodega General aprueba o rechaza la solicitud.
function viewTraspaso(){
  const stk = computeStock();
  const isCocina = session.role==='cocina' || session.role==='admin';
  const isBodega = session.role==='bodega' || session.role==='admin';
  const all = state.transfers||[];
  const pending = all.filter(t=>t.status==='pendiente').sort((a,b)=>a.when.localeCompare(b.when));
  const resolved = all.filter(t=>t.status!=='pendiente').sort((a,b)=>b.when.localeCompare(a.when)).slice(0,20);

  // Preparaciones con stock en cocina > 0 (las que se pueden devolver)
  const candidates = state.preparations
    .map(pr=>({pr, av: stk.cocinaUds[pr.id]||0}))
    .filter(x=>x.av>0)
    .sort((a,b)=>{
      const pa = state.products.find(p=>p.id===a.pr.productId);
      const pb = state.products.find(p=>p.id===b.pr.productId);
      const ka = (pa?pa.name:'')+' '+a.pr.name;
      const kb = (pb?pb.name:'')+' '+b.pr.name;
      return ka.localeCompare(kb);
    });

  return `
  <div class="page-head">
    <div><h1>Traspaso a Bodega General</h1><div class="desc">Cuando Cocina tiene <strong>sobrestock</strong> de una preparación, puede solicitar devolver unidades a Bodega General. La solicitud queda pendiente hasta que Bodega la apruebe.</div></div>
  </div>

  ${isCocina ? `
  <div class="card">
    <div class="card-title">Nueva solicitud de traspaso</div>
    ${candidates.length===0
      ? '<div class="empty-state soft"><div class="icon">📭</div><div>No hay unidades en Cocina para devolver.</div></div>'
      : `<div class="grid-2" style="gap:14px">
          <div>
            <label>Preparación a devolver</label>
            <select id="trPrep" onchange="_updateTransferAvail()">
              <option value="">Selecciona...</option>
              ${candidates.map(c=>{
                const prod = state.products.find(p=>p.id===c.pr.productId);
                return `<option value="${c.pr.id}" data-av="${c.av}">${escapeHtml(prod?prod.name:'—')} — ${escapeHtml(c.pr.name)} (${fmtUds(c.av)} disp.)</option>`;
              }).join('')}
            </select>
            <div id="trAvailHint" class="soft tiny" style="margin-top:4px"></div>
          </div>
          <div>
            <label>Unidades a devolver</label>
            <input id="trUnits" type="number" min="1" step="1" placeholder="0" oninput="_updateTransferBtn()">
            <div id="trUnitsHint" class="soft tiny" style="margin-top:4px"></div>
          </div>
        </div>
        <div style="margin-top:12px">
          <label>Motivo (opcional)</label>
          <textarea id="trReason" rows="2" placeholder="ej: Sobrestock por baja venta del día; mejor almacenar en bodega general."></textarea>
        </div>
        <div style="margin-top:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <button id="btnAddTransfer" class="primary" onclick="addTransferRequest()">Enviar solicitud a Bodega</button>
          <span id="btnAddTransferMsg" class="soft tiny" style="color:#a64a3b"></span>
        </div>`}
  </div>` : ''}

  ${isBodega ? `
  <div class="card">
    <div class="card-title">Solicitudes pendientes de aprobación ${pending.length>0?`<span class="badge warn" style="margin-left:8px">${pending.length}</span>`:''}</div>
    ${pending.length===0
      ? '<div class="empty-state"><div class="icon">✅</div><div>Sin solicitudes pendientes.</div></div>'
      : pending.map(t=>{
        const prep = state.preparations.find(p=>p.id===t.prepId);
        const prod = prep?state.products.find(x=>x.id===prep.productId):null;
        const av = stk.cocinaUds[t.prepId]||0;
        const enoughInCocina = av >= Number(t.units||0);
        return `<div style="border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px">
            <div><strong>${escapeHtml(prod?prod.name:'—')} — ${escapeHtml(prep?prep.name:'—')}</strong><br><span class="soft tiny">Solicitado por ${escapeHtml(t.requestedBy||'—')} · ${fmtDateTime(t.when)}</span></div>
            <span class="badge warn">Pendiente</span>
          </div>
          <div style="display:flex;gap:18px;flex-wrap:wrap;margin-bottom:8px">
            <div><span class="soft tiny">Unidades a devolver</span><br><strong>${fmtUds(t.units)} uds</strong></div>
            <div><span class="soft tiny">Stock actual en Cocina</span><br><strong>${fmtUds(av)} uds</strong> ${enoughInCocina?'':'<span class="badge danger" style="margin-left:6px">Stock insuficiente</span>'}</div>
          </div>
          ${t.reason?`<div style="background:#fbf6e8;border-left:3px solid var(--gold);padding:8px 12px;margin-bottom:10px;font-size:13px">${escapeHtml(t.reason)}</div>`:''}
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            <button class="olive" ${enoughInCocina?'':'disabled'} title="${enoughInCocina?'':'No hay suficientes unidades en Cocina para aprobar este traspaso.'}" onclick="approveTransfer('${t.id}')">Aprobar y devolver a Bodega</button>
            <button class="danger" onclick="rejectTransfer('${t.id}')">Rechazar</button>
          </div>
        </div>`;
      }).join('')}
  </div>` : ''}

  <div class="card">
    <div class="card-title">Historial de traspasos</div>
    ${resolved.length===0 ? '<div class="empty-state soft">Sin traspasos resueltos.</div>' :
    `<div class="table-wrap"><table>
      <thead><tr><th>Solicitado</th><th>Resuelto</th><th>Preparación</th><th style="text-align:right">Unidades</th><th>Solicitó</th><th>Resolvió</th><th>Estado</th><th>Motivo</th></tr></thead>
      <tbody>${resolved.map(t=>{
        const prep = state.preparations.find(p=>p.id===t.prepId);
        const prod = prep?state.products.find(x=>x.id===prep.productId):null;
        const badge = t.status==='aprobado' ? 'ok' : 'soft';
        const motivo = t.status==='rechazado' ? (t.rejectedReason||t.reason||'') : (t.reason||'');
        return `<tr>
          <td>${fmtDateTime(t.when)}</td>
          <td>${t.approvedAt?fmtDateTime(t.approvedAt):'—'}</td>
          <td>${escapeHtml(prod?prod.name:'—')} — ${escapeHtml(prep?prep.name:'—')}</td>
          <td style="text-align:right">${fmtUds(t.units)}</td>
          <td class="soft">${escapeHtml(t.requestedBy||'—')}</td>
          <td class="soft">${escapeHtml(t.approvedBy||'—')}</td>
          <td><span class="badge ${badge}">${t.status}</span></td>
          <td class="soft tiny">${escapeHtml(motivo)}</td>
        </tr>`;
      }).join('')}</tbody></table></div>`}
  </div>`;
}

function _updateTransferAvail(){
  const sel = document.getElementById('trPrep');
  const hint = document.getElementById('trAvailHint');
  if(!sel || !hint) return;
  const opt = sel.options[sel.selectedIndex];
  const av = opt ? Number(opt.getAttribute('data-av')||0) : 0;
  hint.textContent = sel.value ? `Disponible en Cocina: ${fmtUds(av)} uds` : '';
  _updateTransferBtn();
}

function _updateTransferBtn(){
  const btn = document.getElementById('btnAddTransfer');
  const msg = document.getElementById('btnAddTransferMsg');
  const sel = document.getElementById('trPrep');
  const inp = document.getElementById('trUnits');
  const uHint = document.getElementById('trUnitsHint');
  if(!btn) return;
  const prepId = sel ? sel.value : '';
  const units = parseInt(inp?inp.value:0)||0;
  const av = (sel && sel.options[sel.selectedIndex]) ? Number(sel.options[sel.selectedIndex].getAttribute('data-av')||0) : 0;
  let block = false, reason = '';
  if(!prepId){ block = true; reason = 'Selecciona una preparación.'; }
  else if(units<=0){ block = true; reason = 'Ingresa una cantidad mayor a 0.'; }
  else if(units>av){ block = true; reason = `🚫 Solo hay ${fmtUds(av)} uds en Cocina. Reduce la cantidad.`; }
  btn.disabled = block;
  if(block){ btn.classList.add('disabled-rule'); btn.title = reason; }
  else { btn.classList.remove('disabled-rule'); btn.title = ''; }
  if(msg) msg.textContent = block ? reason : '';
  if(uHint){
    if(units>0 && units<=av) uHint.textContent = `OK — quedarán ${fmtUds(av-units)} uds en Cocina tras la devolución.`;
    else uHint.textContent = '';
  }
}

function addTransferRequest(){
  const sel = document.getElementById('trPrep');
  const inp = document.getElementById('trUnits');
  const rea = document.getElementById('trReason');
  const prepId = sel ? sel.value : '';
  const units = parseInt(inp?inp.value:0)||0;
  const reason = (rea?rea.value:'').trim();
  if(!prepId){ toast('Selecciona una preparación','warn'); return; }
  if(units<=0){ toast('Ingresa una cantidad mayor a 0','warn'); return; }
  // guardia interna: nunca permitir solicitar más de lo que hay
  const stk = computeStock();
  const av = stk.cocinaUds[prepId]||0;
  if(units>av){ toast(`🚫 Solo hay ${fmtUds(av)} uds en Cocina. No se puede solicitar más.`,'warn'); return; }
  const t = {
    id: uid(),
    when: new Date().toISOString(),
    prepId, units, reason,
    status: 'pendiente',
    requestedBy: session.name
  };
  (state.transfers = state.transfers||[]).push(t);
  const prep = state.preparations.find(p=>p.id===prepId);
  const prod = prep?state.products.find(x=>x.id===prep.productId):null;
  logMovement('traspaso', `Solicitud de traspaso: ${units} uds de ${prep?prep.name:'—'}`, `${prod?prod.name:'—'} — ${prep?prep.name:'—'} × ${units} (Cocina → Bodega General)`);
  saveState(); renderView(); renderTabs();
  toast('Solicitud de traspaso enviada a Bodega');
}

function approveTransfer(id){
  const t = (state.transfers||[]).find(x=>x.id===id);
  if(!t || t.status!=='pendiente') return;
  // Validar que la cocina aún tenga las unidades en el momento de aprobar
  const stk = computeStock();
  const av = stk.cocinaUds[t.prepId]||0;
  if(av < Number(t.units||0)){
    toast(`🚫 Stock insuficiente en Cocina: ${fmtUds(av)} uds. Rechaza o pide a Cocina corregir la cantidad.`,'warn');
    return;
  }
  t.status = 'aprobado';
  t.approvedAt = new Date().toISOString();
  t.approvedBy = session.name;
  const prep = state.preparations.find(p=>p.id===t.prepId);
  const prod = prep?state.products.find(x=>x.id===prep.productId):null;
  logMovement('traspaso', `Traspaso aprobado: ${t.units} uds de ${prep?prep.name:'—'}`, `${prod?prod.name:'—'} — ${prep?prep.name:'—'} × ${t.units} (Cocina → Bodega General)`);
  saveState(); renderView(); renderTabs();
  toast('Traspaso aprobado. Unidades devueltas a Bodega General.');
}

function rejectTransfer(id){
  const t = (state.transfers||[]).find(x=>x.id===id);
  if(!t || t.status!=='pendiente') return;
  const why = prompt('Motivo del rechazo (opcional):','');
  if(why===null) return; // cancelado
  t.status = 'rechazado';
  t.approvedAt = new Date().toISOString();
  t.approvedBy = session.name;
  t.rejectedReason = (why||'').trim();
  const prep = state.preparations.find(p=>p.id===t.prepId);
  const prod = prep?state.products.find(x=>x.id===prep.productId):null;
  logMovement('traspaso', `Traspaso rechazado: ${t.units} uds de ${prep?prep.name:'—'}`, `${prod?prod.name:'—'} — ${prep?prep.name:'—'} × ${t.units}${t.rejectedReason?' — Motivo: '+t.rejectedReason:''}`);
  saveState(); renderView(); renderTabs();
  toast('Solicitud de traspaso rechazada','warn');
}


/* ---------- HISTORIAL ---------- */
function viewHistorial(){
  const f = window._histF || {q:'', type:'', from:'', to:'', user:''};
  let movs = [...state.movements].sort((a,b)=>b.when.localeCompare(a.when));
  if(f.type) movs = movs.filter(m=>m.type===f.type);
  if(f.user) movs = movs.filter(m=>(m.userId||'')===f.user);
  if(f.from) movs = movs.filter(m=>m.when.slice(0,10)>=f.from);
  if(f.to)   movs = movs.filter(m=>m.when.slice(0,10)<=f.to);
  if(f.q){
    const q = f.q.toLowerCase();
    movs = movs.filter(m=>
      (m.summary||'').toLowerCase().includes(q) ||
      (m.detail||'').toLowerCase().includes(q) ||
      (m.type||'').toLowerCase().includes(q) ||
      (m.userId||'').toLowerCase().includes(q)
    );
  }
  const types = [...new Set(state.movements.map(m=>m.type))];
  const users = [...new Set(state.movements.map(m=>m.userId).filter(Boolean))];
  return `
  <div class="page-head">
    <div><h1>Historial</h1><div class="desc">Registro completo de todos los movimientos. Usa los filtros para encontrar lo que buscas.</div></div>
    <button onclick="exportCSV('historial')">↓ Exportar CSV</button>

    <div class="card-title"><span>Filtros</span><span class="tiny">${movs.length} resultado${movs.length===1?'':'s'}</span></div>
    <div class="hist-filters">
      <div><label>Buscar texto</label><input id="histQ" placeholder="ej: cazuela, descuadre..." value="${escapeHtml(f.q)}" oninput="window._histF=Object.assign(window._histF||{},{q:this.value});clearTimeout(window._histT);window._histT=setTimeout(renderView,250)"></div>
      <div><label>Tipo</label>
        <select onchange="window._histF=Object.assign(window._histF||{},{type:this.value});renderView()">
          <option value="">Todos</option>
          ${types.map(t=>`<option value="${t}" ${f.type===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      <div><label>Desde</label><input type="date" value="${f.from}" onchange="window._histF=Object.assign(window._histF||{},{from:this.value});renderView()"></div>
      <div><label>Hasta</label><input type="date" value="${f.to}" onchange="window._histF=Object.assign(window._histF||{},{to:this.value});renderView()"></div>
      <div><button onclick="window._histF={q:'',type:'',from:'',to:'',user:''};renderView()" class="small">Limpiar</button></div>
    </div>
    ${users.length>1?`<div style="margin-top:4px"><label>Usuario</label>
      <select onchange="window._histF=Object.assign(window._histF||{},{user:this.value});renderView()" style="max-width:280px">
        <option value="">Todos los usuarios</option>
        ${users.map(u=>`<option value="${escapeHtml(u)}" ${f.user===u?'selected':''}>${escapeHtml(u)}</option>`).join('')}
      </select></div>`:''}
  </div>
  <div class="card">
    <div class="card-title">Movimientos</div>
    ${movs.length===0 ? '<div class="empty-state"><div class="icon">📜</div><div>Sin movimientos que coincidan con el filtro.</div></div>' :
    movs.map(m=>`
      <div class="hist-row">
        <div class="when">${fmtDateTime(m.when)}</div>
        <div><span class="badge ${badgeForType(m.type)}">${m.type}</span></div>
        <div class="soft">${escapeHtml(m.userId||'—')}</div>
        <div><div class="type">${escapeHtml(m.summary)}</div><div class="soft" style="font-size:12px">${escapeHtml(m.detail||'')}</div></div>

async function handleConnectCloud(){
  const txt = document.getElementById('cloudConfigJson').value.trim();
  const rid = (document.getElementById('cloudRestaurantId').value||'laovera').trim();
  if(!txt){ toast('Pega el firebaseConfig primero','warn'); return; }
  let raw;
  try {
    // Aceptar JSON estricto o pseudo-JSON copiado del snippet (con comillas dobles ya, esperemos)
    raw = JSON.parse(txt);
  } catch(e){
    // Intento de relajar: convertir comillas simples y agregar comillas a llaves sin comillas
    try {
      const cleaned = txt
        .replace(/'/g,'"')
        .replace(/([{,]\s*)([A-Za-z_][A-Za-z0-9_]*)\s*:/g, '$1"$2":');
      raw = JSON.parse(cleaned);
    } catch(e2){
      toast('No pude leer el JSON. Revisa que esté bien copiado.','warn');
      return;
    }
  }
  // Decisión sobre datos locales vs remotos: si hay datos locales no triviales, advertir.
  const hasLocalData = (state.products && state.products.length>0) ||
                       (state.purchases && state.purchases.length>0) ||
                       (state.productions && state.productions.length>0) ||
                       (state.sales && state.sales.length>0);
  if(hasLocalData){
    const ok = confirm(
      'Vamos a conectar este dispositivo a la nube.\n\n' +
      '• Si la nube está VACÍA: se subirán tus datos locales actuales.\n' +
      '• Si la nube YA tiene datos (otro dispositivo los subió antes): tu inventario local será REEMPLAZADO por el de la nube.\n\n' +
      '¿Continuar?'
    );
    if(!ok) return;
  }
  try {
    await connectCloudSync(raw, rid);
    toast('Conectado a la nube');
    renderView();
  } catch(e){
    toast('Error: '+(e.message||e),'warn');
  }
}

/* ---------- TOTEAT IMPORT ---------- */
function parseToteatFile(ev){
  const f = ev.target.files[0];
  if(!f) return;
  const reader = new FileReader();
  reader.onload = e=>{
    const txt = e.target.result;
    const rows = parseCSVText(txt);
    showToteatPreview(rows);
  };
  reader.readAsText(f, 'utf-8');
}
function parseCSVText(txt){
  // Detect delimiter
  const firstLine = txt.split(/\r?\n/)[0] || '';
  const delim = (firstLine.split(';').length > firstLine.split(',').length) ? ';' : ',';
  const lines = txt.split(/\r?\n/).filter(l=>l.trim().length>0);
  return lines.map(l=>{
    const out = []; let cur=''; let inQ=false;
    for(let i=0;i<l.length;i++){
      const c=l[i];
      if(c==='"'){ inQ = !inQ; continue; }
      if(c===delim && !inQ){ out.push(cur); cur=''; continue; }
      cur += c;
    }
    out.push(cur);
    return out.map(s=>s.trim());
  });
}
function showToteatPreview(rows){
  if(!rows || rows.length===0){
    document.getElementById('toteatPreview').innerHTML = '<div class="empty-state soft">Archivo vacío.</div>';
    return;
  }
  // detect header
  const header = rows[0].map(h=>h.toLowerCase());
  let dataRows = rows;
  let codeIdx = -1, nameIdx = -1, qtyIdx = -1;
  const looksLikeHeader = header.some(h=>/c[oó]digo|sku|cod|item|producto|cantidad|qty|unidades/i.test(h));
  if(looksLikeHeader){
    header.forEach((h,i)=>{
      if(/c[oó]digo|sku|^cod$|item code/i.test(h) && codeIdx<0) codeIdx=i;
      if(/nombre|producto|descripci[oó]n|name/i.test(h) && nameIdx<0) nameIdx=i;
      if(/cantidad|qty|unidades|cant/i.test(h) && qtyIdx<0) qtyIdx=i;
    });
    dataRows = rows.slice(1);
  } else {
    // assume: first col = code or name, last col = qty
    codeIdx = 0; qtyIdx = rows[0].length-1;
  }
  if(qtyIdx<0) qtyIdx = rows[0].length-1;

  // Match each row to a preparation
  const matches = [];
  dataRows.forEach((r,idx)=>{
    const code = (codeIdx>=0 ? r[codeIdx] : '').trim();
    const name = (nameIdx>=0 ? r[nameIdx] : '').trim();
    const qty = parseInt(String(r[qtyIdx]||'').replace(/[^\d-]/g,''))||0;
    if(qty<=0) return;
    let prep = null;
    if(code) prep = state.preparations.find(p=>String(p.toteatCode||'').toLowerCase()===code.toLowerCase());
    if(!prep && name){
      prep = state.preparations.find(p=>p.name.toLowerCase()===name.toLowerCase());
    }
    matches.push({code, name, qty, prep, line:idx+1});
  });

  window._toteatMatches = matches;
  const ok = matches.filter(m=>m.prep);
  const miss = matches.filter(m=>!m.prep);
  const totalUds = ok.reduce((a,m)=>a+m.qty,0);

  document.getElementById('toteatPreview').innerHTML = `
    <div class="card" style="margin-bottom:0">
      <div class="card-title"><span>Vista previa de importación</span><span class="tiny">${matches.length} fila${matches.length===1?'':'s'} · ${ok.length} mapeada${ok.length===1?'':'s'}</span></div>
      <div class="kpi-grid" style="margin-bottom:12px">
        <div class="kpi-card"><div class="lbl">Filas con qty &gt; 0</div><div class="val">${matches.length}</div></div>
        <div class="kpi-card"><div class="lbl">Mapeadas a preparación</div><div class="val min-stock-ok">${ok.length}</div></div>
        <div class="kpi-card"><div class="lbl">Sin mapear</div><div class="val ${miss.length>0?'min-stock-warn':''}">${miss.length}</div></div>
        <div class="kpi-card"><div class="lbl">Total uds a registrar</div><div class="val">${fmtUds(totalUds)}</div></div>
      </div>
      <div class="table-wrap preview-table">
        <table>
          <thead><tr><th>#</th><th>Código</th><th>Nombre</th><th style="text-align:right">Cantidad</th><th>Mapeo</th></tr></thead>
          <tbody>${matches.map(m=>`<tr>
            <td>${m.line}</td>
            <td>${escapeHtml(m.code)}</td>
            <td>${escapeHtml(m.name)}</td>
            <td style="text-align:right">${m.qty}</td>
            <td>${m.prep?`<span class="badge ok">→ ${escapeHtml(m.prep.name)}</span>`:'<span class="badge warn">Sin mapeo</span>'}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
      <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:end">
        <div style="flex:1;min-width:200px">
          <label>Tipo de período</label>
          <select id="toteatPeriodType">
            <option value="dia">Día específico</option>
            <option value="semana">Semana</option>
            <option value="mes">Mes</option>
            <option value="rango" selected>Rango</option>
          </select>
        </div>
        <div style="flex:1;min-width:140px"><label>Desde</label><input id="toteatFrom" type="date" value="${todayISO()}"></div>
        <div style="flex:1;min-width:140px"><label>Hasta</label><input id="toteatTo" type="date" value="${todayISO()}"></div>
      </div>
      <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap">
        <button class="primary" ${ok.length===0?'disabled':''} onclick="importToteatVentas()">Importar ${ok.length} ventas a Bodega Cocina</button>
        <button onclick="document.getElementById('toteatPreview').innerHTML='';document.getElementById('toteatFile').value=''">Cancelar</button>
      </div>
      ${miss.length>0?`<p class="muted" style="margin-top:12px;font-size:12px">⚠ ${miss.length} fila(s) no se importarán porque no encuentran un código o nombre de preparación. Configura el código Toteat en cada preparación arriba.</p>`:''}
    </div>`;
}
function importToteatVentas(){
  const matches = window._toteatMatches || [];
  const ok = matches.filter(m=>m.prep);
  if(ok.length===0){ toast('No hay filas mapeadas','warn'); return; }
  const periodType = document.getElementById('toteatPeriodType').value;
  const from = document.getElementById('toteatFrom').value;
  const to = document.getElementById('toteatTo').value;
  if(!from||!to||from>to){ toast('Rango de fechas inválido','warn'); return; }
  // Consolidar (sumar qty por prepId)
  const consolidated = {};
  ok.forEach(m=>{
    consolidated[m.prep.id] = (consolidated[m.prep.id]||0) + m.qty;
  });
  const items = Object.entries(consolidated).map(([prepId,units])=>({prepId, units}));
  const totalUds = items.reduce((a,b)=>a+b.units,0);
  const v = {
    id:uid(), when:to,
    periodStart:from, periodEnd:to, periodType,
    items,
    notes:`Importado desde Toteat (${ok.length} líneas, ${totalUds} uds)`,
    userId:session.name
  };
  state.sales.push(v);
  logMovement('venta', `Import Toteat ${fmtDateShort(from)}→${fmtDateShort(to)}: ${totalUds} uds`, items.map(it=>{const p=state.preparations.find(x=>x.id===it.prepId);return `${p?p.name:'—'}×${it.units}`}).join(', '));
  saveState();
  document.getElementById('toteatPreview').innerHTML = `<div class="card" style="background:#e5f3ec;border-color:#2f7d4f"><strong>✓ Importadas ${totalUds} unidades en ${items.length} preparaciones</strong><div class="muted" style="margin-top:6px">Stock de Bodega Cocina actualizado.</div></div>`;
  document.getElementById('toteatFile').value='';
  window._toteatMatches = [];
  toast(`Importadas ${totalUds} uds desde Toteat`,'ok');
  renderBell();
}
function resetAll(){
  localStorage.removeItem(LS_KEY);
  state = loadState();
  saveState(); renderView(); renderTabs();
  toast('Base de datos reseteada');
}

/* ---------- EXPORT ---------- */
function downloadCSV(filename, rows){
  const csv = rows.map(r=>r.map(c=>{
    const s = String(c==null?'':c);
    return /[",\n;]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
  }).join(';')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}
function exportStockCSV(){
  const stk = computeStock();
  const rows = [['Bodega','Tipo','Producto','Cantidad','Unidad']];
  state.products.forEach(p=>{ rows.push(['General','kg',p.name, fmtKg(stk.generalKg[p.id]||0).replace('.',','), 'kg']); });
  state.preparations.forEach(pr=>{ const prod=state.products.find(x=>x.id===pr.productId); rows.push(['General','uds',`${prod?prod.name:'—'} — ${pr.name}`, fmtUds(stk.generalUds[pr.id]||0),'uds']); });
  state.preparations.forEach(pr=>{ const prod=state.products.find(x=>x.id===pr.productId); rows.push(['Cocina','uds',`${prod?prod.name:'—'} — ${pr.name}`, fmtUds(stk.cocinaUds[pr.id]||0),'uds']); });
  downloadCSV(`stock_laovera_${todayISO()}.csv`, rows);
}
function exportCSV(kind){
  let rows = [];
  if(kind==='compras'){
    rows = [['Fecha','Producto','Proveedor','Kg','Precio/kg','Total','Factura','Observaciones','Por']];
    state.purchases.forEach(c=>{
      const prod = state.products.find(p=>p.id===c.productId);
      rows.push([fmtDate(c.when), prod?prod.name:'—', c.supplier||'', c.kg, c.pricePerKg||0, Number(c.kg)*Number(c.pricePerKg||0), c.invoice||'', c.notes||'', c.userId||'']);
    });
  } else if(kind==='produccion'){
    rows = [['Fecha','Producto','Kg inicial','Merma (kg)','Merma %','Total uds','Detalle','Observaciones','Por']];
    state.productions.forEach(p=>{
      const prod = state.products.find(x=>x.id===p.productId);
      const det = (p.preps||[]).map(pp=>{ const pr=state.preparations.find(x=>x.id===pp.prepId); return `${pr?pr.name:'—'}x${pp.units}` }).join(', ');
      const tot = (p.preps||[]).reduce((a,b)=>a+b.units,0);
      const merma = (p.merma!=null) ? Number(p.merma) : (Number(p.bagBlood||0)+Number(p.trimLoss||0));
      const mermaPct = p.initialKg>0 ? (merma/p.initialKg*100).toFixed(1) : '0';
      rows.push([fmtDate(p.when), prod?prod.name:'—', p.initialKg, merma.toFixed(3), mermaPct+'%', tot, det, p.notes||'', p.userId||'']);
    });
  } else if(kind==='ventas'){
    rows = [['Tipo','Desde','Hasta','Días','Detalle','Total uds','Observaciones','Por']];
    state.sales.forEach(v=>{
      const det = (v.items||[]).map(it=>{const p=state.preparations.find(x=>x.id===it.prepId);return `${p?p.name:'—'}x${it.units}`}).join(', ');
      const tot = (v.items||[]).reduce((a,b)=>a+b.units,0);
      rows.push([periodLabel(v.periodType||'dia'), fmtDateShort(v.periodStart||v.when), fmtDateShort(v.periodEnd||v.when), periodDays(v), det, tot, v.notes||'', v.userId||'']);
    });
  } else if(kind==='inventario'){
    rows = [['Fecha','Bodega','Producto','Teórico','Real','Descuadre','Motivo','Por']];
    state.inventories.forEach(inv=>{
      (inv.items||[]).forEach(it=>{
        let label = it.key;
        if(it.key.startsWith('kg:')){ const p=state.products.find(x=>x.id===it.key.slice(3)); label=p?p.name+' (kg)':label; }
        else if(it.key.startsWith('prep:')){ const pr=state.preparations.find(x=>x.id===it.key.slice(5)); label=pr?pr.name+' (uds)':label; }
        rows.push([fmtDate(inv.when), inv.bodega, label, it.theoretical, it.real, it.descuadre, inv.reason||'', inv.userId||'']);
      });
    });
  } else if(kind==='historial'){
    rows = [['Cuándo','Tipo','Por','Resumen','Detalle']];
    state.movements.forEach(m=>rows.push([fmtDateTime(m.when), m.type, m.userId||'', m.summary, m.detail||'']));
  }
  downloadCSV(`${kind}_laovera_${todayISO()}.csv`, rows);
}
