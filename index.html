<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>La Overa - Carta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Bebas+Neue&family=Playfair+Display:wght@400;700;800&family=Montserrat:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&family=DM+Sans:wght@400;500;700;800&family=Manrope:wght@300;400;500;600;700;800&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #e6d2a8;
    --topbar-bg: #e8dcc0;
    --card: #a0522d;
    --card-hover: #7e3f20;
    --navbar: #2d1f17;
    --text-dark: #2d1f17;
    --text-light: #ffffff;
    --text-muted: rgba(255, 255, 255, 0.78);
    --accent: #d4a017;
    --modal-bg: rgba(15, 12, 10, 0.92);
    --shadow: 0 8px 24px rgba(0, 0, 0, 0.14);
    --shadow-hover: 0 14px 36px rgba(0, 0, 0, 0.22);
    --font-body: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --font-display: 'Oswald', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow-x: hidden; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text-dark);
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* TOP NAV */
  .topbar {
    background: var(--topbar-bg);
    color: var(--topbar-text, var(--navbar));
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--accent);
  }
  .topbar .brand {
    font-size: 11px;
    letter-spacing: 2.2px;
    font-weight: 600;
    color: var(--topbar-text, var(--navbar));
    opacity: 0.5;
    text-transform: uppercase;
  }
  .topbar .resto-logo {
    font-family: var(--font-display);
    color: var(--topbar-logo, var(--navbar));
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 2.5px;
    text-transform: uppercase;
  }
  .topbar .resto-logo img { height: 40px; }

  /* HOME VIEW */
  #home {
    min-height: calc(100vh - 64px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    text-align: center;
  }
  #home .big-logo {
    font-family: var(--font-display);
    color: var(--card);
    font-size: 72px;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 12px;
    line-height: 1;
  }
  #home .big-logo img { max-width: 280px; max-height: 220px; }
  #home .tagline {
    font-size: 13px;
    color: var(--navbar);
    opacity: 0.6;
    margin-bottom: 48px;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 500;
  }
  #home .menu-buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 380px;
  }
  .menu-btn {
    background: var(--navbar);
    color: var(--text-light);
    border: none;
    padding: 20px 24px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 3px;
    cursor: pointer;
    border-radius: 6px;
    transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    text-transform: uppercase;
    font-family: var(--font-body);
  }
  .menu-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(0,0,0,0.16); }
  .menu-btn:active { transform: translateY(0); }
  #home .footer-info {
    margin-top: 48px;
    font-size: 12px;
    color: var(--navbar);
    opacity: 0.5;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* MENU VIEW */
  #menu-view { display: none; padding-bottom: 100px; }
  .cat-nav {
    background: var(--bg);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    white-space: nowrap;
    padding: 16px 20px;
    position: sticky;
    top: 64px;
    z-index: 50;
  }
  .cat-nav::-webkit-scrollbar { display: none; }
  .cat-nav .cat-link {
    display: inline-block;
    padding: 9px 18px;
    margin-right: 10px;
    color: var(--navbar);
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    border: 1.5px solid rgba(45, 31, 23, 0.15);
    border-radius: 100px;
    background: transparent;
    transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s;
  }
  .cat-nav .cat-link:hover {
    border-color: var(--card);
    color: var(--card);
  }
  .cat-nav .cat-link.active {
    background: var(--card);
    color: var(--text-light);
    border-color: var(--card);
  }
  .cat-nav .cat-link.active:hover {
    color: var(--text-light);
    background: var(--card-hover);
    border-color: var(--card-hover);
  }

  .cat-section { padding: 24px 20px 4px; max-width: 1600px; margin: 0 auto; scroll-margin-top: 116px; }
  .cat-section h2 {
    display: inline-block;
    font-family: var(--font-display);
    color: var(--navbar);
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 10px 24px;
    border: 1.5px solid rgba(45, 31, 23, 0.25);
    border-radius: 100px;
    background: transparent;
    margin-bottom: 18px;
    text-transform: uppercase;
  }
  .items-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
    margin-bottom: 28px;
  }
  @media (min-width: 720px) { .items-grid { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 1080px) { .items-grid { grid-template-columns: 1fr 1fr 1fr; } }
  @media (min-width: 1440px) { .items-grid { grid-template-columns: 1fr 1fr 1fr 1fr; } }

  .item-card {
    background: var(--card);
    color: var(--text-light);
    border-radius: var(--radius);
    border: 1.5px solid rgba(0, 0, 0, 0.35);
    overflow: hidden;
    display: flex;
    flex-direction: row-reverse;
    min-height: 124px;
    cursor: pointer;
    box-shadow: var(--shadow);
    position: relative;
    transition: transform 0.2s, box-shadow 0.2s, background 0.2s, border-color 0.2s;
  }
  .item-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); background: var(--card-hover); border-color: rgba(0, 0, 0, 0.5); }
  .item-card .item-info { flex: 1; padding: 16px 18px 16px 16px; display: flex; flex-direction: column; justify-content: space-between; min-width: 0; }
  .item-card .item-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    margin-bottom: 6px;
    line-height: 1.25;
  }
  .item-card .item-desc {
    font-size: 11.5px;
    color: var(--text-muted);
    line-height: 1.4;
    flex: 1;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    font-weight: 400;
  }
  .item-card .item-price {
    font-size: 14px;
    font-weight: 700;
    margin-top: 10px;
    letter-spacing: 0.3px;
  }
  .item-card .item-photo {
    width: 124px;
    min-width: 124px;
    background-size: cover;
    background-position: center;
    background-color: rgba(0,0,0,0.15);
  }
  .item-card .badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: var(--accent);
    color: var(--navbar);
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 700;
    padding: 4px 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-radius: 100px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    z-index: 2;
  }
  /* Si la card tiene badge, dejamos espacio al título para que no se solapen */
  .item-card:has(.badge) .item-title {
    padding-right: 84px;
  }
  .item-card.no-photo { min-height: auto; }
  .item-card.no-photo .item-photo { display: none; }
  .item-card.no-photo .item-info { padding: 16px 18px; }

  /* BACK BUTTON */
  .back-btn {
    position: fixed;
    bottom: 20px;
    left: 20px;
    width: 44px;
    height: 44px;
    background: rgba(40, 30, 20, 0.85);
    color: #fff;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 60;
    box-shadow: var(--shadow);
  }

  /* MODAL */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--modal-bg);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--card);
    color: #fff;
    border-radius: 14px;
    max-width: 440px;
    width: 100%;
    max-height: 90vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  }
  .modal-close {
    position: absolute;
    top: 12px;
    left: 12px;
    width: 32px;
    height: 32px;
    background: rgba(0,0,0,0.5);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    z-index: 10;
  }
  .modal-badge {
    position: absolute;
    top: 14px;
    right: 14px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 4px;
    letter-spacing: 0.5px;
    z-index: 10;
  }
  .modal-img {
    width: 100%;
    aspect-ratio: 4 / 3;
    background-size: cover;
    background-position: center;
    background-color: rgba(0,0,0,0.15);
  }
  .modal-img.no-img { display: none; }
  .modal-body {
    padding: 22px 24px 28px;
    text-align: center;
    border-top: 4px solid rgba(255,255,255,0.15);
  }
  .modal-cat { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.75; margin-bottom: 10px; }
  .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 1px; }
  .modal-desc { font-size: 14px; line-height: 1.5; opacity: 0.9; margin-bottom: 18px; }
  .modal-price { font-size: 18px; font-weight: 700; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #6b5b48;
  }
  .empty-state h3 { margin-bottom: 8px; color: var(--text-dark); }
  .empty-state a { color: var(--card); text-decoration: none; font-weight: 600; }

  /* ============ MOBILE (≤720px) ============ */
  @media (max-width: 720px) {
    /* Topbar más compacta */
    .topbar { padding: 13px 18px; border-bottom-width: 2.5px; }
    .topbar .brand { font-size: 10px; letter-spacing: 1.8px; }
    .topbar .resto-logo { font-size: 20px; letter-spacing: 2px; }
    .topbar .resto-logo img { height: 30px; }

    /* Home más ajustado */
    #home {
      min-height: calc(100vh - 48px);
      padding: 28px 22px;
    }
    #home .big-logo {
      font-size: 52px;
      letter-spacing: 3px;
      margin-bottom: 10px;
    }
    #home .big-logo img { max-width: 200px; max-height: 170px; }
    #home .tagline {
      font-size: 11px;
      letter-spacing: 3px;
      margin-bottom: 36px;
    }
    #home .menu-buttons { gap: 11px; }
    .menu-btn {
      padding: 18px 22px;
      font-size: 14px;
      letter-spacing: 2.5px;
    }
    #home .footer-info {
      margin-top: 36px;
      font-size: 11px;
      letter-spacing: 1.5px;
    }

    /* Cat-nav: scroll horizontal optimizado, touch friendly */
    .cat-nav {
      padding: 12px 14px;
      top: 48px;
    }
    .cat-nav .cat-link {
      margin-right: 8px;
      font-size: 11.5px;
      letter-spacing: 1.2px;
      padding: 8px 14px;
    }

    /* Categorías y cards */
    .cat-section { padding: 18px 14px 4px; scroll-margin-top: 100px; }
    .cat-section h2 {
      font-size: 14px;
      padding: 8px 18px;
      letter-spacing: 1.5px;
      margin-bottom: 16px;
    }
    .items-grid {
      gap: 10px;
      margin-bottom: 20px;
    }
    .item-card {
      min-height: 108px;
      border-radius: 10px;
    }
    .item-card .item-info {
      padding: 12px 14px 12px 12px;
    }
    .item-card .item-title {
      font-size: 13px;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
      line-height: 1.2;
    }
    .item-card .item-desc {
      font-size: 11.5px;
      line-height: 1.35;
      letter-spacing: 0.3px;
      -webkit-line-clamp: 2;
    }
    .item-card .item-price {
      font-size: 14px;
      margin-top: 6px;
    }
    .item-card .item-photo {
      width: 102px;
      min-width: 102px;
    }
    .item-card .badge {
      top: 8px;
      right: 8px;
      font-size: 9px;
      padding: 3px 9px;
      letter-spacing: 0.8px;
    }
    .item-card:has(.badge) .item-title {
      padding-right: 70px;
    }

    /* Back button más a mano */
    .back-btn {
      bottom: 18px;
      left: 16px;
      width: 46px;
      height: 46px;
    }

    /* Modal casi fullscreen en mobile */
    .modal-backdrop { padding: 12px; }
    .modal {
      max-width: 100%;
      max-height: 92vh;
      border-radius: 14px;
    }
    .modal-img { aspect-ratio: 4 / 3; height: auto; }
    .modal-body {
      padding: 18px 20px 24px;
    }
    .modal-cat {
      font-size: 10.5px;
      letter-spacing: 1.8px;
      margin-bottom: 8px;
    }
    .modal-title {
      font-size: 18px;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
    }
    .modal-desc {
      font-size: 13.5px;
      line-height: 1.45;
      margin-bottom: 16px;
    }
    .modal-price { font-size: 17px; }
    .modal-close {
      width: 34px;
      height: 34px;
      top: 14px;
      left: 14px;
      font-size: 20px;
    }
  }

  /* Pantallas muy chicas (≤380px, iPhone SE/Mini) */
  @media (max-width: 380px) {
    .topbar { padding: 11px 14px; }
    .topbar .resto-logo { font-size: 17px; letter-spacing: 1.6px; }
    .topbar .brand { font-size: 9.5px; letter-spacing: 1.5px; }
    #home .big-logo { font-size: 44px; letter-spacing: 2.5px; }
    .cat-nav .cat-link { margin-right: 6px; font-size: 11px; padding: 7px 12px; }
    .cat-section h2 { font-size: 13px; padding: 7px 16px; letter-spacing: 1.3px; }
    .item-card:has(.badge) .item-title { padding-right: 64px; }
    .item-card { min-height: 100px; }
    .item-card .item-photo { width: 92px; min-width: 92px; }
    .item-card .item-info { padding: 11px 13px 11px 11px; }
    .item-card .item-title { font-size: 12.5px; }
    .item-card .item-desc { font-size: 11px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">CARTA DIGITAL</div>
  <div class="resto-logo" id="topbar-logo">La Overa</div>
</div>

<!-- HOME VIEW -->
<div id="home">
  <div class="big-logo" id="home-logo">La Overa</div>
  <div class="tagline" id="home-tagline">RESTAURANT · TALCA</div>
  <div class="menu-buttons" id="menu-buttons"></div>
  <div class="footer-info" id="footer-info">Lunes a Domingo · 12:30 a 21:00</div>
</div>

<!-- MENU VIEW -->
<div id="menu-view">
  <div class="cat-nav" id="cat-nav"></div>
  <div id="cat-content"></div>
</div>

<button class="back-btn" id="back-btn" style="display:none" aria-label="Volver">&larr;</button>

<!-- MODAL -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <button class="modal-close" id="modal-close" aria-label="Cerrar">&times;</button>
    <div class="modal-badge" id="modal-badge" style="display:none"></div>
    <div class="modal-img" id="modal-img"></div>
    <div class="modal-body">
      <div class="modal-cat" id="modal-cat"></div>
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-price" id="modal-price"></div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'laovera_carta_v3';

const DEFAULT_THEME = {
  font: 'Manrope',
  bgColor: '#e6d2a8',
  topbarBg: '#e8dcc0',
  navColor: '#2d1f17',
  cardColor: '#a0522d',
  textColor: '#ffffff',
  accentColor: '#d4a017'
};

// Detecta cualquier default anterior y migra al actual. Solo migra si el usuario
// no personalizó (todos los colores coinciden con un default conocido).
const PREVIOUS_DEFAULTS = [
  { font: 'Inter', bgColor: '#f1e8d0', cardColor: '#b04948' },        // v2: rojo coral + crema
  { font: 'Manrope', bgColor: '#f0e6d2', cardColor: '#a0522d' }       // v3: terracota + crema claro
];
function isPreviousDefaultTheme(t) {
  if (!t) return false;
  return PREVIOUS_DEFAULTS.some(p =>
    p.font === t.font && p.bgColor === t.bgColor && p.cardColor === t.cardColor
  );
}

    { id: 'c20', menu: 'Barra', name: 'Cafetería', order: 7, active: true }
  ],
  items: [
    { id: 'i01', categoryId: 'c01', name: 'Ceviche de Salmón', description: 'Salmón y camarón. Acompañado de cilantro, cebolla morada y rocotto.', price: 9900, photo: '', active: true, badge: '', order: 1 },
    { id: 'i02', categoryId: 'c01', name: 'Crudo de Res', description: 'Crudo de res con alcaparras, cebolla morada, cilantro, pepinillos y mayonesa. Acompañado de tostadas hechas en casa.', price: 9900, photo: '', active: true, badge: '', order: 2 },
    { id: 'i03', categoryId: 'c01', name: 'Empanadas de Queso', description: '6 unidades.', price: 5900, photo: '', active: true, badge: '', order: 3 },
    { id: 'i04', categoryId: 'c02', name: 'Ensalada Chilena', description: 'Tomate acompañado con cebolla en pluma, ají verde y cilantro.', price: 4200, photo: '', active: true, badge: '', order: 1 },

      // lo actualizamos al nuevo. Si el usuario lo personalizó, respetamos su elección.
      if (d.config && isPreviousDefaultTheme(d.config.theme)) {
        d.config.theme = { ...DEFAULT_THEME };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
      }
      return d;
    }
  } catch (e) {}
  localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_DATA));
  return DEFAULT_DATA;
}

let data = loadData();
let currentMenu = null;

function fmtPrice(n) {
  return '$' + (n || 0).toLocaleString('es-CL');
}

function shadeColor(hex, percent) {
  // percent: negative = darker, positive = lighter
  const m = (hex || '').replace('#', '').match(/.{2}/g);
  if (!m || m.length !== 3) return hex;
  const rgb = m.map(h => parseInt(h, 16));
  const adj = rgb.map(c => Math.max(0, Math.min(255, Math.round(c + (c * percent / 100)))));
  return '#' + adj.map(c => c.toString(16).padStart(2, '0')).join('');
}

function isDarkColor(hex) {
  const m = (hex || '').replace('#', '').match(/.{2}/g);
  if (!m || m.length !== 3) return false;
  const [r, g, b] = m.map(h => parseInt(h, 16) / 255);
  return (0.299 * r + 0.587 * g + 0.114 * b) < 0.55;
}

function applyTheme() {
  const t = { ...DEFAULT_THEME, ...((data.config || {}).theme || {}) };
  const r = document.documentElement.style;
  r.setProperty('--bg', t.bgColor);
  const topbar = t.topbarBg || t.bgColor;
  r.setProperty('--topbar-bg', topbar);
  // Auto-contraste: si el topbar bg es oscuro, texto claro; si es claro, texto oscuro
  const topbarIsDark = isDarkColor(topbar);
  r.setProperty('--topbar-text', topbarIsDark ? t.textColor : t.navColor);
  r.setProperty('--topbar-logo', topbarIsDark ? t.accentColor : t.navColor);
  r.setProperty('--navbar', t.navColor);
  r.setProperty('--card', t.cardColor);
  r.setProperty('--card-hover', shadeColor(t.cardColor, -10));
  r.setProperty('--text-light', t.textColor);
  r.setProperty('--accent', t.accentColor);
  const fontStack = `'${t.font}', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif`;
  r.setProperty('--font-body', fontStack);
  r.setProperty('--font-display', fontStack);
}

function renderHome() {
  applyTheme();
  document.getElementById('home').style.display = 'flex';
  document.getElementById('menu-view').style.display = 'none';
  document.getElementById('back-btn').style.display = 'none';

  // Logo and texts
  const logoEl = document.getElementById('home-logo');
  const topLogo = document.getElementById('topbar-logo');
  if (data.config.logo) {
    logoEl.innerHTML = `<img src="${data.config.logo}" alt="${data.config.name}">`;
    topLogo.innerHTML = `<img src="${data.config.logo}" alt="${data.config.name}">`;
  } else {
    logoEl.textContent = data.config.name || 'La Overa';
    topLogo.textContent = data.config.name || 'La Overa';
  }
  document.getElementById('home-tagline').textContent = data.config.tagline || '';
  document.getElementById('footer-info').textContent = data.config.footer || '';

  // Menus
  const wrap = document.getElementById('menu-buttons');
  wrap.innerHTML = '';
  (data.config.menus || []).forEach(menu => {
    const btn = document.createElement('button');
    btn.className = 'menu-btn';
    btn.textContent = menu;
    btn.onclick = () => openMenu(menu);
    wrap.appendChild(btn);
  });
}

function openMenu(menu) {
  currentMenu = menu;
  document.getElementById('home').style.display = 'none';
  document.getElementById('menu-view').style.display = 'block';
  document.getElementById('back-btn').style.display = 'flex';
  window.scrollTo(0, 0);
  renderMenu();
}

function renderMenu() {
  const cats = (data.categories || [])
    .filter(c => c.menu === currentMenu && c.active)
    .sort((a, b) => a.order - b.order);

  // Nav
  const nav = document.getElementById('cat-nav');
  nav.innerHTML = '';
  cats.forEach(c => {
    const a = document.createElement('a');
    a.className = 'cat-link';
    a.dataset.cat = c.id;
    a.textContent = c.name;
    a.onclick = () => {
      const el = document.getElementById('sec-' + c.id);
      if (el) {
        // scroll-margin-top en .cat-section deja el espacio del header sticky
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    };
    nav.appendChild(a);
  });

  // Sections
  const content = document.getElementById('cat-content');
  content.innerHTML = '';

  if (cats.length === 0) {
    content.innerHTML = `<div class="empty-state">
      <h3>Aún no hay categorías en este menú</h3>
      <p>Agrega categorías y productos desde <a href="admin.html">el panel de administración</a></p>
    </div>`;
    return;
  }

  cats.forEach(cat => {
    const items = (data.items || [])
      .filter(it => it.categoryId === cat.id && it.active)
      .sort((a, b) => a.order - b.order);

    if (items.length === 0) return;

    const section = document.createElement('div');
    section.className = 'cat-section';
    section.id = 'sec-' + cat.id;
    section.innerHTML = `<h2>${escapeHtml(cat.name)}</h2><div class="items-grid" id="grid-${cat.id}"></div>`;
    content.appendChild(section);

    const grid = section.querySelector('.items-grid');
    items.forEach(it => {
      const card = document.createElement('div');
      card.className = 'item-card' + (it.photo ? '' : ' no-photo');
      card.innerHTML = `
        ${it.badge ? `<span class="badge">${escapeHtml(it.badge)}</span>` : ''}
        <div class="item-info">
          <div>
            <div class="item-title">${escapeHtml(it.name)}</div>
            <div class="item-desc">${escapeHtml(it.description || '')}</div>
          </div>
          <div class="item-price">${fmtPrice(it.price)}</div>
        </div>
        ${it.photo ? `<div class="item-photo" style="background-image:url('${it.photo}')"></div>` : ''}
      `;
      card.onclick = () => openItem(it, cat);
      grid.appendChild(card);
    });
  });

  // Active section on scroll (la primera se marca activa adentro de setupScrollSpy)
  setupScrollSpy(cats);
}

function setupScrollSpy(cats) {
  const navEl = document.getElementById('cat-nav');
  const items = cats.map(c => ({
    id: c.id,
    section: document.getElementById('sec-' + c.id),
    link: navEl.querySelector(`[data-cat="${c.id}"]`)
  })).filter(x => x.section && x.link);

  // Cleanup listeners anteriores (importante al cambiar de menú)
  if (window._spyHandler) {
    window.removeEventListener('scroll', window._spyHandler);
    document.removeEventListener('scroll', window._spyHandler, true);
    window.removeEventListener('resize', window._spyHandler);
  }

  if (items.length === 0) return;

  let lastActiveId = null;
  let rafScheduled = false;

  function compute() {
    rafScheduled = false;
    const isMobile = window.matchMedia('(max-width: 720px)').matches;
    // Línea imaginaria un poco debajo del header sticky (topbar + nav)
    const LINE = isMobile ? 110 : 130;

    // La sección activa = la última cuyo top ya cruzó la línea hacia arriba
    let active = items[0];
    for (let i = 0; i < items.length; i++) {
      const rect = items[i].section.getBoundingClientRect();
      if (rect.top - LINE <= 0) {
        active = items[i];
      } else {
        break;
      }
    }

    if (active.id === lastActiveId) return;
    lastActiveId = active.id;

    items.forEach(it => it.link.classList.toggle('active', it === active));

    // Auto-scroll del nav horizontal para mostrar el link activo
    const linkLeft = active.link.offsetLeft;
    const linkWidth = active.link.offsetWidth;
    const navW = navEl.clientWidth;
    navEl.scrollTo({
      left: Math.max(0, linkLeft - navW / 2 + linkWidth / 2),
      behavior: 'smooth'
    });
  }

  function onScrollOrResize() {
    if (rafScheduled) return;
    rafScheduled = true;
    requestAnimationFrame(compute);
  }

  // Listen en window, document (con capture, atrapa scroll en cualquier elemento),
  // y resize (para recalcular si cambia el tamaño de la ventana)
  window._spyHandler = onScrollOrResize;
  window.addEventListener('scroll', onScrollOrResize, { passive: true });
  document.addEventListener('scroll', onScrollOrResize, { passive: true, capture: true });
  window.addEventListener('resize', onScrollOrResize, { passive: true });

  // Estado inicial
  compute();
}

function openItem(it, cat) {
  document.getElementById('modal-cat').textContent = cat.name;
  document.getElementById('modal-title').textContent = it.name;
  document.getElementById('modal-desc').textContent = it.description || '';
  document.getElementById('modal-price').textContent = fmtPrice(it.price);
  const img = document.getElementById('modal-img');
  if (it.photo) {
    img.style.backgroundImage = `url('${it.photo}')`;
    img.classList.remove('no-img');
  } else {
    img.classList.add('no-img');
  }
  const badge = document.getElementById('modal-badge');
  if (it.badge) {
    badge.textContent = it.badge;
    badge.style.display = 'block';
  } else {
    badge.style.display = 'none';
  }
  document.getElementById('modal').classList.add('open');
}

function escapeHtml(str) {
  return String(str || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Listeners
document.getElementById('back-btn').onclick = renderHome;
document.getElementById('modal-close').onclick = () => document.getElementById('modal').classList.remove('open');
document.getElementById('modal').onclick = (e) => {
  if (e.target.id === 'modal') document.getElementById('modal').classList.remove('open');
};

// Refresh data if changed in admin (other tab)
window.addEventListener('storage', (e) => {
  if (e.key === STORAGE_KEY) {
    data = loadData();
    if (document.getElementById('menu-view').style.display === 'block') renderMenu();
    else renderHome();
  }
});

renderHome();
</script>
