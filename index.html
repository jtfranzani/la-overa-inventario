<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Overa — Control de Inventario</title>
<style>
:root{
  --bg:#f7f6f3;
  --card:#ffffff;
  --border:#eae7df;
  --border-strong:#d4d0c5;
  --text:#1f1d1a;
  --text-muted:#6a6862;
  --text-soft:#a3a098;
  --accent:#2c2a26;
  --accent-hover:#3d3a35;
  --olive:#5e6e4f;
  --olive-dark:#42523a;
  --warn:#b8473a;
  --warn-bg:#fbeae7;
  --ok:#317a4d;
  --ok-bg:#e8f3ed;
  --info:#3a6ea3;
  --info-bg:#e7eff7;
  --gold:#a07320;
  --shadow:0 1px 2px rgba(40,35,25,0.04),0 1px 3px rgba(40,35,25,0.03);
  --shadow-lg:0 4px 16px rgba(40,35,25,0.06),0 2px 4px rgba(40,35,25,0.04);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;font-size:13.5px;line-height:1.6;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;font-feature-settings:"kern" 1,"liga" 1,"calt" 1}
h1,h2,h3{font-family:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,"Times New Roman",serif;font-weight:500;letter-spacing:-0.012em;color:var(--text)}
h1{font-size:27px;margin:0 0 4px;line-height:1.18;letter-spacing:-0.02em}
h2{font-size:18.5px;margin:0 0 10px;line-height:1.25;letter-spacing:-0.012em}
h3{font-size:15px;margin:0 0 6px;line-height:1.3;letter-spacing:-0.005em}
button{font-family:inherit;font-size:13.5px;font-weight:500;cursor:pointer;border-radius:6px;padding:8px 14px;border:1px solid var(--border-strong);background:#fff;color:var(--text);transition:all .12s ease;line-height:1.3}
button:hover{border-color:#b8b3a5;background:#faf9f5}
button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
button.primary:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
button.olive{background:var(--olive);color:#fff;border-color:var(--olive)}
button.olive:hover{background:var(--olive-dark);border-color:var(--olive-dark)}
button.danger{background:#fff;color:var(--warn);border-color:#e8c7c1}
button.danger:hover{background:var(--warn-bg);border-color:var(--warn)}
button.ghost{background:transparent;border-color:transparent;box-shadow:none}
button.ghost:hover{background:#f0eee9}
button.small{padding:5px 10px;font-size:12.5px;border-radius:5px}
button:disabled{opacity:.5;cursor:not-allowed}
input,select,textarea{font-family:inherit;font-size:14px;padding:9px 11px;border:1px solid var(--border-strong);border-radius:6px;background:#fff;color:var(--text);width:100%;transition:border-color .12s ease,box-shadow .12s ease}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(44,42,38,0.08)}
label{display:block;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:22px;box-shadow:var(--shadow);margin-bottom:18px}
.card-title{font-size:11px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--text-muted);margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:12px}
.card-title .tiny{color:var(--text-soft);font-weight:500}
.row{display:flex;gap:14px;flex-wrap:wrap}
.row>*{flex:1;min-width:160px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:900px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}
.muted{color:var(--text-muted)}
.soft{color:var(--text-soft)}
.tiny{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--text-soft)}
.big-num{font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;font-size:32px;line-height:1.1;font-weight:500}
.kpi{padding:16px;background:#fff;border:1px solid var(--border);border-radius:8px}
.kpi .tiny{margin-bottom:6px}
.kpi .big-num{color:var(--text)}
.kpi .sub{font-size:12px;color:var(--text-muted);margin-top:4px}
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;line-height:1.4}
.badge.admin{background:var(--info-bg);color:var(--info)}
.badge.bodega{background:var(--ok-bg);color:var(--ok)}
.badge.cocina{background:var(--warn-bg);color:var(--warn)}
.badge.warn{background:var(--warn-bg);color:var(--warn)}
.badge.ok{background:var(--ok-bg);color:var(--ok)}
.badge.info{background:var(--info-bg);color:var(--info)}
.badge.soft{background:#f0efeb;color:var(--text-muted)}
table{width:100%;border-collapse:collapse;font-size:13px}
table th{text-align:left;padding:11px 14px;font-weight:600;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-soft);border-bottom:1px solid var(--border);background:#fafaf7}
table td{padding:12px 14px;border-bottom:1px solid var(--border)}
table tr:last-child td{border-bottom:none}
table tbody tr:hover{background:#fafaf7}
.hidden{display:none!important}

/* HEADER */
.app-header{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;display:flex;align-items:stretch;padding:0 24px;height:60px;box-shadow:0 1px 0 rgba(40,35,25,0.02)}
.brand{display:flex;flex-direction:column;justify-content:center;line-height:1.1;margin-right:28px;padding-right:24px;border-right:1px solid var(--border);flex-shrink:0}
.brand .name{font-family:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;font-size:21px;font-weight:500;color:var(--text);letter-spacing:-0.018em;line-height:1;font-style:italic}
.brand .sub{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-soft);margin-top:4px;font-weight:600;line-height:1}
.tabs-wrap{position:relative;flex:1;min-width:0;height:100%;display:flex;align-items:stretch}
.tabs{display:flex;gap:0;width:100%;height:100%;overflow-x:auto;overflow-y:hidden;scrollbar-width:thin;scrollbar-color:#d4d0c5 transparent;scroll-behavior:smooth}
.tabs::-webkit-scrollbar{height:4px}
.tabs::-webkit-scrollbar-track{background:transparent}
.tabs::-webkit-scrollbar-thumb{background:#d4d0c5;border-radius:99px}
.tabs::-webkit-scrollbar-thumb:hover{background:#a3a098}
/* Fade indicators: aparecen sólo cuando hay scroll posible */
.tabs-wrap::before,.tabs-wrap::after{content:'';position:absolute;top:0;bottom:0;width:32px;pointer-events:none;z-index:2;opacity:0;transition:opacity .15s ease}
.tabs-wrap::before{left:0;background:linear-gradient(90deg,#fff 0%,rgba(255,255,255,0) 100%)}
.tabs-wrap::after{right:0;background:linear-gradient(270deg,#fff 0%,rgba(255,255,255,0) 100%)}
.tabs-wrap.can-scroll-left::before{opacity:1}
.tabs-wrap.can-scroll-right::after{opacity:1}
/* Botones de scroll */
.tabs-scroll-btn{position:absolute;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:99px;background:#fff;border:1px solid var(--border-strong);color:var(--text-muted);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px;line-height:1;padding:0;z-index:3;box-shadow:0 2px 6px rgba(40,35,25,.08)}
.tabs-scroll-btn:hover{background:#fafaf7;color:var(--text);border-color:var(--text-muted)}
.tabs-scroll-btn.left{left:2px}
.tabs-scroll-btn.right{right:2px}
.tabs-wrap.can-scroll-left .tabs-scroll-btn.left{display:flex}
.tabs-wrap.can-scroll-right .tabs-scroll-btn.right{display:flex}
.tab{padding:0 14px;display:inline-flex;align-items:center;font-size:11.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);border-bottom:2px solid transparent;cursor:pointer;position:relative;transition:color .12s ease,border-color .12s ease;white-space:nowrap;height:100%;flex-shrink:0}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.tab .count{display:inline-block;margin-left:7px;background:var(--olive);color:#fff;font-size:10px;padding:2px 7px;border-radius:99px;letter-spacing:.04em;font-weight:600}
.user-chip{display:flex;align-items:center;gap:10px;padding-left:16px;border-left:1px solid var(--border);margin-left:12px;flex-shrink:0}
.avatar{width:32px;height:32px;border-radius:99px;background:linear-gradient(135deg,var(--olive),var(--olive-dark));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;letter-spacing:0;flex-shrink:0}
.user-info{display:flex;flex-direction:column;line-height:1.2;max-width:140px}
.user-info .name{font-size:12.5px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-info .role{font-size:10px;color:var(--text-soft);letter-spacing:.08em;text-transform:uppercase;font-weight:600;margin-top:2px}
.user-chip .small.ghost{padding:5px 10px;font-size:12px;color:var(--text-muted)}
.user-chip .small.ghost:hover{color:var(--text)}

/* CONTAINER */
.container{max-width:1280px;margin:0 auto;padding:32px 28px 80px}
.page-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:26px;flex-wrap:wrap;gap:14px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.page-head h1{margin-bottom:6px;font-size:28px}
.page-head .desc{color:var(--text-muted);font-size:13.5px;margin-top:0;max-width:680px;line-height:1.55}
.page-head .actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#f7f6f3 0%,#ece8df 100%);padding:24px}
.login-box{background:#fff;border:1px solid var(--border);border-radius:14px;padding:40px 36px;max-width:400px;width:100%;box-shadow:0 12px 48px rgba(40,35,25,.08),0 2px 8px rgba(40,35,25,.04)}
.login-box .brand{align-items:center;margin:0 auto 28px;text-align:center;padding:0;border:none}
.login-box .brand .name{font-size:28px;letter-spacing:-0.02em}
.login-box .brand .sub{margin-top:6px;letter-spacing:.22em}
.login-help{margin-top:22px;font-size:12px;color:var(--text-muted);text-align:center;line-height:1.7;padding-top:18px;border-top:1px solid var(--border)}
.login-help code{background:#f0efeb;padding:2px 7px;border-radius:4px;font-size:11px;color:var(--text);font-family:"SF Mono",Monaco,monospace}

/* STOCK CARDS */
.bodega-card{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#fff;box-shadow:var(--shadow)}
.bodega-header{padding:14px 20px;color:#fff;display:flex;justify-content:space-between;align-items:center;font-size:12px;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.bodega-header.general{background:linear-gradient(135deg,#2c3e50,#1f2d3a)}
.bodega-header.cocina{background:linear-gradient(135deg,var(--olive),var(--olive-dark))}
.bodega-header > span:last-child{font-weight:500;opacity:.8;letter-spacing:.05em}
.bodega-body{padding:4px 20px}
.bodega-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);gap:12px}
.bodega-row:last-child{border-bottom:none}
.bodega-row > span:first-child{font-size:13.5px}
.bodega-row .qty{color:var(--gold);font-weight:600;margin-right:4px;font-size:15px;font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif}
.empty-state{padding:48px 24px;text-align:center;color:var(--text-soft)}
.empty-state .icon{font-size:42px;margin-bottom:12px;opacity:.7}

/* FORMS */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.form-row-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:700px){.form-row,.form-row-3,.form-row-4{grid-template-columns:1fr}}
.divider{border-top:1px solid var(--border);margin:22px 0}
.section-label{font-size:11px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--text-muted);margin:0 0 12px}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--accent);color:#fff;padding:13px 18px;border-radius:8px;box-shadow:0 8px 24px rgba(40,35,25,.2);z-index:100;animation:slideIn .2s ease;font-size:13.5px;font-weight:500;max-width:360px}
.toast.ok{background:var(--ok)}
.toast.warn{background:var(--warn)}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* PILLS */
.pill-row{display:flex;flex-wrap:wrap;gap:6px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;display:flex;align-items:center;justify-content:center;padding:24px}
.modal{background:#fff;border-radius:12px;padding:28px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto}

/* PREP LIST IN PRODUCTION */
.prep-item{display:grid;grid-template-columns:1fr 120px 120px 40px;gap:12px;margin-bottom:10px;align-items:end;padding:10px 12px;border-radius:6px}
.prep-item:nth-child(even){background:#fafaf7}
.prep-item button.remove{padding:8px;background:transparent;border:1px solid var(--border);color:var(--warn)}

/* HISTORY */
.hist-row{padding:14px 0;border-bottom:1px solid var(--border);display:grid;grid-template-columns:160px 100px 140px 1fr;gap:16px;align-items:center;font-size:13px}
.hist-row:last-child{border-bottom:none}
.hist-row:hover{background:#fafaf7;border-radius:6px;margin:0 -8px;padding-left:8px;padding-right:8px}
.hist-row .when{color:var(--text-muted);font-size:12px;font-variant-numeric:tabular-nums}
.hist-row .type{font-weight:600;color:var(--text)}

/* HISTORY ALT (full table style)*/
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:8px;background:#fff}
.table-wrap table th:first-child, .table-wrap table td:first-child{padding-left:16px}
.table-wrap table th:last-child, .table-wrap table td:last-child{padding-right:16px}

/* DESCUADRE highlight */
.descuadre-pos{color:var(--ok);font-weight:600}
.descuadre-neg{color:var(--warn);font-weight:600}
.input-warn{border-color:#e0a799;background:#fdf6f3}

/* CONFIG list */
.config-list .item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap}
.config-list .item:last-child{border-bottom:none}
.config-list .item-meta{display:flex;flex-direction:column;flex:1;min-width:160px}
.config-list .item-meta .secondary{font-size:12px;color:var(--text-muted)}

/* BELL / NOTIFICATIONS */
.bell-wrap{position:relative;display:flex;align-items:center;margin-left:6px}
.bell-btn{position:relative;background:transparent;border:1px solid var(--border);border-radius:7px;padding:6px 8px;cursor:pointer;font-size:15px;line-height:1;color:var(--text-muted);transition:all .12s ease}
.bell-btn:hover{background:#f7f6f3;color:var(--text);border-color:var(--border-strong)}
.bell-count{position:absolute;top:-5px;right:-5px;background:var(--warn);color:#fff;font-size:9.5px;font-weight:700;border-radius:99px;padding:1px 5px;min-width:16px;text-align:center;line-height:1.3;border:2px solid #fff}
.notif-panel{position:absolute;top:48px;right:0;width:340px;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.12);z-index:30;max-height:420px;overflow-y:auto}
.notif-panel h4{margin:0;padding:14px 16px;border-bottom:1px solid var(--border);font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;font-size:15px;display:flex;justify-content:space-between;align-items:center}
.notif-item{padding:11px 16px;border-bottom:1px solid var(--border);font-size:13px;display:flex;gap:10px}
.notif-item:last-child{border-bottom:none}
.notif-item .ico{font-size:18px;line-height:1}
.notif-item .msg{flex:1}
.notif-item .msg .t{font-weight:600;margin-bottom:2px}
.notif-item .msg .s{font-size:12px;color:var(--text-muted)}
.notif-item.crit{background:#fdf6f3}
.notif-empty{padding:24px;text-align:center;color:var(--text-soft);font-size:13px}

/* HAMBURGER (sólo móvil) */
.hamburger{display:none;background:transparent;border:none;font-size:22px;padding:8px 10px;cursor:pointer;margin-right:8px;color:var(--text)}
.hamburger:hover{color:var(--accent)}

/* MOBILE BREAKPOINT */
@media(max-width:768px){
  html,body{font-size:15px}
  .app-header{padding:0 12px;height:56px;flex-wrap:wrap}
  .brand{margin-right:8px}
  .brand .name{font-size:17px}
  .brand .sub{font-size:9px}
  .tabs{position:fixed;top:56px;left:0;right:0;background:#fff;flex-direction:column;border-bottom:1px solid var(--border);box-shadow:0 4px 12px rgba(0,0,0,.06);z-index:20;display:none;height:auto;padding:6px 0}
  .tabs.open{display:flex}
  .tab{padding:14px 18px;border-bottom:1px solid var(--border)!important;border-bottom-width:1px;font-size:14px;letter-spacing:.04em;justify-content:space-between}
  .tab.active{background:#fafaf9;border-bottom-color:var(--border)!important;border-left:3px solid var(--accent)}
  .hamburger{display:inline-flex;align-items:center}
  .user-chip{margin-left:auto;padding-left:8px;border-left:none}
  .user-info{display:none}
  .avatar{width:32px;height:32px;font-size:13px}
  .container{padding:18px 12px 80px}
  .card{padding:14px;border-radius:8px;margin-bottom:14px}
  h1{font-size:22px}
  h2{font-size:17px}
  table{font-size:12.5px}
  table th, table td{padding:8px 8px}
  button{padding:10px 14px;font-size:14px;min-height:42px}
  button.small{padding:7px 10px;font-size:13px;min-height:34px}
  input,select,textarea{padding:11px 12px;font-size:15px}
  .page-head{margin-bottom:16px;align-items:flex-start}
  .prep-item{grid-template-columns:1fr 80px 80px 36px;gap:6px}
  .hist-row{grid-template-columns:1fr;gap:4px;padding:14px 0}
  .hist-row .when{order:1}
  .form-row,.form-row-3,.form-row-4{grid-template-columns:1fr;gap:10px;margin-bottom:10px}
  .notif-panel{position:fixed;top:60px;right:8px;left:8px;width:auto;max-width:none}
  .bodega-row{padding:14px 0}
  /* Big touch buttons for Pedido (cocina) */
  .pedido-mobile-row{padding:14px 0!important}
  .pedido-mobile-row input{width:90px!important;font-size:18px!important;font-weight:600;text-align:center}
  .pedido-mobile-row .qty-btn{display:inline-flex!important;width:38px;height:38px;align-items:center;justify-content:center;font-size:20px;border-radius:8px;border:1px solid var(--border-strong);background:#fff;cursor:pointer}
}

/* PRINT STYLES (Informe semanal) */
@media print{
  .app-header,.hamburger,.user-chip,.bell-wrap,.tabs,button,.no-print{display:none!important}
  body{background:#fff;font-size:12px}
  .container{padding:0;max-width:100%}
  .card{box-shadow:none;border:1px solid #ccc;page-break-inside:avoid;margin-bottom:12px;padding:14px}
  h1{font-size:20px}h2{font-size:15px}
  .print-header{display:block!important;text-align:center;border-bottom:2px solid #000;padding-bottom:10px;margin-bottom:18px}
  .print-header h1{margin:0}
  .print-header .sub{font-size:11px;color:#666;margin-top:4px}
  table{font-size:11px}
  .badge{border:1px solid #999;background:#fff!important;color:#000!important}
}
.print-header{display:none}

/* CHART/DASHBOARD */
.bar-chart{display:flex;flex-direction:column;gap:12px}
.bar-chart .bar-row{display:grid;grid-template-columns:200px 1fr 90px;gap:14px;align-items:center;font-size:13px}
.bar-chart .bar-row .lbl-cell{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-chart .bar-track{background:#f0efeb;border-radius:99px;height:20px;overflow:hidden;position:relative}
.bar-chart .bar-fill{background:linear-gradient(90deg,var(--olive),var(--olive-dark));height:100%;border-radius:99px;transition:width .3s ease}
.bar-chart .bar-val{text-align:right;font-weight:600;color:var(--text);font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;font-size:14px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
@media(max-width:768px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.bar-chart .bar-row{grid-template-columns:140px 1fr 80px;font-size:12px;gap:10px}}

.kpi-card .val.ok{color:var(--ok)}

.kpi-card .delta.down{color:var(--warn);font-weight:500}

/* MIN STOCK */

<body>

      <span class="name">La Overa</span>

    </div>

    </div>

<div id="app" class="hidden">

  <main class="container" id="viewContainer"></main>

<div id="toastHost"></div>

<script>
/* =========================================================
   LA OVERA — CONTROL DE INVENTARIO
   Single-file SPA, localStorage backend.
   ========================================================= */

const LS_KEY = 'laovera_inventario_v1';
const SESSION_KEY = 'laovera_session_v1';

/* ---------- DEFAULT STATE ---------- */
function defaultState(){
  return {
    users: [
      {username:'admin', password:'admin', name:'Administrador', role:'admin'},
      {username:'bodega', password:'bodega', name:'Bodega y Operaciones', role:'bodega'},
      {username:'cocina', password:'cocina', name:'Cocina', role:'cocina'}
    ],
    products: [],          // {id, name}  — productos base (en kg) ej: "Carne de vacuno", "Pollo"
    preparations: [],      // {id, productId, name, grams} — preparaciones porcionadas/listas ej: "Cazuela 450g"
    purchases: [],         // {id, when, productId, kg, pricePerKg, supplier, invoice, notes, userId}
    productions: [],       // {id, when, productId, initialKg, merma, preps:[{prepId,units}], notes, userId} -- merma calc auto: initialKg - sum(units*grams/1000)
    inventories: [],       // {id, when, bodega, items:[{key, theoretical, real, descuadre}], reason, userId}
    sales: [],             // {id, when, items:[{prepId,units}], notes, userId}
    orders: [],            // {id, when, items:[{prepId, units}], status:'pendiente|despachado|cancelado', notes, userId, dispatchedAt, dispatchedBy, finalItems}
    movements: [],         // {id, when, type, summary, detail, userId}
    settings: {createdAt: new Date().toISOString()}
  };
}

/* ---------- STORAGE ---------- */
function loadState(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return defaultState();
    const s = JSON.parse(raw);
    // backfill missing keys
    const d = defaultState();
    for(const k of Object.keys(d)) if(!(k in s)) s[k] = d[k];
    return s;
  }catch(e){
    return defaultState();
  }
}
function saveState(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
function loadSession(){
  try{ return JSON.parse(localStorage.getItem(SESSION_KEY)||'null'); }catch(e){return null}
}
function saveSession(s){
  if(s) localStorage.setItem(SESSION_KEY, JSON.stringify(s));
  else localStorage.removeItem(SESSION_KEY);
}

let state = loadState();
let session = loadSession();
let activeTab = 'stock';

/* ---------- UTILS ---------- */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function fmtDate(iso){ if(!iso) return '—'; const d=new Date(iso); return d.toLocaleDateString('es-CL') }
function fmtDateTime(iso){ if(!iso) return '—'; const d=new Date(iso); return d.toLocaleString('es-CL',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) }
function fmtNum(n,dec=2){ if(n===null||n===undefined||isNaN(n)) return '—'; return Number(n).toLocaleString('es-CL',{minimumFractionDigits:dec,maximumFractionDigits:dec}) }
function fmtKg(n){ return fmtNum(n,2) }
function fmtUds(n){ return Math.round(n) }
function todayISO(){ return new Date().toISOString().slice(0,10) }
function toast(msg, kind='ok'){
  const t = document.createElement('div');
  t.className = 'toast '+kind;
  t.textContent = msg;
  document.getElementById('toastHost').appendChild(t);
  setTimeout(()=>t.remove(), 3200);
}
function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])) }

/* ---------- AUTH ---------- */
function renderLoginUsers(){
  const sel = document.getElementById('loginUser');
  if(!sel) return;
  const users = [...state.users].sort((a,b)=>a.name.localeCompare(b.name));
  sel.innerHTML = users.length === 0
    ? '<option value="">No hay usuarios registrados</option>'
    : '<option value="">Selecciona un usuario...</option>' + users.map(u=>`<option value="${escapeHtml(u.username)}">${escapeHtml(u.name)} — ${escapeHtml(roleLabel(u.role))}</option>`).join('');
}
function doLogin(){
  const u = document.getElementById('loginUser').value.trim().toLowerCase();
  const p = document.getElementById('loginPass').value;
  if(!u){ toast('Selecciona un usuario','warn'); return; }
  const user = state.users.find(x=>x.username===u && x.password===p);
  if(!user){ toast('Usuario o contraseña incorrectos','warn'); return; }
  session = {username:user.username, name:user.name, role:user.role, at:new Date().toISOString()};
  saveSession(session);
  bootApp();
}
function doLogout(){ session=null; saveSession(null); location.reload(); }

/* ---------- BOOT ---------- */
function bootApp(){
  if(!session){
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
    renderLoginUsers();
    return;
  }
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('userName').textContent = session.name;
  document.getElementById('userRole').textContent = roleLabel(session.role);
  document.getElementById('userAvatar').textContent = session.name.charAt(0).toUpperCase();
  renderTabs();
  renderView();
}
function roleLabel(r){return {admin:'Administrador',bodega:'Bodega y Operaciones',cocina:'Cocina'}[r]||r}

/* ---------- ACCESS CONTROL ---------- */
const TAB_ACCESS = {
  stock:      ['admin','bodega','cocina'],
  dashboard:  ['admin','bodega'],
  compras:    ['admin','bodega'],
  produccion: ['admin','bodega'],
  inventario: ['admin','bodega','cocina'],
  ventas:     ['admin','bodega'],           // cocina NO puede agregar ventas
  pedido:     ['admin','cocina'],
  despacho:   ['admin','bodega'],
  historial:  ['admin','bodega','cocina'],
  config:     ['admin','bodega','cocina']   // bodega y cocina pueden crear productos/subproductos
};
function canAccess(tab){ return TAB_ACCESS[tab]?.includes(session.role) }
function visibleTabs(){ return Object.keys(TAB_ACCESS).filter(canAccess) }

const TAB_LABELS = {
  stock:'Stock', dashboard:'Dashboard', compras:'Compras', produccion:'Producción', inventario:'Inventario',
  ventas:'Ventas', pedido:'Pedido cocina', despacho:'Despacho',
  historial:'Historial', config:'Config'
};

// Hidden tabs (no se muestran en la barra pero son navegables)
const HIDDEN_TABS = ['informe'];
function renderTabs(){
  const nav = document.getElementById('tabsNav');
  const tabs = visibleTabs();
  if(!tabs.includes(activeTab) && !HIDDEN_TABS.includes(activeTab)) activeTab = tabs[0];
  nav.innerHTML = tabs.map(t=>{
    let count = '';
    if(t==='despacho'){
      const pendings = state.orders.filter(o=>o.status==='pendiente').length;
      if(pendings>0) count = `<span class="count">${pendings}</span>`;
    }
    return `<div class="tab ${t===activeTab?'active':''}" onclick="goTab('${t}')">${TAB_LABELS[t]}${count}</div>`;
  }).join('');
  renderBell();
  // Tras renderizar, revisar si los tabs requieren scroll y actualizar indicadores
  requestAnimationFrame(()=>{ updateTabsScrollIndicators(); scrollActiveTabIntoView(); });
}
function goTab(t){ activeTab = t; renderTabs(); renderView(); closeMobileMenu(); }
function toggleMobileMenu(){ document.getElementById('tabsNav').classList.toggle('open'); }
function closeMobileMenu(){ document.getElementById('tabsNav').classList.remove('open'); }

/* Indicadores de scroll en tabs: muestra fades y botones cuando hay overflow */
function updateTabsScrollIndicators(){
  const nav = document.getElementById('tabsNav');
  const wrap = document.getElementById('tabsWrap');
  if(!nav || !wrap) return;
  const max = nav.scrollWidth - nav.clientWidth;
  wrap.classList.toggle('can-scroll-left', nav.scrollLeft > 2);
  wrap.classList.toggle('can-scroll-right', nav.scrollLeft < max - 2);
}
function scrollTabs(dir){
  const nav = document.getElementById('tabsNav');
  if(!nav) return;
  nav.scrollBy({left: dir * Math.min(200, nav.clientWidth * 0.6), behavior:'smooth'});
}
function scrollActiveTabIntoView(){
  const nav = document.getElementById('tabsNav');
  if(!nav) return;
  const active = nav.querySelector('.tab.active');
  if(!active) return;
  const navRect = nav.getBoundingClientRect();
  const tabRect = active.getBoundingClientRect();
  if(tabRect.left < navRect.left || tabRect.right > navRect.right){
    active.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
  }
}
window.addEventListener('resize', updateTabsScrollIndicators);
document.addEventListener('DOMContentLoaded', ()=>{
  const nav = document.getElementById('tabsNav');
  if(nav) nav.addEventListener('scroll', updateTabsScrollIndicators, {passive:true});
});

/* ---------- DERIVED STOCK ---------- */
// Stock general:
//  - kg disponibles por productId = sum(purchases.kg) - sum(productions.initialKg) - ajustes
//  - uds por prepId en General = sum(production.preps.units) - sum(despachos confirmados) - ajustes
// Stock cocina:
//  - uds por prepId en Cocina = sum(despachos confirmados) - sum(ventas.units) - ajustes
function computeStock(){
  const generalKg = {};           // productId -> kg
  const generalUds = {};          // prepId -> uds
  const cocinaUds = {};           // prepId -> uds

  state.products.forEach(p=>{ generalKg[p.id]=0 });
  state.preparations.forEach(p=>{ generalUds[p.id]=0; cocinaUds[p.id]=0 });

  state.purchases.forEach(c=>{
    generalKg[c.productId] = (generalKg[c.productId]||0) + Number(c.kg||0);
  });
  state.productions.forEach(pr=>{
    generalKg[pr.productId] = (generalKg[pr.productId]||0) - Number(pr.initialKg||0);
    (pr.preps||[]).forEach(p=>{
      generalUds[p.prepId] = (generalUds[p.prepId]||0) + Number(p.units||0);
    });
  });
  // ajustes de inventario
  state.inventories.forEach(inv=>{
    (inv.items||[]).forEach(it=>{
      // descuadre = real - theoretical (positive = sumar, negative = restar)
      if(it.key.startsWith('kg:')){
        const pid = it.key.slice(3);
        if(inv.bodega==='general') generalKg[pid] = (generalKg[pid]||0) + (Number(it.real)-Number(it.theoretical));
      } else if(it.key.startsWith('prep:')){
        const prepId = it.key.slice(5);
        const delta = Number(it.real)-Number(it.theoretical);
        if(inv.bodega==='general') generalUds[prepId] = (generalUds[prepId]||0) + delta;
        if(inv.bodega==='cocina')  cocinaUds[prepId]  = (cocinaUds[prepId]||0) + delta;
      }
    });
  });
  // despachos confirmados
  state.orders.forEach(o=>{
    if(o.status==='despachado'){
      (o.finalItems||o.items||[]).forEach(it=>{
        generalUds[it.prepId] = (generalUds[it.prepId]||0) - Number(it.units||0);
        cocinaUds[it.prepId]  = (cocinaUds[it.prepId]||0)  + Number(it.units||0);
      });
    }
  });
  // ventas
  state.sales.forEach(v=>{
    (v.items||[]).forEach(it=>{
      cocinaUds[it.prepId] = (cocinaUds[it.prepId]||0) - Number(it.units||0);
    });
  });

  return {generalKg, generalUds, cocinaUds};
}

/* ---------- NOTIFICATIONS / ALERTS ---------- */
// Alertas: stock <= mínimo, pedidos pendientes, descuadres recientes >5%
function computeNotifications(){
  const stk = computeStock();
  const notifs = [];
  // Stock bajo (preparaciones con minStock configurado)
  state.preparations.forEach(pr=>{
    const min = Number(pr.minStock||0);
    if(min<=0) return;
    const tot = (stk.generalUds[pr.id]||0) + (stk.cocinaUds[pr.id]||0);
    if(tot <= 0){
      notifs.push({type:'crit', ico:'🚨', t:`Sin stock: ${pr.name}`, s:`0 uds en sistema (mínimo ${min})`, tab:'stock'});
    } else if(tot <= min){
      notifs.push({type:'warn', ico:'⚠️', t:`Stock bajo: ${pr.name}`, s:`${Math.round(tot)} uds (mínimo ${min})`, tab:'stock'});
    }
  });
  // Pedidos pendientes (solo para bodega/admin)
  if(session && (session.role==='admin' || session.role==='bodega')){
    const pending = state.orders.filter(o=>o.status==='pendiente');
    if(pending.length>0){
      notifs.push({type:'warn', ico:'📋', t:`${pending.length} pedido${pending.length>1?'s':''} de cocina pendiente${pending.length>1?'s':''}`, s:'Revisar en pestaña Despacho', tab:'despacho'});
    }
  }
  // Descuadres significativos en últimos 7 días
  // Solo se considera descuadre real si había un stock teórico previo (>0).
  // Cuando theoretical=0 es una carga inicial / bootstrap y no debe alertar.
  // Inventarios marcados explícitamente como cargaInicial tampoco alertan.
  const sevenDaysAgo = new Date(); sevenDaysAgo.setDate(sevenDaysAgo.getDate()-7);
  state.inventories.forEach(inv=>{
    if(new Date(inv.when) < sevenDaysAgo) return;
    if(inv.cargaInicial) return; // bootstrap: no alertar
    const bigDesc = (inv.items||[]).filter(it=>{
      const t = Number(it.theoretical)||0;
      const d = Number(it.descuadre)||0;
      if(t <= 0) return false; // sin stock teórico previo: no es un descuadre, es carga inicial del item
      return Math.abs(d) > 0 && Math.abs(d/t) > 0.05;
    });
    if(bigDesc.length>0){
      notifs.push({type:'warn', ico:'📉', t:`${bigDesc.length} descuadre${bigDesc.length>1?'s':''} >5% recientes`, s:`Conteo del ${fmtDate(inv.when)} · ${inv.bodega==='general'?'Bodega General':'Bodega Cocina'}`, tab:'inventario'});
    }
  });
  return notifs;
}

function renderBell(){
  const wrap = document.getElementById('bellWrap');
  if(!wrap) return;
  if(!session){ wrap.classList.add('hidden'); return; }
  wrap.classList.remove('hidden');
  const notifs = computeNotifications();
  const cnt = document.getElementById('bellCount');
  if(notifs.length===0){ cnt.classList.add('hidden'); }
  else { cnt.classList.remove('hidden'); cnt.textContent = notifs.length; }
  // panel content
  const panel = document.getElementById('notifPanel');
  panel.innerHTML = `<h4><span>Alertas</span><span class="tiny">${notifs.length}</span></h4>` +
    (notifs.length===0
      ? `<div class="notif-empty">✅ Sin alertas activas</div>`
      : notifs.map(n=>`<div class="notif-item ${n.type==='crit'?'crit':''}" onclick="goTab('${n.tab}');closeNotifs()"><div class="ico">${n.ico}</div><div class="msg"><div class="t">${escapeHtml(n.t)}</div><div class="s">${escapeHtml(n.s)}</div></div></div>`).join(''));
}
function toggleNotifs(e){
  if(e) e.stopPropagation();
  const p = document.getElementById('notifPanel');
  p.classList.toggle('hidden');
}
function closeNotifs(){
  const p = document.getElementById('notifPanel');
  if(p) p.classList.add('hidden');
}
document.addEventListener('click', (e)=>{
  const w = document.getElementById('bellWrap');
  if(w && !w.contains(e.target)) closeNotifs();
});

/* ---------- DASHBOARD / ANÁLISIS ---------- */
function aggregateSalesInRange(fromISO, toISO){
  // Devuelve {prepId -> {units, days}} prorrateando ventas que abarcan el rango
  const agg = {};
  state.preparations.forEach(pr=>{ agg[pr.id] = {units:0}; });
  const F = new Date(fromISO+'T00:00:00'), T = new Date(toISO+'T23:59:59');
  state.sales.forEach(v=>{
    const ps = new Date((v.periodStart||v.when)+'T00:00:00');
    const pe = new Date((v.periodEnd||v.when)+'T00:00:00');
    // intersección
    const a = ps > F ? ps : F;
    const b = pe < T ? pe : T;
    if(a > b) return;
    const total = Math.max(1, Math.round((pe-ps)/(24*3600*1000))+1);
    const overlap = Math.max(1, Math.round((b-a)/(24*3600*1000))+1);
    const ratio = overlap/total;
    (v.items||[]).forEach(it=>{
      if(!agg[it.prepId]) agg[it.prepId] = {units:0};
      agg[it.prepId].units += Number(it.units||0) * ratio;
    });
  });
  return agg;
}
function aggregatePurchasesInRange(fromISO, toISO){
  // {productId -> {kg, cost}}
  const agg = {};
  state.products.forEach(p=>{ agg[p.id] = {kg:0, cost:0}; });
  state.purchases.forEach(c=>{
    if(c.when >= fromISO && c.when <= toISO){
      if(!agg[c.productId]) agg[c.productId] = {kg:0, cost:0};
      agg[c.productId].kg += Number(c.kg||0);
      agg[c.productId].cost += Number(c.kg||0)*Number(c.pricePerKg||0);
    }
  });
  return agg;
}
function lastNDaysRange(n){
  const today = new Date();
  const from = new Date(today); from.setDate(today.getDate()-n+1);
  return {from: from.toISOString().slice(0,10), to: today.toISOString().slice(0,10)};
}

function viewDashboard(){
  const range = window._dashRange || lastNDaysRange(30);
  const from = range.from, to = range.to;
  const sales = aggregateSalesInRange(from, to);
  const purch = aggregatePurchasesInRange(from, to);

  // Top preparaciones vendidas
  const ranked = state.preparations.map(pr=>{
    const prod = state.products.find(x=>x.id===pr.productId);
    const u = sales[pr.id]?sales[pr.id].units:0;
    return {prep:pr, prod, units:u};
  }).sort((a,b)=>b.units-a.units);
  const totalUds = ranked.reduce((a,r)=>a+r.units,0);
  const maxUds = Math.max(1, ranked[0]?ranked[0].units:1);

  // Compras (solo kg, sin $)
  const totalKg = Object.values(purch).reduce((a,p)=>a+p.kg,0);
  const numCompras = state.purchases.filter(c=>c.when>=from&&c.when<=to).length;

  // Producciones en período
  const prods = state.productions.filter(p=>p.when>=from&&p.when<=to);
  const totalKgProducido = prods.reduce((a,p)=>a+Number(p.initialKg||0),0);
  const totalMerma = prods.reduce((a,p)=>a+ (p.merma!=null ? Number(p.merma) : (Number(p.bagBlood||0)+Number(p.trimLoss||0))) ,0);
  const mermaPct = totalKgProducido>0 ? (totalMerma/totalKgProducido*100) : 0;

  // Comparativa: período anterior de igual duración (uds vendidas)
  const fromD = new Date(from+'T00:00:00'), toD = new Date(to+'T00:00:00');
  const days = Math.round((toD-fromD)/(24*3600*1000))+1;
  const prevTo = new Date(fromD); prevTo.setDate(fromD.getDate()-1);
  const prevFrom = new Date(prevTo); prevFrom.setDate(prevTo.getDate()-days+1);
  const prevFromISO = prevFrom.toISOString().slice(0,10), prevToISO = prevTo.toISOString().slice(0,10);
  const prevSales = aggregateSalesInRange(prevFromISO, prevToISO);
  const prevTotalUds = Object.values(prevSales).reduce((a,s)=>a+s.units,0);
  const udsDelta = prevTotalUds>0 ? ((totalUds-prevTotalUds)/prevTotalUds*100) : 0;

  // Por producto: kg comprados, uds vendidas, kg vendidos (estimados), % uso
  const porProducto = state.products.map(p=>{
    const kg = purch[p.id]?purch[p.id].kg:0;
    const preps = state.preparations.filter(x=>x.productId===p.id);
    const uds = preps.reduce((a,pr)=>a+(sales[pr.id]?sales[pr.id].units:0),0);
    const gramsSold = preps.reduce((a,pr)=>a+(sales[pr.id]?sales[pr.id].units*Number(pr.grams||0):0),0);
    const kgSold = gramsSold/1000;
    const usoPct = kg>0 ? (kgSold/kg*100) : 0;
    return {name:p.name, kg, uds, kgSold, usoPct};
  });

  // Avg uds/día
  const avgUdsDia = days>0 ? totalUds/days : 0;
  const avgUdsDiaPrev = days>0 ? prevTotalUds/days : 0;

  return `
  <div class="page-head">
    <div>
      <h1>Dashboard</h1>
      <div class="desc">Análisis operacional de ventas, compras y producción del período.</div>
    </div>
    <div class="actions">
      <button class="small ${days===7?'primary':''}" onclick="setDashRange(7)">7 días</button>
      <button class="small ${days===30?'primary':''}" onclick="setDashRange(30)">30 días</button>
      <button class="small ${days===90?'primary':''}" onclick="setDashRange(90)">90 días</button>
      <button class="small ${days===365?'primary':''}" onclick="setDashRange(365)">12 meses</button>
      <button class="small" onclick="goTab('informe')">Generar informe</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span>Período analizado</span><span class="tiny">${fmtDateShort(from)} → ${fmtDateShort(to)} · ${days} días</span></div>
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="lbl">Unidades vendidas</div>
        <div class="val">${fmtUds(totalUds)}</div>
        <div class="delta ${udsDelta>=0?'up':'down'}">${prevTotalUds>0?`${udsDelta>=0?'▲':'▼'} ${Math.abs(udsDelta).toFixed(1)}% vs período anterior`:'Sin período previo'}</div>
      </div>
      <div class="kpi-card">
        <div class="lbl">Promedio diario</div>
        <div class="val">${fmtUds(avgUdsDia)}</div>
        <div class="delta">uds/día · prev: ${fmtUds(avgUdsDiaPrev)}/día</div>
      </div>
      <div class="kpi-card">
        <div class="lbl">Kg comprados</div>
        <div class="val">${fmtKg(totalKg)}</div>
        <div class="delta">${numCompras} compra${numCompras===1?'':'s'} de Bodega General</div>
      </div>
      <div class="kpi-card">
        <div class="lbl">Merma de producción</div>
        <div class="val ${mermaPct>8?'warn':mermaPct>0?'':'ok'}">${mermaPct.toFixed(1)}%</div>
        <div class="delta">${fmtKg(totalMerma)} kg sobre ${fmtKg(totalKgProducido)} kg producidos</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span>Ranking de preparaciones vendidas</span><span class="tiny">Top sellers · ${ranked.filter(r=>r.units>0).length} preparaciones activas</span></div>
    ${ranked.length===0||totalUds===0 ? '<div class="empty-state soft">Sin ventas registradas en el período.</div>' :
      `<div class="bar-chart">
        ${ranked.filter(r=>r.units>0).map(r=>{
          const pct = (r.units/maxUds*100).toFixed(1);
          const sharePct = (r.units/totalUds*100).toFixed(1);
          return `<div class="bar-row">
            <div class="lbl-cell">${escapeHtml(r.prod?r.prod.name:'—')} — <strong>${escapeHtml(r.prep.name)}</strong> <span class="soft" style="font-size:11px">${sharePct}%</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
            <div class="bar-val">${fmtUds(r.units)}</div>
          </div>`;
        }).join('')}
      </div>`}
  </div>

  <div class="card">
    <div class="card-title"><span>Análisis por producto base</span><span class="tiny">Compras vs ventas</span></div>
    ${porProducto.length===0 ? '<div class="empty-state soft">Aún no hay productos.</div>' :
      `<div class="table-wrap" style="border:none"><table>
        <thead><tr>
          <th>Producto</th>
          <th style="text-align:right">Kg comprados</th>
          <th style="text-align:right">Uds vendidas</th>
          <th style="text-align:right">Kg vendidos (est.)</th>
          <th style="text-align:right">% uso</th>
        </tr></thead>
        <tbody>${porProducto.map(p=>{
          const usoClass = p.usoPct>100?'warn':p.usoPct>=70?'ok':'';
          return `<tr>
            <td><strong>${escapeHtml(p.name)}</strong></td>
            <td style="text-align:right">${fmtKg(p.kg)} kg</td>
            <td style="text-align:right">${fmtUds(p.uds)}</td>
            <td style="text-align:right">${fmtKg(p.kgSold)} kg</td>
            <td style="text-align:right" class="${usoClass==='warn'?'descuadre-neg':usoClass==='ok'?'descuadre-pos':''}">${p.kg>0?p.usoPct.toFixed(1)+'%':'—'}</td>
          </tr>`;
        }).join('')}
        </tbody>
      </table></div>
      <p class="muted" style="font-size:12px;margin:14px 0 0">% uso = kg vendidos (estimados desde gramos por preparación) sobre kg comprados. Valores &gt;100% indican consumo de stock previo; valores bajos sugieren sobrestock o merma sin registrar.</p>`}
  </div>

  <div class="card">
    <div class="card-title">Rango personalizado</div>
    <div class="form-row">
      <div><label>Desde</label><input id="dashFrom" type="date" value="${from}"></div>
      <div><label>Hasta</label><input id="dashTo" type="date" value="${to}"></div>
    </div>
    <button class="primary" onclick="applyDashRange()">Aplicar rango</button>
  </div>
  `;
}
function setDashRange(n){ window._dashRange = lastNDaysRange(n); renderView(); }
function applyDashRange(){
  const f = document.getElementById('dashFrom').value;
  const t = document.getElementById('dashTo').value;
  if(!f||!t||f>t){ toast('Rango inválido','warn'); return; }
  window._dashRange = {from:f, to:t}; renderView();
}

/* ---------- INFORME SEMANAL (printable) ---------- */
function viewInforme(){
  const range = window._infRange || lastNDaysRange(7);
  const from = range.from, to = range.to;
  const sales = aggregateSalesInRange(from, to);
  const purch = aggregatePurchasesInRange(from, to);
  const ranked = state.preparations.map(pr=>{
    const prod = state.products.find(x=>x.id===pr.productId);
    const u = sales[pr.id]?sales[pr.id].units:0;
    return {prep:pr, prod, units:u};
  }).sort((a,b)=>b.units-a.units).filter(r=>r.units>0);
  const totalUds = ranked.reduce((a,r)=>a+r.units,0);
  const totalKg = Object.values(purch).reduce((a,p)=>a+p.kg,0);
  const numCompras = state.purchases.filter(c=>c.when>=from&&c.when<=to).length;
  const fromD = new Date(from+'T00:00:00'), toD = new Date(to+'T00:00:00');
  const days = Math.round((toD-fromD)/(24*3600*1000))+1;

  // Producciones
  const prods = state.productions.filter(p=>p.when>=from&&p.when<=to);
  const totalKgProd = prods.reduce((a,p)=>a+Number(p.initialKg||0),0);
  const totalMerma = prods.reduce((a,p)=>a+ (p.merma!=null ? Number(p.merma) : (Number(p.bagBlood||0)+Number(p.trimLoss||0))) ,0);
  const mermaPct = totalKgProd>0 ? (totalMerma/totalKgProd*100) : 0;

  // Inventarios del período
  const invs = state.inventories.filter(i=>{ const d=i.when.slice(0,10); return d>=from && d<=to; });
  const descuadres = [];
  invs.forEach(inv=>{
    (inv.items||[]).forEach(it=>{
      const d = Number(it.descuadre)||0;
      if(Math.abs(d)<0.01) return;
      let label = it.key;
      if(it.key.startsWith('kg:')){ const p=state.products.find(x=>x.id===it.key.slice(3)); label=p?p.name:label; }
      else if(it.key.startsWith('prep:')){ const pr=state.preparations.find(x=>x.id===it.key.slice(5)); label=pr?pr.name:label; }
      descuadres.push({fecha:fmtDate(inv.when), bodega:inv.bodega, label, theoretical:it.theoretical, real:it.real, descuadre:d, motivo:inv.reason});
    });
  });

  return `
  <div class="no-print" style="margin-bottom:18px;display:flex;gap:10px;flex-wrap:wrap;align-items:end">
    <button onclick="goTab('dashboard')">← Volver al dashboard</button>
    <button class="primary" onclick="window.print()">🖨  Imprimir / Guardar PDF</button>
    <div style="display:flex;gap:8px;align-items:end;margin-left:auto">
      <div><label>Desde</label><input id="infFrom" type="date" value="${from}" style="display:inline-block;width:auto"></div>
      <div><label>Hasta</label><input id="infTo" type="date" value="${to}" style="display:inline-block;width:auto"></div>
      <button class="small" onclick="applyInfRange()">Aplicar</button>
    </div>
  </div>
  <div class="print-header">
    <h1>La Overa — Informe Operacional</h1>
    <div class="sub">${fmtDateShort(from)} al ${fmtDateShort(to)} · ${days} días · Generado ${fmtDateTime(new Date().toISOString())}</div>
  </div>

  <div class="card">
    <h2>Resumen del período</h2>
    <div class="kpi-grid">
      <div class="kpi-card"><div class="lbl">Unidades vendidas</div><div class="val">${fmtUds(totalUds)}</div><div class="delta">${days>0?(totalUds/days).toFixed(1):0} uds/día promedio</div></div>
      <div class="kpi-card"><div class="lbl">Kg comprados</div><div class="val">${fmtKg(totalKg)}</div><div class="delta">${numCompras} compra${numCompras===1?'':'s'}</div></div>
      <div class="kpi-card"><div class="lbl">Producciones</div><div class="val">${prods.length}</div><div class="delta">${fmtKg(totalKgProd)} kg procesados</div></div>
      <div class="kpi-card"><div class="lbl">Merma promedio</div><div class="val ${mermaPct>8?'warn':'ok'}">${mermaPct.toFixed(1)}%</div><div class="delta">${fmtKg(totalMerma)} kg en bolsa+sangre+corte</div></div>
    </div>
  </div>

  <div class="card">
    <h2>Top preparaciones vendidas</h2>
    ${ranked.length===0 ? '<p class="muted">Sin ventas registradas en el período.</p>' :
      `<table>
        <thead><tr><th>#</th><th>Preparación</th><th style="text-align:right">Uds</th><th style="text-align:right">% del total</th></tr></thead>
        <tbody>${ranked.map((r,i)=>`<tr>
          <td>${i+1}</td>
          <td>${escapeHtml(r.prod?r.prod.name:'—')} — <strong>${escapeHtml(r.prep.name)}</strong></td>
          <td style="text-align:right">${fmtUds(r.units)}</td>
          <td style="text-align:right">${(r.units/totalUds*100).toFixed(1)}%</td>
        </tr>`).join('')}</tbody>
      </table>`}
  </div>

  <div class="card">
    <h2>Compras del período</h2>
    ${totalKg===0 ? '<p class="muted">Sin compras en el período.</p>' :
      `<table>
        <thead><tr><th>Producto</th><th style="text-align:right">Kg</th><th style="text-align:right">% del total kg</th></tr></thead>
        <tbody>${state.products.map(p=>{
          const x = purch[p.id]||{kg:0};
          if(x.kg===0) return '';
          return `<tr><td>${escapeHtml(p.name)}</td><td style="text-align:right">${fmtKg(x.kg)} kg</td><td style="text-align:right">${(x.kg/totalKg*100).toFixed(1)}%</td></tr>`;
        }).join('')}</tbody>
      </table>`}
  </div>

  <div class="card">
    <h2>Descuadres detectados</h2>
    ${descuadres.length===0 ? '<p class="muted">Sin descuadres registrados en el período.</p>' :
      `<table>
        <thead><tr><th>Fecha</th><th>Bodega</th><th>Producto</th><th style="text-align:right">Teórico</th><th style="text-align:right">Real</th><th style="text-align:right">Diff</th><th>Motivo</th></tr></thead>
        <tbody>${descuadres.map(d=>`<tr>
          <td>${d.fecha}</td>
          <td>${d.bodega==='general'?'General':'Cocina'}</td>
          <td>${escapeHtml(d.label)}</td>
          <td style="text-align:right">${fmtNum(d.theoretical,1)}</td>
          <td style="text-align:right">${fmtNum(d.real,1)}</td>
          <td style="text-align:right" class="${d.descuadre>0?'descuadre-pos':'descuadre-neg'}">${d.descuadre>0?'+':''}${fmtNum(d.descuadre,1)}</td>
          <td>${escapeHtml(d.motivo||'—')}</td>
        </tr>`).join('')}</tbody>
      </table>`}
  </div>

  <div class="card">
    <h2>Notas y acciones de la reunión</h2>
    <p class="muted" style="margin-top:0">Espacio para registrar conclusiones, decisiones y acciones de la semana:</p>
    <textarea rows="8" placeholder="• Acción 1...&#10;• Acción 2...&#10;• Decisiones tomadas...&#10;• Prioridades de la próxima semana..." style="width:100%"></textarea>
  </div>
  `;
}
function applyInfRange(){
  const f = document.getElementById('infFrom').value;
  const t = document.getElementById('infTo').value;
  if(!f||!t||f>t){ toast('Rango inválido','warn'); return; }
  window._infRange = {from:f, to:t}; renderView();
}

/* ---------- VIEW DISPATCH ---------- */
function renderView(){
  const c = document.getElementById('viewContainer');
  if(activeTab==='informe' && (session.role==='admin'||session.role==='bodega')){
    c.innerHTML = viewInforme();
    return;
  }
  if(!canAccess(activeTab)){ c.innerHTML = `<div class="card"><h2>Sin acceso</h2><p class="muted">Tu rol no tiene permiso para esta sección.</p></div>`; return; }
  switch(activeTab){
    case 'stock':      c.innerHTML = viewStock(); break;
    case 'dashboard':  c.innerHTML = viewDashboard(); break;
    case 'compras':    c.innerHTML = viewCompras(); break;
    case 'produccion': c.innerHTML = viewProduccion(); break;
    case 'inventario': c.innerHTML = viewInventario(); break;
    case 'ventas':     c.innerHTML = viewVentas(); break;
    case 'pedido':     c.innerHTML = viewPedido(); break;
    case 'despacho':   c.innerHTML = viewDespacho(); break;
    case 'historial':  c.innerHTML = viewHistorial(); break;
    case 'config':     c.innerHTML = viewConfig(); break;
  }
  attachViewHandlers();
}

/* ============== VIEWS ============== */

function viewStock(){
  const stk = computeStock();
  const today = new Date().toLocaleDateString('es-CL');
  // general rows
  const rowsGeneral = [];
  state.products.forEach(p=>{
    rowsGeneral.push(`<div class="bodega-row"><span>${escapeHtml(p.name)} <span class="soft">(kg)</span></span><span><span class="qty">${fmtKg(stk.generalKg[p.id]||0)}</span><span class="soft">kg</span></span></div>`);
  });
  state.preparations.forEach(pr=>{
    const prod = state.products.find(x=>x.id===pr.productId);
    const low = prepIsLow(pr);
    const warn = low ? ' <span class="badge warn" style="font-size:9px">⚠ bajo</span>' : '';
    rowsGeneral.push(`<div class="bodega-row"><span>${escapeHtml(prod?prod.name:'—')} — ${escapeHtml(pr.name)}${warn}</span><span><span class="qty ${low?'crit':''}">${fmtUds(stk.generalUds[pr.id]||0)}</span><span class="soft">uds</span></span></div>`);
  });
  const rowsCocina = state.preparations.map(pr=>{
    const prod = state.products.find(x=>x.id===pr.productId);
    const low = prepIsLow(pr);
    const warn = low ? ' <span class="badge warn" style="font-size:9px">⚠ bajo</span>' : '';
    return `<div class="bodega-row"><span>${escapeHtml(prod?prod.name:'—')} — ${escapeHtml(pr.name)}${warn}</span><span><span class="qty ${low?'crit':''}">${fmtUds(stk.cocinaUds[pr.id]||0)}</span><span class="soft">uds</span></span></div>`;
  });

  const pendingOrders = state.orders.filter(o=>o.status==='pendiente').length;
  // Resumen por producto: kg en general + uds en general + uds en cocina (sumando sus preparaciones)
  const resumenPorProducto = state.products.map(p=>{
    const kgGen = stk.generalKg[p.id]||0;
    const preps = state.preparations.filter(pr=>pr.productId===p.id);
    const udsGen = preps.reduce((a,pr)=>a+(stk.generalUds[pr.id]||0),0);
    const udsCoc = preps.reduce((a,pr)=>a+(stk.cocinaUds[pr.id]||0),0);
    const totalUds = udsGen + udsCoc;
    const minTotal = preps.reduce((a,pr)=>a+Number(pr.minStock||0),0);
    const isLow = minTotal>0 && totalUds<=minTotal;
    return {name:p.name, kgGen, udsGen, udsCoc, totalUds, hasPreps:preps.length>0, isLow, minTotal};
  });
  // Helper para marcar filas por preparación con stock bajo (en Bodega General + Cocina)
  function prepIsLow(pr){
    const min = Number(pr.minStock||0);
    if(min<=0) return false;
    const tot = (stk.generalUds[pr.id]||0) + (stk.cocinaUds[pr.id]||0);
    return tot <= min;
  }

  const emptyMsg = state.products.length===0 && state.preparations.length===0
    ? `<div class="empty-state"><div class="icon">📦</div><div>No hay productos creados todavía.</div><div class="soft" style="margin-top:6px">Ve a <strong>Config</strong> para agregar productos y preparaciones.</div></div>`
    : '';

  return `
  <div class="page-head">
    <div><h1>Stock en tiempo real</h1><div class="desc">Vista consolidada de Bodega General y Bodega Cocina.</div></div>
    <button onclick="exportStockCSV()">↓ Exportar CSV</button>
  </div>
  ${state.products.length===0 && state.preparations.length===0 ? `<div class="card">${emptyMsg}</div>` : `
  <div class="grid-2">
    <div class="bodega-card">
      <div class="bodega-header general"><span>Bodega General</span><span>${today}</span></div>
      <div class="bodega-body">${rowsGeneral.join('') || '<div class="empty-state soft">Sin items.</div>'}</div>
    </div>
    <div class="bodega-card">
      <div class="bodega-header cocina"><span>Bodega Cocina</span><span>${today}</span></div>
      <div class="bodega-body">${rowsCocina.join('') || '<div class="empty-state soft">Sin items.</div>'}</div>
    </div>
  </div>
  <div class="card" style="margin-top:18px">
    <div class="card-title"><span>Resumen por producto</span><span class="tiny" style="display:flex;align-items:center;gap:8px">Pedidos pendientes <span class="badge ${pendingOrders>0?'warn':'soft'}" style="font-size:13px;font-weight:600">${pendingOrders}</span></span></div>
    ${resumenPorProducto.length===0 ? '<div class="empty-state soft">Aún no hay productos.</div>' :
    `<div class="table-wrap" style="border:none"><table>
      <thead><tr>
        <th>Producto</th>
        <th style="text-align:right">Kg en Bodega General</th>
        <th style="text-align:right">Uds en Bodega General</th>
        <th style="text-align:right">Uds en Bodega Cocina</th>
        <th style="text-align:right">Total uds</th>
      </tr></thead>
      <tbody>
        ${resumenPorProducto.map(r=>`
          <tr>
            <td><strong>${escapeHtml(r.name)}</strong></td>
            <td style="text-align:right"><span class="qty">${fmtKg(r.kgGen)}</span> <span class="soft">kg</span></td>
            <td style="text-align:right">${r.hasPreps?`<span class="qty">${fmtUds(r.udsGen)}</span> <span class="soft">uds</span>`:'<span class="soft">—</span>'}</td>
            <td style="text-align:right">${r.hasPreps?`<span class="qty">${fmtUds(r.udsCoc)}</span> <span class="soft">uds</span>`:'<span class="soft">—</span>'}</td>
            <td style="text-align:right">${r.hasPreps?`<strong>${fmtUds(r.totalUds)}</strong> <span class="soft">uds</span>`:'<span class="soft">—</span>'}</td>
          </tr>
        `).join('')}
      </tbody>
    </table></div>
    <div class="tiny" style="margin-top:10px">Kg = sin porcionar · Uds Bodega General = porcionadas pendientes de despacho · Uds Bodega Cocina = listas para servir</div>`}
  </div>`}
  `;
}

/* ---------- COMPRAS ---------- */

  <div class="card">

    ${hist.length===0 ? '<div class="empty-state soft">Sin compras registradas.</div>' :
    `<div class="table-wrap"><table>
      <thead><tr><th>Fecha</th><th>Producto</th><th>Proveedor</th><th>Kg</th><th>$/kg</th><th>Total</th><th>Factura</th><th>Por</th><th></th></tr></thead>
      <tbody>
        ${hist.map(c=>{

          return `<tr>
            <td>${fmtDate(c.when)}</td>
            <td>${escapeHtml(prod?prod.name:'—')}</td>
            <td>${escapeHtml(c.supplier||'—')}</td>
            <td>${fmtKg(c.kg)}</td>

  host.innerHTML = `<div class="prep-item" style="font-weight:600;color:var(--text-soft);font-size:11px;letter-spacing:.06em;text-transform:uppercase">
    <div>Preparación</div><div>Gramos/u</div><div>Unidades</div><div></div>

function updateMermaPreview(){
  const out = document.getElementById('prMermaPreview');
  if(!out) return;
  const initialKg = parseFloat(document.getElementById('prInitial').value)||0;
  const productId = document.getElementById('prProduct').value;
  if(!productId || initialKg<=0){ out.value = ''; return; }
  const preps = state.preparations.filter(p=>p.productId===productId);
  let kgProducidos = 0;
  preps.forEach(p=>{
    const inp = document.getElementById('prep-'+p.id);
    const units = parseInt(inp?inp.value:0)||0;
    kgProducidos += units * (Number(p.grams)||0) / 1000;
  });
  const merma = Math.max(0, initialKg - kgProducidos);
  const pct = initialKg>0 ? (merma/initialKg*100) : 0;
  out.value = `${merma.toFixed(3)} kg  (${pct.toFixed(1)}%)`;
}

function addProduccion(){
  const productId = document.getElementById('prProduct').value;
  const when = document.getElementById('prDate').value || todayISO();
  const initialKg = parseFloat(document.getElementById('prInitial').value);
  const notes = document.getElementById('prNotes').value.trim();
  if(!productId){ toast('Selecciona producto','warn'); return; }
  if(!initialKg||initialKg<=0){ toast('Ingresa peso inicial','warn'); return; }
  const allPreps = state.preparations.filter(p=>p.productId===productId);
  const preps = allPreps.map(p=>{
    const inp = document.getElementById('prep-'+p.id);
    const units = parseInt(inp?inp.value:0)||0;
    return {prepId:p.id, units};
  }).filter(x=>x.units>0);
  if(preps.length===0){ toast('Ingresa unidades en al menos una preparación','warn'); return; }
  // Merma se calcula como rendimiento: kg inicial - kg producido en preparaciones
  let kgProducidos = 0;
  preps.forEach(pp=>{
    const prep = state.preparations.find(x=>x.id===pp.prepId);
    if(prep) kgProducidos += pp.units * (Number(prep.grams)||0) / 1000;
  });
  const merma = Math.max(0, initialKg - kgProducidos);
  const pr = {id:uid(), when, productId, initialKg, merma, preps, notes, userId:session.name};
  state.productions.push(pr);
  const prod = state.products.find(p=>p.id===productId);
  const totalUds = preps.reduce((a,b)=>a+b.units,0);
  const mermaPct = initialKg>0 ? (merma/initialKg*100).toFixed(1) : 0;
  logMovement('producción', `Producción de ${prod?prod.name:'—'}: ${fmtKg(initialKg)} kg → ${totalUds} uds`, `Merma: ${fmtKg(merma)} kg (${mermaPct}%)`);
  saveState(); renderView();
  toast(`Producción registrada: ${totalUds} uds · merma ${mermaPct}%`);
}
function deleteProduccion(id){
  if(!confirm('¿Eliminar esta producción? El stock se recalculará.')) return;
  state.productions = state.productions.filter(p=>p.id!==id);
  saveState(); renderView();
  toast('Producción eliminada');
}

function recalcInv(input){
  const theo = parseFloat(input.dataset.theo)||0;
  const real = parseFloat(input.value)||0;
  const delta = real - theo;
  const tr = input.closest('tr');
  const descCell = tr.querySelector('.invDesc');
  const statusBadge = tr.querySelector('.invStatus');
  if(Math.abs(delta)<0.001){
    descCell.textContent='—'; descCell.className='invDesc';
    statusBadge.textContent='OK'; statusBadge.className='badge ok invStatus';
    input.classList.remove('input-warn');
  } else {
    const sign = delta>0?'+':'';
    descCell.textContent = sign+fmtNum(delta, input.dataset.key.startsWith('kg:')?3:0);
    descCell.className = 'invDesc '+(delta>0?'descuadre-pos':'descuadre-neg');
    statusBadge.textContent = delta>0?'Sobrante':'Faltante';
    statusBadge.className='badge '+(delta>0?'info':'warn')+' invStatus';
    input.classList.add('input-warn');
  }
}

function saveInventario(bodega){
  const rows = document.querySelectorAll('.invReal');
  const items = [];
  rows.forEach(r=>{
    const key = r.dataset.key;
    const theoretical = parseFloat(r.dataset.theo)||0;
    const real = parseFloat(r.value)||0;
    items.push({key, theoretical, real, descuadre: real-theoretical});
  });
  const reason = document.getElementById('invReason').value.trim();
  const cargaInicial = !!(document.getElementById('invCargaInicial') && document.getElementById('invCargaInicial').checked);
  if(!reason){ toast('Ingresa el motivo del ajuste','warn'); return; }
  const inv = {id:uid(), when:new Date().toISOString(), bodega, items, reason, cargaInicial, userId:session.name};
  state.inventories.push(inv);
  const desc = items.filter(i=>Math.abs(i.descuadre)>0.001).length;
  logMovement('inventario', `Conteo ${bodega==='general'?'Bodega General':'Bodega Cocina'}: ${desc} descuadres`, reason);
  saveState(); renderView();
  toast('Conteo registrado y ajuste aplicado');
}

// Helpers de período
function isoWeekToRange(weekStr){
  // weekStr = "2026-W19" → {start, end} ISO yyyy-mm-dd (lun a dom)
  if(!weekStr) return null;
  const m = weekStr.match(/^(\d{4})-W(\d{2})$/); if(!m) return null;
  const year = parseInt(m[1]), week = parseInt(m[2]);
  // ISO 8601: el jueves de la semana 1 está en el año
  const simple = new Date(Date.UTC(year, 0, 1 + (week-1)*7));
  const dow = simple.getUTCDay();
  const mondayDelta = (dow<=4 ? 1 : 8) - dow;
  const monday = new Date(simple); monday.setUTCDate(simple.getUTCDate()+mondayDelta);
  const sunday = new Date(monday); sunday.setUTCDate(monday.getUTCDate()+6);
  return {start: monday.toISOString().slice(0,10), end: sunday.toISOString().slice(0,10)};
}
function monthToRange(monthStr){
  if(!monthStr) return null;
  const m = monthStr.match(/^(\d{4})-(\d{2})$/); if(!m) return null;
  const year = parseInt(m[1]), month = parseInt(m[2]);
  const start = new Date(Date.UTC(year, month-1, 1));
  const end = new Date(Date.UTC(year, month, 0));
  return {start: start.toISOString().slice(0,10), end: end.toISOString().slice(0,10)};
}
function currentISOWeek(){
  const d = new Date(); d.setHours(0,0,0,0);
  const dayNum = (d.getDay()+6)%7;
  d.setDate(d.getDate()-dayNum+3);
  const firstThu = new Date(d.getFullYear(),0,4);
  const diff = (d - firstThu) / (7*24*60*60*1000);
  const week = 1 + Math.round(diff);
  return `${d.getFullYear()}-W${String(week).padStart(2,'0')}`;
}
function currentMonth(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function fmtDateShort(iso){ if(!iso) return '—'; const d=new Date(iso+'T00:00:00'); return d.toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit',year:'2-digit'}); }
function fmtPeriod(v){
  const t = v.periodType || 'dia';
  const s = v.periodStart || v.when;
  const e = v.periodEnd || v.when;
  if(t==='dia' || s===e) return fmtDateShort(s);
  if(t==='semana') return `${fmtDateShort(s)} → ${fmtDateShort(e)}`;
  if(t==='mes'){ const d=new Date(s+'T00:00:00'); return d.toLocaleDateString('es-CL',{month:'long',year:'numeric'}); }
  return `${fmtDateShort(s)} → ${fmtDateShort(e)}`;
}
function periodLabel(t){ return {dia:'Día',semana:'Semana',mes:'Mes',rango:'Rango'}[t]||t; }
function periodDays(v){
  const s = new Date((v.periodStart||v.when)+'T00:00:00');
  const e = new Date((v.periodEnd||v.when)+'T00:00:00');
  return Math.round((e-s)/(24*3600*1000))+1;
}

function setVentMode(m){ window._ventMode = m; renderView(); }

function addVenta(){
  const mode = window._ventMode || 'dia';
  let periodStart, periodEnd;
  if(mode==='dia'){
    const d = document.getElementById('ventDate').value || todayISO();
    periodStart = d; periodEnd = d;
  } else if(mode==='semana'){
    const w = document.getElementById('ventWeek').value;
    if(!w){ toast('Selecciona una semana','warn'); return; }
    const r = isoWeekToRange(w);
    if(!r){ toast('Semana inválida','warn'); return; }
    periodStart = r.start; periodEnd = r.end;
  } else if(mode==='mes'){
    const mm = document.getElementById('ventMonth').value;
    if(!mm){ toast('Selecciona un mes','warn'); return; }
    const r = monthToRange(mm);
    periodStart = r.start; periodEnd = r.end;
  } else if(mode==='rango'){
    periodStart = document.getElementById('ventFrom').value;
    periodEnd = document.getElementById('ventTo').value;
    if(!periodStart || !periodEnd){ toast('Ingresa fechas desde y hasta','warn'); return; }
    if(periodStart > periodEnd){ toast('La fecha "Desde" debe ser anterior a "Hasta"','warn'); return; }
  }
  const notes = document.getElementById('ventNotes').value.trim();
  const items = state.preparations.map(pr=>{
    const v = parseInt(document.getElementById('vent-'+pr.id).value)||0;
    return {prepId:pr.id, units:v};
  }).filter(x=>x.units>0);
  if(items.length===0){ toast('Ingresa al menos una venta','warn'); return; }
  const v = {id:uid(), when:periodEnd, periodStart, periodEnd, periodType:mode, items, notes, userId:session.name};
  state.sales.push(v);
  const tot = items.reduce((a,b)=>a+b.units,0);
  const periodTxt = mode==='dia' ? `del ${fmtDateShort(periodStart)}` : `${periodLabel(mode)} ${fmtDateShort(periodStart)} → ${fmtDateShort(periodEnd)}`;
  logMovement('venta', `Ventas ${periodTxt}: ${tot} uds`, items.map(it=>{const p=state.preparations.find(x=>x.id===it.prepId);return `${p?p.name:'—'}×${it.units}`}).join(', '));
  saveState(); renderView();
  toast(`Ventas registradas: ${tot} uds`);
}
function deleteVenta(id){
  if(!confirm('¿Eliminar este registro de ventas? El stock se recalculará.')) return;
  state.sales = state.sales.filter(v=>v.id!==id);
  saveState(); renderView();
  toast('Venta eliminada');
}

}

function confirmDespacho(id){
  const o = state.orders.find(x=>x.id===id);
  if(!o) return;
  const finalItems = o.items.map(it=>{
    const inp = document.getElementById(`dsp-${id}-${it.prepId}`);
    return {prepId:it.prepId, units: parseInt(inp?inp.value:0)||0};
  }).filter(x=>x.units>0);
  if(finalItems.length===0){ if(!confirm('No despacharás unidades. ¿Confirmar como cancelado?')) return; o.status='cancelado'; }
  else { o.status='despachado'; o.finalItems = finalItems; }
  o.dispatchedAt = new Date().toISOString();
  o.dispatchedBy = session.name;
  const tot = finalItems.reduce((a,b)=>a+b.units,0);
  logMovement('despacho', `Despacho ${tot} uds de General → Cocina`, finalItems.map(it=>{const p=state.preparations.find(x=>x.id===it.prepId);return `${p?p.name:'—'}×${it.units}`}).join(', '));
  saveState(); renderView(); renderTabs();
  toast('Despacho confirmado');
}
function cancelDespacho(id){
  if(!confirm('¿Cancelar este pedido?')) return;
  const o = state.orders.find(x=>x.id===id);
  o.status='cancelado'; o.dispatchedAt = new Date().toISOString(); o.dispatchedBy = session.name;
  logMovement('despacho', `Pedido cancelado`, `Pedido del ${fmtDateTime(o.when)}`);
  saveState(); renderView(); renderTabs();
  toast('Pedido cancelado');
}

function viewHistorial(){
  const f = window._histF || {q:'', type:'', from:'', to:'', user:''};
  let movs = [...state.movements].sort((a,b)=>b.when.localeCompare(a.when));
  if(f.type) movs = movs.filter(m=>m.type===f.type);
  if(f.user) movs = movs.filter(m=>(m.userId||'')===f.user);
  if(f.from) movs = movs.filter(m=>m.when.slice(0,10)>=f.from);
  if(f.to)   movs = movs.filter(m=>m.when.slice(0,10)<=f.to);
  if(f.q){
    const q = f.q.toLowerCase();
    movs = movs.filter(m=>
      (m.summary||'').toLowerCase().includes(q) ||
      (m.detail||'').toLowerCase().includes(q) ||
      (m.type||'').toLowerCase().includes(q) ||
      (m.userId||'').toLowerCase().includes(q)
    );
  }
  const types = [...new Set(state.movements.map(m=>m.type))];
  const users = [...new Set(state.movements.map(m=>m.userId).filter(Boolean))];
  return `
  <div class="page-head">

      <div><label>Tipo</label>
        <select onchange="window._histF=Object.assign(window._histF||{},{type:this.value});renderView()">
          <option value="">Todos</option>
          ${types.map(t=>`<option value="${t}" ${f.type===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      <div><label>Desde</label><input type="date" value="${f.from}" onchange="window._histF=Object.assign(window._histF||{},{from:this.value});renderView()"></div>
      <div><label>Hasta</label><input type="date" value="${f.to}" onchange="window._histF=Object.assign(window._histF||{},{to:this.value});renderView()"></div>
      <div><button onclick="window._histF={q:'',type:'',from:'',to:'',user:''};renderView()" class="small">Limpiar</button></div>
    </div>
    ${users.length>1?`<div style="margin-top:4px"><label>Usuario</label>
      <select onchange="window._histF=Object.assign(window._histF||{},{user:this.value});renderView()" style="max-width:280px">
        <option value="">Todos los usuarios</option>
        ${users.map(u=>`<option value="${escapeHtml(u)}" ${f.user===u?'selected':''}>${escapeHtml(u)}</option>`).join('')}
      </select></div>`:''}
  </div>
  <div class="card">
    <div class="card-title">Movimientos</div>
    ${movs.length===0 ? '<div class="empty-state"><div class="icon">📜</div><div>Sin movimientos que coincidan con el filtro.</div></div>' :
    movs.map(m=>`
      <div class="hist-row">
        <div class="when">${fmtDateTime(m.when)}</div>

        <div></div>

    <div class="form-row-4">

      <div><label>Contraseña</label><input id="nuPass" placeholder="Mínimo 4 caracteres"></div>
      <div><label>Nombre visible</label><input id="nuName" placeholder="ej: Pedro García"></div>
      <div><label>Rol</label>
        <select id="nuRole">
          <option value="">Seleccionar rol...</option>
          <option value="admin">Administrador</option>

  ${isAdmin?`<div class="card">
    <div class="card-title"><span>5 · Mantenimiento</span><span class="warn">⚠ Acción permanente · solo admin</span></div>
    <p class="muted" style="margin-top:0">Elimina compras, producciones o ajustes ingresados por error. El stock se recalcula automáticamente.</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button onclick="goTab('compras')">Ver compras</button>
      <button onclick="goTab('produccion')">Ver producciones</button>
      <button onclick="goTab('inventario')">Ver ajustes de inventario</button>
      <button class="danger" onclick="if(confirm('¿RESETEAR TODO? Esta acción borra todos los movimientos, productos y usuarios.')) resetAll()">Resetear toda la base</button>
    </div>
  </div>`:''}`;
}

function changePass(username){
  const u = state.users.find(x=>x.username===username);
  const np = prompt('Nueva contraseña para '+u.username+':');
  if(!np||np.length<4){ toast('Mínimo 4 caracteres','warn'); return; }
  u.password = np; saveState(); toast('Contraseña actualizada');
}
function deleteUser(username){
  if(!confirm('¿Eliminar usuario '+username+'?')) return;
  state.users = state.users.filter(u=>u.username!==username);
  saveState(); renderView();
}
function addUser(){
  const u = document.getElementById('nuUser').value.trim().toLowerCase();
  const p = document.getElementById('nuPass').value;
  const n = document.getElementById('nuName').value.trim();
  const r = document.getElementById('nuRole').value;
  if(!u||!p||!n||!r){ toast('Completa todos los campos','warn'); return; }
  if(p.length<4){ toast('Contraseña mínima 4 caracteres','warn'); return; }
  if(state.users.find(x=>x.username===u)){ toast('Ya existe ese usuario','warn'); return; }
  state.users.push({username:u, password:p, name:n, role:r});
  saveState(); renderView();
  toast('Usuario agregado');
}
function addProduct(){
  const n = document.getElementById('newProductName').value.trim();
  if(!n){ toast('Ingresa un nombre','warn'); return; }
  state.products.push({id:uid(), name:n});
  saveState(); renderView();
  toast('Producto agregado');
}
function deleteProduct(id){
  const has = state.preparations.some(p=>p.productId===id) || state.purchases.some(p=>p.productId===id);
  if(has && !confirm('Este producto tiene preparaciones o compras asociadas. ¿Eliminar de todos modos?')) return;
  state.products = state.products.filter(p=>p.id!==id);
  saveState(); renderView();
}
function addPrep(){
  const productId = document.getElementById('newPrepProduct').value;
  const name = document.getElementById('newPrepName').value.trim();
  const grams = parseInt(document.getElementById('newPrepGrams').value)||0;
  if(!productId||!name){ toast('Completa producto y nombre','warn'); return; }
  state.preparations.push({id:uid(), productId, name, grams});
  saveState(); renderView();
  toast('Preparación agregada');
}
function deletePrep(id){
  if(!confirm('¿Eliminar preparación?')) return;
  state.preparations = state.preparations.filter(p=>p.id!==id);
  saveState(); renderView();
}
function setPrepMin(id, v){
  const pr = state.preparations.find(p=>p.id===id);
  if(!pr) return;
  pr.minStock = Math.max(0, parseInt(v)||0);
  saveState();
  renderBell();
  toast('Stock mínimo actualizado','ok');
}
function setPrepToteat(id, v){
  const pr = state.preparations.find(p=>p.id===id);
  if(!pr) return;
  pr.toteatCode = String(v||'').trim();
  saveState();
  toast('Código Toteat guardado','ok');
}
function setPrepName(id, v){
  const pr = state.preparations.find(p=>p.id===id);
  if(!pr) return;

  if(!newName){ toast('El nombre no puede estar vacío','warn'); renderView(); return; }

function setPrepProduct(id, v){

  if(!pr) return;

function setPrepGrams(id, v){
